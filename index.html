/* ─────────────────────────────────────────────
   CLAUDE API
───────────────────────────────────────────── */
async function callClaude(prompt,system="",maxTok=1000){
  const body={model:"claude-sonnet-4-20250514",max_tokens:maxTok,messages:[{role:"user",content:prompt}]};
  if(system)body.system=system;
  for(let attempt=0;attempt<3;attempt++){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),90000);
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body),signal:ctrl.signal});
      clearTimeout(tid);
      if(!res.ok){const t=await res.text();throw new Error("API "+res.status+": "+t.slice(0,120));}
      const data=await res.json();
      if(data.error)throw new Error(data.error.message||"Errore API");
      return data.content?.map(b=>b.text||"").filter(Boolean).join("")||"";
    }catch(e){
      if(e.name==="AbortError")throw new Error("Timeout dopo 90s - riprova");
      if(attempt<2){await new Promise(r=>setTimeout(r,2000*(attempt+1)));continue;}
      throw e;
    }
  }
}

const _mem={};
const _store={
  async get(k){try{if(typeof window!=="undefined"&&window.storage){const r=await window.storage.get(k);return r;}}catch{}return _mem[k]!=null?{value:_mem[k]}:null;},
  async set(k,v){try{if(typeof window!=="undefined"&&window.storage)await window.storage.set(k,v);}catch{}_mem[k]=v;},
  async del(k){try{if(typeof window!=="undefined"&&window.storage)await window.storage.delete(k);}catch{}delete _mem[k];}
};
async function loadProjectsList(){try{const r=await _store.get(PROJECTS_INDEX_KEY);return r?.value?JSON.parse(r.value):[];}catch{return[];}}
async function saveProjectsList(list){try{await _store.set(PROJECTS_INDEX_KEY,JSON.stringify(list));}catch{}}
async function loadProject(id){try{const r=await _store.get(PROJECT_PREFIX+id);return r?.value?JSON.parse(r.value):null;}catch{return null;}}
async function saveProject(id,book){const updated={...book,updatedAt:Date.now()};try{await _store.set(PROJECT_PREFIX+id,JSON.stringify(updated));}catch{}return updated;}
async function deleteProject(id){try{await _store.del(PROJECT_PREFIX+id);}catch{}}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function loadJsPDF(){
  if(window.jspdf)return window.jspdf.jsPDF;
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload=()=>resolve(window.jspdf.jsPDF);s.onerror=reject;
    document.head.appendChild(s);
  });
}
async function exportPDF(book,sizeIdx,margins,fontName,fontSize,lineSpacing){
  const jsPDF=await loadJsPDF();
  const size=KDP_SIZES[sizeIdx];
  const mmW=size.pts[0]*25.4,mmH=size.pts[1]*25.4;
  const doc=new jsPDF({unit:"mm",format:[mmW,mmH],orientation:"portrait"});
  const mTop=margins.top*25.4,mBot=margins.bottom*25.4,mIn=margins.inner*25.4,mOut=margins.outer*25.4;
  const textW=mmW-mIn-mOut;
  const lineH=(fontSize/2.83)*lineSpacing;
  const pdfFont="times";
  let pageNum=0; // 0 = pagina copertina non numerata

  function addFooter(chTitle,isEven){
    doc.setFont(pdfFont,"normal");doc.setFontSize(8);doc.setTextColor(140,140,140);
    // numero pagina centrato
    doc.text(`— ${pageNum} —`,mmW/2,mmH-mBot*0.5,{align:"center"});
    // intestazione: titolo libro a sinistra (pari), titolo capitolo a destra (dispari)
    if(pageNum>1){
      doc.setFontSize(7.5);
      if(isEven){
        doc.text(book.title||"",mIn,mTop*0.55);
      } else {
        doc.text(chTitle||"",mmW-mOut,mTop*0.55,{align:"right"});
      }
    }
  }

  // ── COPERTINA ────────────────────────────────────────────────────────────
  // Sfondo scuro elegante
  doc.setFillColor(18,17,30);
  doc.rect(0,0,mmW,mmH,"F");
  // Linea decorativa top
  doc.setDrawColor(180,150,60);doc.setLineWidth(0.5);
  doc.line(mIn,mTop+8,mmW-mOut,mTop+8);
  // Genere
  doc.setFont(pdfFont,"normal");doc.setFontSize(9);doc.setTextColor(180,150,60);
  doc.text((book.genre||"").toUpperCase(),mmW/2,mTop+4,{align:"center"});
  // Titolo
  doc.setFont(pdfFont,"bold");doc.setFontSize(32);doc.setTextColor(245,245,235);
  doc.text(book.title||"Il Mio Libro",mmW/2,mmH*0.42,{align:"center",maxWidth:textW});
  // Linea decorativa
  doc.setDrawColor(180,150,60);doc.line(mIn,mmH*0.52,mmW-mOut,mmH*0.52);
  // Autore
  doc.setFont(pdfFont,"normal");doc.setFontSize(14);doc.setTextColor(200,185,140);
  doc.text(book.author||"",mmW/2,mmH*0.58,{align:"center"});
  // Footer copertina
  doc.setFontSize(8);doc.setTextColor(80,80,80);
  doc.text("BookForge Edition",mmW/2,mmH-12,{align:"center"});

  // ── PAGINA DEI CREDITI ───────────────────────────────────────────────────
  doc.addPage();pageNum=1;
  doc.setFont(pdfFont,"italic");doc.setFontSize(11);doc.setTextColor(60,60,60);
  doc.text(book.title||"",mmW/2,mmH*0.35,{align:"center"});
  doc.setFont(pdfFont,"normal");doc.setFontSize(10);
  doc.text(book.author||"",mmW/2,mmH*0.42,{align:"center"});
  doc.setFontSize(8);doc.setTextColor(120,120,120);
  doc.text(`© ${new Date().getFullYear()} ${book.author||""}`,mmW/2,mmH*0.5,{align:"center"});
  doc.text("Tutti i diritti riservati.",mmW/2,mmH*0.54,{align:"center"});

  // ── INDICE ───────────────────────────────────────────────────────────────
  if(book.chapters.length>0){
    doc.addPage();pageNum++;
    doc.setFont(pdfFont,"bold");doc.setFontSize(16);doc.setTextColor(30,30,30);
    doc.text("Indice",mIn,mTop+8);
    doc.setDrawColor(60,60,60);doc.setLineWidth(0.3);doc.line(mIn,mTop+12,mmW-mOut,mTop+12);
    doc.setFont(pdfFont,"normal");doc.setFontSize(10);doc.setTextColor(40,40,40);
    let iy=mTop+22;
    book.chapters.forEach((ch,i)=>{
      if(iy>mmH-mBot-8){doc.addPage();pageNum++;iy=mTop;}
      // Titolo capitolo + puntini + numero pagina stimato
      const label=`${i+1}. ${ch.title||"Capitolo "+(i+1)}`;
      const pg=`${3+i*2}`; // stima pagina
      const labelW=doc.getTextWidth(label);
      const pgW=doc.getTextWidth(pg);
      doc.text(label,mIn,iy);
      // Puntini
      doc.setTextColor(180,180,180);
      const dotStart=mIn+labelW+2;const dotEnd=mmW-mOut-pgW-2;
      let dx=dotStart;
      while(dx<dotEnd){doc.text(".",dx,iy);dx+=2.5;}
      doc.setTextColor(40,40,40);
      doc.text(pg,mmW-mOut,iy,{align:"right"});
      iy+=6.5;
    });
    addFooter("Indice",pageNum%2===0);
  }

  // ── CAPITOLI ─────────────────────────────────────────────────────────────
  for(let ci=0;ci<book.chapters.length;ci++){
    const ch=book.chapters[ci];

    // Pagina titolo capitolo (sempre su pagina nuova dispari)
    doc.addPage();pageNum++;
    // Se pagina pari, aggiungi pagina bianca prima per portare su dispari
    if(pageNum%2===0){addFooter(ch.title||"",true);doc.addPage();pageNum++;}
    doc.setFillColor(245,243,238);doc.rect(0,0,mmW,mmH,"F");
    doc.setFont(pdfFont,"normal");doc.setFontSize(10);doc.setTextColor(140,120,80);
    doc.text(`Capitolo ${ci+1}`,mmW/2,mmH*0.38,{align:"center"});
    doc.setFont(pdfFont,"bold");doc.setFontSize(22);doc.setTextColor(30,30,30);
    doc.text(ch.title||`Capitolo ${ci+1}`,mmW/2,mmH*0.45,{align:"center",maxWidth:textW*0.85});
    doc.setDrawColor(180,150,60);doc.setLineWidth(0.4);
    doc.line(mmW*0.3,mmH*0.5,mmW*0.7,mmH*0.5);
    addFooter(ch.title,pageNum%2===0);

    if(ch.content?.trim()||ch.images?.length){
      doc.addPage();pageNum++;
      doc.setFont(pdfFont,"normal");doc.setFontSize(fontSize);doc.setTextColor(20,20,20);
      let y=mTop;
      let first=true;

      // Splitta per paragrafi, sottotitoli e tag foto inline
      const rawLines=ch.content.split(/\n/);
      for(let li=0;li<rawLines.length;li++){
        const rawLine=rawLines[li];
        // Foto inline [[img:id]]
        const imgTagMatch=rawLine.match(/^\[\[img:([^\]]+)\]\]$/);
        if(imgTagMatch){
          const imgId=imgTagMatch[1];
          const imgObj=(ch.images||[]).find(im=>im.id===imgId);
          if(imgObj&&imgObj.data){
            const maxImgH=70,maxImgW=textW;
            if(y+maxImgH+20>mmH-mBot-10){addFooter(ch.title,pageNum%2===0);doc.addPage();pageNum++;y=mTop;}
            try{
              doc.addImage(imgObj.data,"JPEG",mIn,y,maxImgW,maxImgH,"","MEDIUM");
              y+=maxImgH+4;
              if(imgObj.caption){
                doc.setFont(pdfFont,"italic");doc.setFontSize(8.5);doc.setTextColor(100,100,100);
                doc.text(imgObj.caption,mmW/2,y,{align:"center",maxWidth:textW});
                doc.setFont(pdfFont,"normal");doc.setFontSize(fontSize);doc.setTextColor(20,20,20);
                y+=6;
              }
              y+=8;
            }catch(e){}
          }
          continue;
        }
        // Sottotitolo ## o ###
        if(rawLine.startsWith("## ")||rawLine.startsWith("### ")){
          const isH2=rawLine.startsWith("## ");
          y+=isH2?lineH*1.2:lineH*0.8;
          if(y+lineH*2>mmH-mBot-10){addFooter(ch.title,pageNum%2===0);doc.addPage();pageNum++;y=mTop;}
          doc.setFont(pdfFont,"bold");doc.setFontSize(isH2?fontSize+2:fontSize+0.5);
          doc.setTextColor(isH2?40:60,isH2?40:60,isH2?40:60);
          const hText=rawLine.replace(/^#{2,3}\s*/,"");
          const hLines=doc.splitTextToSize(hText,textW);
          hLines.forEach(hl=>{doc.text(hl,mIn,y);y+=lineH*(isH2?1.2:1.1);});
          doc.setFont(pdfFont,"normal");doc.setFontSize(fontSize);doc.setTextColor(20,20,20);
          first=false;
          continue;
        }
        // Separatore ---
        if(rawLine.trim()==="---"){
          y+=lineH;
          if(y>mmH-mBot-10){addFooter(ch.title,pageNum%2===0);doc.addPage();pageNum++;y=mTop;}
          doc.setDrawColor(180,180,180);doc.setLineWidth(0.2);
          doc.line(mIn+textW*0.2,y-lineH*0.3,mIn+textW*0.8,y-lineH*0.3);
          y+=lineH*0.3;first=false;continue;
        }
        // Riga vuota = paragrafo break
        if(rawLine.trim()===""){y+=lineH*0.35;first=false;continue;}
        // Testo normale
        const lines=doc.splitTextToSize(rawLine.trim(),textW);
        for(let i=0;i<lines.length;i++){
          if(y+lineH>mmH-mBot-10){addFooter(ch.title,pageNum%2===0);doc.addPage();pageNum++;y=mTop;}
          const indent=(first&&i===0)?0:(i===0?5.5:0);
          doc.text(lines[i],mIn+indent,y);y+=lineH;
        }
        first=false;
      }
      // Insert images
      if(ch.images?.length){
        for(const img of ch.images){
          if(!img.data)continue;
          const imgH=60,imgW=textW;
          if(y+imgH>mmH-mBot-10){addNum();doc.addPage();pageNum++;addHeader(ch.title);y=mTop;}
          try{
            doc.addImage(img.data,"JPEG",mIn,y,imgW,imgH);
            y+=imgH+8;
            if(img.caption){doc.setFontSize(9);doc.setTextColor(100,100,100);doc.setFont(pdfFont,"italic");doc.text(img.caption,mmW/2,y,{align:"center"});doc.setFontSize(fontSize);doc.setTextColor(20,20,20);doc.setFont(pdfFont,"normal");y+=8;}
          }catch(e){}
        }
      }
      addNum();
    }
  }
  doc.save(`${(book.title||"libro").replace(/\s+/g,"_")}_KDP.pdf`);
}

function exportEPUB(book){
  const chapters=book.chapters.map((ch,i)=>({id:`ch${i}`,title:ch.title||`Capitolo ${i+1}`,content:(ch.content||"").split(/\n\n+/).map(p=>`<p>${p.trim().replace(/&/g,"&amp;").replace(/</g,"&lt;")}</p>`).join("\n")}));
  const uid=`book-${Date.now()}`;
  const opf=`<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" unique-identifier="uid" version="2.0"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:title>${book.title||"Il Mio Libro"}</dc:title><dc:creator>${book.author||""}</dc:creator><dc:language>it</dc:language><dc:identifier id="uid">${uid}</dc:identifier></metadata><manifest>${chapters.map(c=>`<item id="${c.id}" href="${c.id}.html" media-type="application/xhtml+xml"/>`).join("")}<item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/></manifest><spine toc="ncx">${chapters.map(c=>`<itemref idref="${c.id}"/>`).join("")}</spine></package>`;
  const txt=`EPUB Source — ${book.title||"Libro"}\n\n--- content.opf ---\n${opf}\n\n${chapters.map(c=>`--- ${c.id}.html ---\n<?xml version="1.0"?><html><head><title>${c.title}</title></head><body><h1>${c.title}</h1>${c.content}</body></html>`).join("\n\n")}`;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([txt],{type:"text/plain"}));
  a.download=`${(book.title||"libro").replace(/\s+/g,"_")}_epub.txt`;
  a.click();
}

}

/* ─────────────────────────────────────────────
   IMAGE MANAGER — inserimento foto nel capitolo
───────────────────────────────────────────── */
function ImageManager({chapter,onUpdate,onInsertInline=null}){
  const fileInputRef=useRef(null);
  const [editCaption,setEditCaption]=useState(null); // index
  const images=chapter.images||[];

  const handleFiles=async(files)=>{
    const newImgs=[];
    for(const f of files){
      if(!f.type.startsWith("image/"))continue;
      const data=await fileToBase64(f);
      newImgs.push({id:`img_${Date.now()}_${Math.random().toString(36).slice(2,5)}`,data,name:f.name,caption:"",align:"center"});
    }
    onUpdate({...chapter,images:[...images,...newImgs]});
  };

  const removeImg=(idx)=>{
    const newImgs=images.filter((_,i)=>i!==idx);
    onUpdate({...chapter,images:newImgs});
  };
  const updateImg=(idx,changes)=>{
    const newImgs=images.map((img,i)=>i===idx?{...img,...changes}:img);
    onUpdate({...chapter,images:newImgs});
  };
  const moveImg=(idx,dir)=>{
    const newImgs=[...images];
    const swap=idx+dir;
    if(swap<0||swap>=newImgs.length)return;
    [newImgs[idx],newImgs[swap]]=[newImgs[swap],newImgs[idx]];
    onUpdate({...chapter,images:newImgs});
  };

  return(
    <div style={{padding:"0 24px 20px"}}>
      <div style={{fontSize:11,color:"#f472b6",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span>🖼</span><span style={{textTransform:"uppercase",letterSpacing:1}}>Immagini del capitolo</span>
        <span style={{color:"#5a5870",fontWeight:400}}>({images.length} foto)</span>
      </div>

      {/* Drop zone + upload button */}
      <div
        onDragOver={e=>e.preventDefault()}
        onDrop={e=>{e.preventDefault();handleFiles([...e.dataTransfer.files]);}}
        onClick={()=>fileInputRef.current?.click()}
        style={{border:"2px dashed #2e2d3e",borderRadius:10,padding:"14px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,marginBottom:images.length?14:0,background:"#0f0e1b",transition:"border-color 0.2s"}}
      >
        <span style={{fontSize:22}}>📷</span>
        <div>
          <div style={{fontSize:13,color:"#c8c6d8"}}>Aggiungi foto</div>
          <div style={{fontSize:11,color:"#5a5870"}}>Clicca o trascina qui · JPG, PNG, GIF, WebP</div>
        </div>
        <input ref={fileInputRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handleFiles([...e.target.files])} />
      </div>

      {/* Images grid */}
      {images.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
          {images.map((img,idx)=>(
            <div key={img.id} style={{background:"#0f0e1b",borderRadius:10,border:"1px solid #2e2d3e",overflow:"hidden"}}>
              {/* Thumb */}
              <div style={{position:"relative",height:110,background:"#080712",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <img src={img.data} alt={img.caption||img.name} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}} />
                <div style={{position:"absolute",top:4,right:4,display:"flex",gap:3}}>
                  <button onClick={()=>moveImg(idx,-1)} disabled={idx===0} style={{width:22,height:22,borderRadius:4,border:"none",background:"#1a1829cc",color:"#c8c6d8",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",opacity:idx===0?0.3:1}}>↑</button>
                  <button onClick={()=>moveImg(idx,1)} disabled={idx===images.length-1} style={{width:22,height:22,borderRadius:4,border:"none",background:"#1a1829cc",color:"#c8c6d8",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",opacity:idx===images.length-1?0.3:1}}>↓</button>
                  <button onClick={()=>removeImg(idx)} style={{width:22,height:22,borderRadius:4,border:"none",background:"#ef444499",color:"#fff",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              </div>
              {/* Caption, align, insert inline */}
              <div style={{padding:"8px 10px"}}>
                {editCaption===idx?(
                  <input autoFocus value={img.caption} onChange={e=>updateImg(idx,{caption:e.target.value})} onBlur={()=>setEditCaption(null)} onKeyDown={e=>e.key==="Enter"&&setEditCaption(null)} placeholder="Didascalia..." style={{...inp,fontSize:11,padding:"5px 8px"}} />
                ):(
                  <div onClick={()=>setEditCaption(idx)} style={{fontSize:11,color:img.caption?"#c8c6d8":"#3a3850",cursor:"pointer",fontStyle:img.caption?"normal":"italic",minHeight:18}}>
                    {img.caption||"Clicca per aggiungere didascalia..."}
                  </div>
                )}
                <div style={{display:"flex",gap:4,marginTop:6}}>
                  {["sinistra","centro","destra"].map(a=>(
                    <button key={a} onClick={()=>updateImg(idx,{align:a})} style={{flex:1,padding:"3px 0",borderRadius:4,border:`1px solid ${img.align===a||(!img.align&&a==="centro")?"#f472b6":"#2e2d3e"}`,background:img.align===a||(!img.align&&a==="centro")?"#f472b622":"transparent",color:img.align===a||(!img.align&&a==="centro")?"#f472b6":"#5a5870",cursor:"pointer",fontSize:9}}>{a==="sinistra"?"◀":a==="centro"?"■":"▶"}</button>
                  ))}
                </div>
                {onInsertInline&&(
                  <button onClick={()=>onInsertInline(img.id,img.name)} style={{width:"100%",marginTop:6,padding:"4px 0",borderRadius:6,border:"1px solid #4ade8044",background:"#4ade8011",color:"#4ade80",cursor:"pointer",fontSize:10}}>
                    📌 Inserisci nel testo
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────
   WRITE PANEL — con gestione foto integrata
───────────────────────────────────────────── */
function WritePanel({book,setBook}){
  const [activeChapter,setActiveChapter]=useState(0);
  const [aiAssist,setAiAssist]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiSuggestion,setAiSuggestion]=useState("");
  const [showImages,setShowImages]=useState(false);
  const [dictating,setDictating]=useState(false);
  const [dictError,setDictError]=useState("");
  const textareaRef=useRef(null);
  const recognitionRef=useRef(null);

  const ch=book.chapters[activeChapter]||{title:"",content:"",images:[]};
  const wc=ch.content.trim()?ch.content.trim().split(/\s+/).length:0;
  const imgCount=(ch.images||[]).length;

  const upd=(field,val)=>setBook(b=>{const c=[...b.chapters];c[activeChapter]={...c[activeChapter],[field]:val};return{...b,chapters:c};});
  const updChapter=(newCh)=>setBook(b=>{const c=[...b.chapters];c[activeChapter]=newCh;return{...b,chapters:c};});

  // ── Inserisce segnaposto foto nel cursore ───────────────────
  const insertImgPlaceholder=(imgId,imgName)=>{
    const ta=textareaRef.current;
    if(!ta)return;
    const pos=ta.selectionStart;
    const cur=ch.content;
    const tag=`\n[[img:${imgId}]]\n`;
    const newContent=cur.slice(0,pos)+tag+cur.slice(pos);
    upd("content",newContent);
    setTimeout(()=>{ta.focus();ta.selectionStart=ta.selectionEnd=pos+tag.length;},50);
  };

  // ── Dettatura vocale ─────────────────────────────────────────
  const toggleDictation=()=>{
    if(dictating){
      recognitionRef.current?.stop();
      setDictating(false);
      return;
    }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setDictError("Dettatura non supportata in questo browser. Usa Chrome.");return;}
    setDictError("");
    const rec=new SR();
    rec.lang="it-IT";
    rec.continuous=true;
    rec.interimResults=true;
    let finalTranscript="";
    rec.onresult=(e)=>{
      let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){finalTranscript+=e.results[i][0].transcript+" ";}
        else{interim+=e.results[i][0].transcript;}
      }
      if(finalTranscript){
        upd("content",ch.content+finalTranscript);
        finalTranscript="";
      }
    };
    rec.onerror=(e)=>{setDictError("Errore microfono: "+e.error);setDictating(false);};
    rec.onend=()=>{if(dictating)rec.start();}; // riavvia se ancora attivo
    recognitionRef.current=rec;
    rec.start();
    setDictating(true);
  };

    const aiAction=async(action)=>{
    setAiLoading(true);setAiSuggestion("");
    try{
      const tail=ch.content.slice(-600);
      let p="";
      if(action==="continua")p=`Continua questa storia naturalmente (2-3 paragrafi). Solo la continuazione:\n\n...${tail}`;
      else if(action==="migliora")p=`Migliora questo testo letterariamente, mantieni il senso. Solo il testo migliorato:\n\n${tail}`;
      else if(action==="dialogo")p=`Scrivi un dialogo rivelatore tra due personaggi (10 battute) partendo da:\n\n${tail}`;
      else if(action==="riassumi")p=`Riassumi questo capitolo in 3-4 frasi:\n\n${ch.content}`;
      else p=`${aiAssist}\n\nContesto: "${book.title}" - ${ch.title}\n...${tail}`;
      const r=await callClaude(p,"Sei un assistente di scrittura creativa in italiano.");
      setAiSuggestion(r.trim());
    }catch(e){setAiSuggestion("Errore: "+e.message);}
    setAiLoading(false);
  };

  return(
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      {/* Chapter list */}
      <div style={{width:180,background:"#0f0e1b",borderRight:"1px solid #1a1929",overflowY:"auto",padding:10}}>
        <div style={{fontSize:10,color:"#5a5870",marginBottom:8,padding:"0 4px"}}>CAPITOLI</div>
        {book.chapters.map((c,i)=>(
          <div key={i} onClick={()=>{setActiveChapter(i);setShowImages(false);}} style={{padding:"8px 10px",borderRadius:6,cursor:"pointer",marginBottom:3,background:i===activeChapter?"#1a1829":"transparent",color:i===activeChapter?"#f5c842":"#6a6880",fontSize:12,borderLeft:i===activeChapter?"2px solid #f5c842":"2px solid transparent"}}>
            <div style={{fontFamily:"'Playfair Display',serif"}}>{c.title||`Cap. ${i+1}`}</div>
            <div style={{fontSize:10,color:"#3a3850",marginTop:2,display:"flex",gap:4}}>
              <span>{c.content.trim()?c.content.trim().split(/\s+/).length:0}w</span>
              {(c.images||[]).length>0&&<span style={{color:"#f472b644"}}>🖼{c.images.length}</span>}
            </div>
          </div>
        ))}
        <button onClick={()=>{const n=book.chapters.length;setBook(b=>({...b,chapters:[...b.chapters,{title:`Capitolo ${n+1}`,content:"",images:[]}]}));setActiveChapter(n);}} style={{width:"100%",padding:"7px",borderRadius:6,border:"1px dashed #2e2d3e",background:"transparent",color:"#5a5870",cursor:"pointer",fontSize:11,marginTop:6}}>
          + Capitolo
        </button>
      </div>

      {/* Editor */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Title bar */}
        <div style={{padding:"12px 24px",borderBottom:"1px solid #1a1929",display:"flex",alignItems:"center",gap:12}}>
          <input value={ch.title} onChange={e=>upd("title",e.target.value)} style={{flex:1,background:"transparent",border:"none",color:"#e8e6f0",fontSize:20,fontFamily:"'Playfair Display',serif",outline:"none"}} placeholder="Titolo capitolo..." />
          <Badge>{wc} parole</Badge>
          {/* Toggle foto */}
          <button onClick={()=>setShowImages(v=>!v)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${showImages?"#f472b6":"#2e2d3e"}`,background:showImages?"#f472b622":"transparent",color:showImages?"#f472b6":"#5a5870",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:5}}>
            🖼 Foto {imgCount>0&&<span style={{background:"#f472b6",color:"#fff",borderRadius:10,fontSize:10,padding:"0 5px",minWidth:16,textAlign:"center"}}>{imgCount}</span>}
          </button>
        </div>

        {/* Image panel (expandable) */}
        {showImages&&(
          <div style={{borderBottom:"1px solid #1a1929",background:"#0c0b18",maxHeight:340,overflowY:"auto"}}>
            <ImageManager chapter={ch} onUpdate={updChapter} onInsertInline={insertImgPlaceholder} />
          </div>
        )}

        {/* Inline image preview strip (always visible if images exist) */}
        {!showImages&&imgCount>0&&(
          <div style={{padding:"8px 24px",borderBottom:"1px solid #1a1929",background:"#0c0b18",display:"flex",gap:8,overflowX:"auto",alignItems:"center"}}>
            <span style={{fontSize:11,color:"#f472b688",flexShrink:0}}>🖼 {imgCount} foto nel capitolo</span>
            {(ch.images||[]).slice(0,5).map(img=>(
              <img key={img.id} src={img.data} alt="" style={{height:36,width:52,objectFit:"cover",borderRadius:4,border:"1px solid #2e2d3e",cursor:"pointer",flexShrink:0}} onClick={()=>setShowImages(true)} />
            ))}
            {imgCount>5&&<span style={{fontSize:11,color:"#5a5870",flexShrink:0}}>+{imgCount-5} altre</span>}
          </div>
        )}

        {/* Editor con foto inline */}
        <div style={{flex:1,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {dictating&&(
            <div style={{position:"absolute",top:10,right:20,zIndex:10,background:"#ef444422",border:"1px solid #ef4444",borderRadius:20,padding:"5px 14px",fontSize:12,color:"#ef4444",display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",animation:"pulse 1s infinite",display:"inline-block"}} />
              Registrazione in corso... (parla in italiano)
            </div>
          )}
          <textarea
            ref={textareaRef}
            value={ch.content}
            onChange={e=>upd("content",e.target.value)}
            placeholder={"Inizia a scrivere qui il tuo capitolo...\n\nSuggerimento: usa [[img:nomefile]] per inserire una foto nel punto preciso.\nOppure clicca su una foto nel pannello e scegli 'Inserisci qui'."}
            style={{flex:1,background:"transparent",border:"none",color:"#c8c6d8",fontSize:16,lineHeight:1.85,padding:"24px 64px 24px 24px",outline:"none",resize:"none",fontFamily:"Georgia,serif",overflowY:"auto"}}
          />
          {/* Anteprima foto inline (lato destro) */}
          {(ch.images||[]).length>0&&ch.content.includes("[[img:")&&(
            <div style={{position:"absolute",right:0,top:0,bottom:0,width:56,background:"#0c0b18",borderLeft:"1px solid #1a1929",overflowY:"auto",padding:"8px 4px",display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
              <div style={{fontSize:9,color:"#5a5870",marginBottom:4,textAlign:"center"}}>INLINE</div>
              {(ch.images||[]).map(img=>{
                const isUsed=ch.content.includes(`[[img:${img.id}]]`);
                return(
                  <div key={img.id} title={img.caption||img.name} style={{width:44,height:36,borderRadius:4,overflow:"hidden",border:`1px solid ${isUsed?"#4ade80":"#2e2d3e"}`,opacity:isUsed?1:0.4,flexShrink:0,cursor:"pointer"}} onClick={()=>insertImgPlaceholder(img.id,img.name)}>
                    <img src={img.data} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="" />
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* AI Suggestion */}
        {aiSuggestion&&(
          <div style={{margin:"0 24px 12px",background:"#0d1a2e",border:"1px solid #1e3a5e",borderRadius:10,padding:16}}>
            <div style={{fontSize:11,color:"#38bdf8",marginBottom:8}}>✨ SUGGERIMENTO AI</div>
            <div style={{color:"#c8daf0",fontSize:14,lineHeight:1.7,maxHeight:120,overflow:"auto"}}>{aiSuggestion}</div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={()=>{upd("content",ch.content+(ch.content?"\n\n":"")+aiSuggestion);setAiSuggestion("");}} style={{...goldBtn,padding:"7px 14px",fontSize:12}}>✅ Inserisci</button>
              <button onClick={()=>setAiSuggestion("")} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:12}}>✕ Scarta</button>
            </div>
          </div>
        )}

        {/* AI toolbar */}
        <div style={{padding:"10px 24px",borderTop:"1px solid #1a1929",background:"#0c0b18",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {/* Dettatura vocale */}
          <button onClick={toggleDictation} title={dictating?"Ferma dettatura":"Avvia dettatura vocale (Chrome)"} style={{padding:"6px 10px",borderRadius:20,border:`1px solid ${dictating?"#ef4444":"#2e2d3e"}`,background:dictating?"#ef444422":"transparent",color:dictating?"#ef4444":"#7a7890",cursor:"pointer",fontSize:14,flexShrink:0}}>
            {dictating?"⏹":"🎙"}
          </button>
          {dictError&&<span style={{fontSize:10,color:"#f87171"}}>{dictError}</span>}
          <span style={{fontSize:11,color:"#3a3850",margin:"0 4px"}}>|</span>
          <span style={{fontSize:11,color:"#5a5870",marginRight:4}}>AI →</span>
          {[{id:"continua",l:"✍️ Continua"},{id:"migliora",l:"✨ Migliora"},{id:"dialogo",l:"💬 Dialogo"},{id:"riassumi",l:"📝 Riassumi"}].map(a=>(
            <button key={a.id} onClick={()=>aiAction(a.id)} disabled={aiLoading} style={{padding:"6px 12px",borderRadius:20,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:12,opacity:aiLoading?0.5:1}}>{a.l}</button>
          ))}
          <div style={{flex:1,display:"flex",gap:6}}>
            <input value={aiAssist} onChange={e=>setAiAssist(e.target.value)} onKeyDown={e=>e.key==="Enter"&&aiAction("custom")} placeholder="Chiedi qualcosa all'AI..." style={{...inp,padding:"6px 12px",fontSize:12}} />
            <button onClick={()=>aiAction("custom")} disabled={aiLoading||!aiAssist} style={{...goldBtn,padding:"6px 14px",fontSize:12,opacity:(!aiAssist||aiLoading)?0.5:1}}>→</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   COVER PANEL
───────────────────────────────────────────── */
function CoverPanel({book}){
  const [coverTab,setCoverTab]=useState("front"); // front | back
  const [theme,setTheme]=useState(0);
  const [subtitle,setSubtitle]=useState("");
  const [aiTagline,setAiTagline]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [bgImage,setBgImage]=useState(null);
  const [bgOpacity,setBgOpacity]=useState(0.35);
  const [imgPrompt,setImgPrompt]=useState("");
  const [imgGenLoading,setImgGenLoading]=useState(false);
  const [imgGenError,setImgGenError]=useState("");
  const [titleSize,setTitleSize]=useState(null);
  const [subtitleSize,setSubtitleSize]=useState(18);
  const canvasRef=useRef(null);
  const backCanvasRef=useRef(null);
  const fileInputRef=useRef(null);
  const bgImgRef=useRef(null);
  // Back cover state
  const [backBlurb,setBackBlurb]=useState("");
  const [backBio,setBackBio]=useState("");
  const [backBlurbLoading,setBackBlurbLoading]=useState(false);
  const [backBioLoading,setBackBioLoading]=useState(false);
  const [backBullets,setBackBullets]=useState("");
  const [backTagline,setBackTagline]=useState("");

  const t=COVER_THEMES[theme];
  const title=book.title||"Il Mio Libro";
  const author=book.author||"Autore";

  // Funzione helper: testo a capo automatico con wrapping
  function wrapText(ctx,text,x,y,maxW,lineH){
    const words=text.split(" ");
    let line="",lines=[];
    for(const w of words){
      const test=line+w+" ";
      if(ctx.measureText(test).width>maxW&&line){lines.push(line.trim());line=w+" ";}
      else line=test;
    }
    lines.push(line.trim());
    lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));
    return lines.length;
  }

  function drawCover(){
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // Sfondo gradiente
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,t.bg);
    grad.addColorStop(1,t.accent+"33");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);

    // Foto di sfondo (se presente)
    if(bgImgRef.current&&bgImgRef.current.complete){
      ctx.save();
      ctx.globalAlpha=bgOpacity;
      // cover fit: copre tutto mantenendo proporzioni
      const img=bgImgRef.current;
      const scale=Math.max(W/img.width,H/img.height);
      const dw=img.width*scale,dh=img.height*scale;
      const dx=(W-dw)/2,dy=(H-dh)/2;
      ctx.drawImage(img,dx,dy,dw,dh);
      ctx.restore();
      // overlay scuro per leggibilità testo
      const overlay=ctx.createLinearGradient(0,0,0,H);
      overlay.addColorStop(0,t.bg+"cc");
      overlay.addColorStop(0.4,t.bg+"88");
      overlay.addColorStop(0.75,t.bg+"aa");
      overlay.addColorStop(1,t.bg+"ff");
      ctx.fillStyle=overlay;
      ctx.fillRect(0,0,W,H);
    } else {
      // Decorazione geometrica quando non c'è foto
      ctx.strokeStyle=t.accent+"22";
      ctx.lineWidth=1;
      for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(W*0.78,H*0.25,50+i*35,0,Math.PI*2);ctx.stroke();}
    }

    const PAD=36;
    const maxW=W-PAD*2;

    // Genere
    ctx.font="bold 13px monospace";
    ctx.fillStyle=t.accent;
    ctx.fillText((book.genre||"").toUpperCase(),PAD,38);

    // Linea decorativa
    ctx.fillStyle=t.accent;
    ctx.fillRect(PAD,48,maxW,2);

    // Titolo — wrapping automatico
    const autoFs=title.length>20?38:title.length>12?46:54;
    const fs=titleSize||autoFs;
    ctx.font=`bold ${fs}px serif`;
    ctx.fillStyle=t.text;
    ctx.shadowColor=t.accent;
    ctx.shadowBlur=bgImgRef.current?15:20;
    const titleY=H*0.36;
    const titleLines=wrapText(ctx,title,PAD,titleY,maxW,fs*1.25);
    ctx.shadowBlur=0;

    // Sottotitolo — wrapping automatico
    let afterTitle=titleY+titleLines*fs*1.25+14;
    if(subtitle){
      ctx.font=`italic ${subtitleSize}px serif`;
      ctx.fillStyle=t.accent;
      const subLines=wrapText(ctx,subtitle,PAD,afterTitle,maxW,subtitleSize*1.4);
      afterTitle+=subLines*subtitleSize*1.4+10;
    }

    // Tagline AI
    if(aiTagline){
      ctx.font=`14px Georgia`;
      ctx.fillStyle=t.text+"aa";
      wrapText(ctx,`"${aiTagline}"`,PAD,Math.max(afterTitle+10,H*0.68),maxW,18);
    }

    // Linea autore
    ctx.fillStyle=t.accent;
    ctx.fillRect(PAD,H-72,maxW,1);
    ctx.font=`bold 20px serif`;
    ctx.fillStyle=t.text;
    ctx.shadowColor=t.accent;
    ctx.shadowBlur=10;
    ctx.fillText(author.toUpperCase(),PAD,H-44);
    ctx.shadowBlur=0;
    ctx.font="9px monospace";
    ctx.fillStyle=t.text+"44";
    ctx.fillText("BookForge Edition",PAD,H-24);
  }

  // Ridisegna quando cambiano dipendenze
  useEffect(()=>{drawCover();},[theme,book.title,book.author,subtitle,aiTagline,bgImage,bgOpacity,titleSize,subtitleSize]);

  // Carica foto utente
  const handlePhotoUpload=async(file)=>{
    if(!file||!file.type.startsWith("image/"))return;
    const data=await fileToBase64(file);
    const img=new Image();
    img.onload=()=>{bgImgRef.current=img;setBgImage(data);};
    img.src=data;
  };

  // Genera immagine AI tramite un servizio gratuito (Pollinations)
  const generateAIImage=async()=>{
    if(!imgPrompt.trim())return;
    setImgGenLoading(true);
    setImgGenError("");
    try{
      // Pollinations.ai - API gratuita senza chiave
      const encodedPrompt=encodeURIComponent(imgPrompt+", book cover style, professional photography, high quality");
      const url=`https://image.pollinations.ai/prompt/${encodedPrompt}?width=400&height=600&nologo=true&seed=${Date.now()}`;
      const img=new Image();
      img.crossOrigin="anonymous";
      await new Promise((resolve,reject)=>{
        img.onload=resolve;
        img.onerror=()=>reject(new Error("Generazione immagine fallita"));
        img.src=url;
        setTimeout(()=>reject(new Error("Timeout generazione (30s)")),30000);
      });
      bgImgRef.current=img;
      // Converti in data URL per salvataggio
      const tmp=document.createElement("canvas");
      tmp.width=400;tmp.height=600;
      const tc=tmp.getContext("2d");
      const scale=Math.max(400/img.width,600/img.height);
      tc.drawImage(img,(400-img.width*scale)/2,(600-img.height*scale)/2,img.width*scale,img.height*scale);
      setBgImage(tmp.toDataURL("image/jpeg",0.9));
    }catch(e){
      setImgGenError(e.message);
    }
    setImgGenLoading(false);
  };

  const removeBg=()=>{bgImgRef.current=null;setBgImage(null);};

  const genTagline=async()=>{
    setAiLoading(true);
    const r=await callClaude(`Genera UNA sola frase tagline (max 10 parole) per il libro "${title}" genere "${book.genre||"narrativa"}". Solo la frase, niente altro.`);
    setAiTagline(r.trim().replace(/^["']|["']$/g,""));\n    setAiLoading(false);\n  };\n\n  // ── Back cover generators ──────────────────────────────────────────\n  const genBlurb=async()=>{\n    setBackBlurbLoading(true);\n    const chSample=book.chapters.slice(0,3).map(c=>c.content?.slice(0,200)||"").join(" ");\n    const r=await callClaude(\n      `Scrivi un testo di quarta di copertina (blurb) per il libro "${book.title||"Senza titolo"}" genere "${book.genre||"saggio"}". ${chSample?`Estratto: ${chSample}`:""}\nIl blurb deve: catturare l'attenzione in 3-4 frasi, creare curiosità, terminare con una domanda o affermazione forte. Max 80 parole. Solo il testo, niente commenti.`\n    );\n    setBackBlurb(r.trim());\n    setBackBlurbLoading(false);\n  };\n\n  const genBio=async()=>{\n    setBackBioLoading(true);\n    const r=await callClaude(\n      `Scrivi una breve bio d'autore (40-50 parole) per ${book.author||"l'autore"} che ha scritto "${book.title||"questo libro"}" nel genere "${book.genre||"saggio"}". Tono professionale ma caldo. Solo la bio, niente altro.`
    );
    setBackBio(r.trim());
    setBackBioLoading(false);
  };

  function drawBackCover(){
    const canvas=backCanvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    const t=COVER_THEMES[theme];
    const PAD=32;

    // Sfondo uguale alla copertina fronte
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,t.bg);
    grad.addColorStop(1,t.accent+"33");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);

    // Striscia colore in cima
    ctx.fillStyle=t.accent+"33";
    ctx.fillRect(0,0,W,60);
    ctx.fillStyle=t.accent;
    ctx.fillRect(0,58,W,3);

    // Genere in alto
    ctx.font="bold 11px monospace";
    ctx.fillStyle=t.accent;
    ctx.fillText((book.genre||"").toUpperCase(),PAD,36);

    // Tagline grande (se presente)
    let y=90;
    if(backTagline){
      ctx.font=`italic 18px serif`;
      ctx.fillStyle=t.text+"cc";
      const words=backTagline.split(" ");
      let line="";
      for(const w of words){
        const test=line+w+" ";
        if(ctx.measureText(test).width>W-PAD*2&&line){
          ctx.fillText(`"${line.trim()}"`,PAD,y);y+=24;line=w+" ";
        } else line=test;
      }
      if(line.trim()) ctx.fillText(`"${line.trim()}"`,PAD,y);
      y+=36;
    }

    // Blurb
    if(backBlurb){
      ctx.font="15px Georgia";
      ctx.fillStyle=t.text;
      const words=backBlurb.split(" ");
      let line="",lineH=22;
      for(const w of words){
        const test=line+w+" ";
        if(ctx.measureText(test).width>W-PAD*2&&line){
          ctx.fillText(line.trim(),PAD,y);y+=lineH;line=w+" ";
        } else line=test;
        if(y>H*0.56){ctx.fillText(line.trim()+"...",PAD,y);line="";break;}
      }
      if(line.trim()) ctx.fillText(line.trim(),PAD,y);
      y+=30;
    }

    // Bullets (se presenti)
    if(backBullets){
      const items=backBullets.split('\n').filter(b=>b.trim()).slice(0,4);
      ctx.font="13px Georgia";
      for(const item of items){
        ctx.fillStyle=t.accent;
        ctx.fillText("▸",PAD,y);
        ctx.fillStyle=t.text+"cc";
        ctx.fillText(item.replace(/^[-•▸]\s*/,""),PAD+16,y);
        y+=22;
      }
      y+=10;
    }

    // Linea separatore bio
    ctx.fillStyle=t.accent+"55";
    ctx.fillRect(PAD,H-130,W-PAD*2,1);

    // Bio autore
    if(backBio){
      ctx.font="bold 11px monospace";
      ctx.fillStyle=t.accent;
      ctx.fillText("L'AUTORE",PAD,H-112);\n      ctx.font="11px Georgia";\n      ctx.fillStyle=t.text+"99";\n      const words=backBio.split(" ");\n      let line="",lineH=16,by=H-96;\n      for(const w of words){\n        const test=line+w+" ";\n        if(ctx.measureText(test).width>W-PAD*2&&line){\n          ctx.fillText(line.trim(),PAD,by);by+=lineH;line=w+" ";\n          if(by>H-52) break;\n        } else line=test;\n      }\n      if(line.trim()&&by<H-52) ctx.fillText(line.trim(),PAD,by);\n    }\n\n    // Barcode placeholder\n    ctx.fillStyle=t.text+"22";\n    ctx.fillRect(W-PAD-60,H-50,60,36);\n    ctx.font="8px monospace";\n    ctx.fillStyle=t.text+"44";\n    ctx.fillText("ISBN",W-PAD-52,H-58);\n    for(let i=0;i<20;i++){\n      ctx.fillStyle=t.text+(i%3===0?"88":"44");\n      ctx.fillRect(W-PAD-58+i*3,H-50,2,28);\n    }\n\n    // Titolo piccolo in fondo\n    ctx.font="bold 10px monospace";\n    ctx.fillStyle=t.accent+"88";\n    ctx.fillText((book.title||"").toUpperCase().slice(0,30),PAD,H-12);\n    ctx.fillStyle=t.text+"33";\n    ctx.font="9px monospace";\n    ctx.fillText("BookForge Edition",W-PAD-90,H-12);\n  }\n\n  useEffect(()=>{if(coverTab==="back") drawBackCover();},[coverTab,theme,backBlurb,backBio,backBullets,backTagline,book.title,book.author,book.genre]);\n\n  const downloadBack=()=>{\n    const a=document.createElement("a");\n    a.href=backCanvasRef.current.toDataURL("image/png");\n    a.download=`quarta_copertina_${(book.title||"libro").replace(/\s+/g,"_")}.png`;\n    a.click();\n  };\n\n  const download=()=>{\n    const a=document.createElement("a");\n    a.href=canvasRef.current.toDataURL("image/png");\n    a.download=`copertina_${title.replace(/\s+/g,"_")}.png`;\n    a.click();\n  };\n\n  return(\n    <div style={{display:"flex",flex:1,overflow:"hidden",flexDirection:"column"}}>\n      {/* Tab switcher Fronte / Retro */}\n      <div style={{display:"flex",gap:0,borderBottom:"1px solid #1a1929",background:"#0c0b18",padding:"0 20px"}}>\n        {[["front","🎨 Copertina (Fronte)"],["back","📋 Quarta di Copertina (Retro)"]].map(([tab,label])=>(\n          <button key={tab} onClick={()=>setCoverTab(tab)} style={{padding:"12px 20px",border:"none",borderBottom:`2px solid ${coverTab===tab?"#f5c842":"transparent"}`,background:"transparent",color:coverTab===tab?"#f5c842":"#5a5870",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:coverTab===tab?700:400,transition:"all 0.15s"}}>\n            {label}\n          </button>\n        ))}\n      </div>\n\n      {/* FRONTE */}\n      {coverTab==="front"&&(\n      <div style={{display:"flex",flex:1,overflow:"hidden"}}>\n      {/* Pannello controlli */}\n      <div style={{width:300,background:"#0f0e1b",borderRight:"1px solid #1a1929",overflowY:"auto",padding:20}}>\n        <div style={{fontSize:13,color:"#f5c842",marginBottom:4,fontFamily:"'Playfair Display',serif"}}>🎨 COPERTINA FRONTE</div>\n\n        {/* Tema */}\n        <Lbl>Tema visivo</Lbl>\n        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:4}}>\n          {COVER_THEMES.map((ct,i)=>(\n            <button key={i} onClick={()=>setTheme(i)} style={{padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:11,border:theme===i?`1px solid ${ct.accent}`:"1px solid #2e2d3e",background:theme===i?ct.accent+"22":"transparent",color:theme===i?ct.accent:"#7a7890"}}>{ct.label}</button>\n          ))}\n        </div>\n\n        {/* Testo */}\n        <Lbl>Sottotitolo</Lbl>\n        <input value={subtitle} onChange={e=>setSubtitle(e.target.value)} placeholder="es. 100 ricette della tradizione..." style={inp} />\n        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>\n          <span style={{fontSize:11,color:"#5a5870",flexShrink:0}}>Dimensione: {subtitleSize}px</span>\n          <input type="range" min={12} max={28} value={subtitleSize} onChange={e=>setSubtitleSize(+e.target.value)} style={{flex:1}} />\n        </div>\n\n        <Lbl>Dimensione titolo</Lbl>\n        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>\n          {[null,28,34,42,50,58].map(v=>(\n            <button key={v||"auto"} onClick={()=>setTitleSize(v)} style={{padding:"4px 10px",borderRadius:16,border:`1px solid ${titleSize===v?"#f5c842":"#2e2d3e"}`,background:titleSize===v?"#f5c84222":"transparent",color:titleSize===v?"#f5c842":"#5a5870",cursor:"pointer",fontSize:11}}>\n              {v||"Auto"}\n            </button>\n          ))}\n        </div>\n\n        <Lbl>Tagline AI</Lbl>\n        <button onClick={genTagline} disabled={aiLoading} style={{...goldBtn,width:"100%",fontSize:12,padding:"9px 0"}}>\n          {aiLoading?"⏳ Generando...":"✨ Genera tagline AI"}\n        </button>\n        {aiTagline&&(\n          <div style={{background:"#1a1829",borderRadius:8,padding:"8px 10px",marginTop:6,fontSize:11,color:"#f5c842",fontStyle:"italic",border:"1px solid #f5c84244",display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>\n            <span>"{aiTagline}"</span>\n            <button onClick={()=>setAiTagline("")} style={{background:"none",border:"none",color:"#5a5870",cursor:"pointer",fontSize:14,flexShrink:0}}>×</button>\n          </div>\n        )}\n\n        {/* Foto sfondo */}\n        <div style={{height:1,background:"#1e1d2e",margin:"16px 0"}} />\n        <div style={{fontSize:12,color:"#38bdf8",fontFamily:"'Playfair Display',serif",marginBottom:10}}>📸 Foto di sfondo</div>\n\n        {/* Upload foto */}\n        <div onClick={()=>fileInputRef.current?.click()}\n          style={{border:"2px dashed #2e2d3e",borderRadius:10,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,marginBottom:10,background:"#0c0b18"}}>\n          <span style={{fontSize:20}}>📷</span>\n          <div>\n            <div style={{fontSize:12,color:"#c8c6d8"}}>Carica tua foto</div>\n            <div style={{fontSize:10,color:"#5a5870"}}>JPG, PNG, WebP</div>\n          </div>\n          <input ref={fileInputRef} type="file" acce function TranslatePanel({book,setBook}){
  const [targetLang,setTargetLang]=useState("en");const [loading,setLoading]=useState(false);const [progress,setProgress]=useState({current:0,total:0,name:""});const [translated,setTranslated]=useState(null);const [error,setError]=useState("");
  const translate=async()=>{setLoading(true);setError("");setTranslated(null);const langLabel=LANGUAGES.find(l=>l.code===targetLang)?.label||targetLang;const total=book.chapters.length;const result=[];try{for(let i=0;i<total;i++){const ch=book.chapters[i];setProgress({current:i+1,total,name:ch.title||`Capitolo ${i+1}`});const r=await callClaude(`Traduci fedelmente in ${langLabel} questo testo letterario. Mantieni stile e tono. Solo il testo tradotto:\n\nTITOLO: ${ch.title}\n\n${ch.content||"(vuoto)"}`,`Sei un traduttore letterario professionista specializzato in ${langLabel}.`);result.push({title:ch.title,content:r.trim(),images:ch.images||[]});}setTranslated({lang:langLabel,chapters:result});}catch(e){setError("Errore: "+e.message);}setLoading(false);};
  const pct=progress.total?Math.round((progress.current/progress.total)*100):0;
  return(<div style={{flex:1,padding:36,overflowY:"auto"}}><h2 style={{fontFamily:"'Playfair Display',serif",color:"#f5c842",fontSize:26,marginBottom:4}}>Traduzione Automatica</h2><p style={{color:"#7a7890",marginBottom:28,fontSize:14}}>Traduci l'intero libro preservando lo stile letterario.</p><div style={{maxWidth:640}}><Lbl>Lingua di destinazione</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:24}}>{LANGUAGES.filter(l=>l.code!=="it").map(l=>(<button key={l.code} onClick={()=>setTargetLang(l.code)} style={{padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:13,border:targetLang===l.code?"1px solid #f5c842":"1px solid #2e2d3e",background:targetLang===l.code?"#f5c84222":"transparent",color:targetLang===l.code?"#f5c842":"#7a7890",fontWeight:targetLang===l.code?700:400}}>{l.flag} {l.label}</button>))}</div><div style={{...card,marginBottom:20,display:"flex",gap:32}}><div><div style={{fontSize:22,fontWeight:700,color:"#f5c842",fontFamily:"monospace"}}>{book.chapters.length}</div><div style={{fontSize:11,color:"#5a5870"}}>capitoli</div></div><div><div style={{fontSize:22,fontWeight:700,color:"#c084fc",fontFamily:"monospace"}}>{book.chapters.reduce((a,c)=>a+(c.content.trim()?c.content.trim().split(/\s+/).length:0),0).toLocaleString()}</div><div style={{fontSize:11,color:"#5a5870"}}>parole</div></div><div><div style={{fontSize:22}}>{LANGUAGES.find(l=>l.code===targetLang)?.flag}</div><div style={{fontSize:11,color:"#5a5870"}}>{LANGUAGES.find(l=>l.code===targetLang)?.label}</div></div></div>{loading&&(<div style={{marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12,color:"#7a7890"}}><span>Capitolo: <span style={{color:"#f5c842"}}>{progress.name}</span></span><span>{pct}%</span></div><div style={{background:"#1a1829",borderRadius:4,height:8,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#f5c842,#c084fc)",borderRadius:4,transition:"width 0.5s"}} /></div></div>)}{error&&<div style={{background:"#2e1a1a",border:"1px solid #5e2a2a",borderRadius:8,padding:14,color:"#ff6b6b",fontSize:13,marginBottom:20}}>{error}</div>}{translated&&(<div style={{background:"#0d1f0d",border:"1px solid #1a4a1a",borderRadius:12,padding:20,marginBottom:20}}><div style={{color:"#4ade80",fontSize:14,fontWeight:700,marginBottom:8}}>✅ Traduzione completata in {translated.lang}!</div><div style={{color:"#a8d8a8",fontSize:13,lineHeight:1.65,maxHeight:100,overflow:"hidden",fontStyle:"italic"}}>{translated.chapters[0]?.content?.slice(0,280)}...</div><div style={{display:"flex",gap:8,marginTop:14}}><button onClick={()=>{setBook(b=>({...b,title:b.title+` [${translated.lang}]`,chapters:translated.chapters}));setTranslated(null);}} style={goldBtn}>Applica al progetto</button><button onClick={()=>setTranslated(null)} style={{padding:"10px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>Scarta</button></div></div>)}<button onClick={translate} disabled={loading} style={{...goldBtn,opacity:loading?0.6:1,cursor:loading?"not-allowed":"pointer"}}>{loading?`⏳ Capitolo ${progress.current}/${progress.total}...`:`🌍 Traduci in ${LANGUAGES.find(l=>l.code===targetLang)?.label}`}</button></div></div>);
