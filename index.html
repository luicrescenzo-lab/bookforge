/* ─────────────────────────────────────────────
   SERIES PANEL — Gestione serie di libri
───────────────────────────────────────────── */
function SeriesPanel({book,setBook,projects}){
  const STORE_KEY="series_data_v1";
  const [series,setSeries]=useState([]); // [{id,name,genre,description,volumes:[projId,...],bible:{characters,places,timeline,rules}}]
  const [activeSeries,setActiveSeries]=useState(null); // id serie attiva
  const [tab,setTab]=useState("overview"); // overview | bible | consistency
  const [loaded,setLoaded]=useState(false);
  // form nuova serie
  const [showNewForm,setShowNewForm]=useState(false);
  const [newName,setNewName]=useState("");
  const [newDesc,setNewDesc]=useState("");
  // bible editing
  const [bibleTab,setBibleTab]=useState("characters");
  const [aiLoading,setAiLoading]=useState(false);
  const [consistencyReport,setConsistencyReport]=useState(null);
  const [consistencyLoading,setConsistencyLoading]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const r=await window.storage.get(STORE_KEY);
        if(r?.value) setSeries(JSON.parse(r.value));
      }catch{}
      setLoaded(true);
    })();
  },[]);

  const saveSeries=async(newSeries)=>{
    try{ await window.storage.set(STORE_KEY,JSON.stringify(newSeries)); }catch{}
  };

  const createSeries=async()=>{
    if(!newName.trim())return;
    const s={
      id:`ser_${Date.now()}`,
      name:newName.trim(),
      description:newDesc.trim(),
      genre:book.genre||"Romanzo",
      volumes:[],
      bible:{characters:"",places:"",timeline:"",rules:"",style:""}
    };
    const ns=[...series,s];
    setSeries(ns);
    await saveSeries(ns);
    setActiveSeries(s.id);
    setShowNewForm(false);
    setNewName("");setNewDesc("");
    setTab("overview");
  };

  const deleteSeries=async(id)=>{
    const ns=series.filter(s=>s.id!==id);
    setSeries(ns);
    await saveSeries(ns);
    if(activeSeries===id) setActiveSeries(null);
  };

  const updateBible=async(serId,field,value)=>{
    const ns=series.map(s=>s.id===serId?{...s,bible:{...s.bible,[field]:value}}:s);
    setSeries(ns);
    await saveSeries(ns);
  };

  const toggleVolume=async(serId,projId)=>{
    const ns=series.map(s=>{
      if(s.id!==serId)return s;
      const vols=s.volumes.includes(projId)?s.volumes.filter(v=>v!==projId):[...s.volumes,projId];
      // ordina per data creazione
      const sorted=vols.sort((a,b)=>{
        const pa=projects.find(p=>p.id===a);
        const pb=projects.find(p=>p.id===b);
        return (pa?.createdAt||0)-(pb?.createdAt||0);
      });
      return{...s,volumes:sorted};
    });
    setSeries(ns);
    await saveSeries(ns);
  };

  const generateBible=async(serId)=>{
    const ser=series.find(s=>s.id===serId);
    if(!ser)return;
    setAiLoading(true);
    // Raccoglie estratti dai volumi della serie
    const volData=ser.volumes.map(vid=>{
      const p=projects.find(pr=>pr.id===vid);
      if(!p)return null;
      const text=(p.chapters||[]).map(c=>c.content?.slice(0,300)||"").join(" ").slice(0,600);
      return `VOLUME "${p.title}": ${text}`;
    }).filter(Boolean).join("\n\n");

    const prompt=`Sei un editor letterario. Analizza questa serie di libri "${ser.name}" (${ser.genre}) e crea la "bibbia della serie".
${volData?`\nEstratti dai volumi:\n${volData}`:""}
${ser.description?`Descrizione serie: ${ser.description}`:""}

Rispondi SOLO con JSON valido:
{
  "characters": "Elenco personaggi principali con descrizione fisica, carattere, ruolo nella serie. Un personaggio per riga, formato: NOME — descrizione",
  "places": "Luoghi principali della serie con descrizione atmosfera e importanza narrativa. Un luogo per riga.",
  "timeline": "Linea temporale degli eventi chiave della serie. Formato: [Libro X / Evento] — descrizione",
  "rules": "Regole del mondo narrativo: leggi, magia, tecnologia, convenzioni sociali che devono essere coerenti tra i volumi",
  "style": "Stile narrativo da mantenere: tono, ritmo, punto di vista, lunghezza media capitoli, elementi ricorrenti"
}`;

    try{
      const r=await callClaude(prompt,"Sei un editor esperto di serie letterarie. Solo JSON.",1400);
      const data=JSON.parse(r.replace(/```json|```/g,"").trim());
      const ns=series.map(s=>s.id===serId?{...s,bible:{...s.bible,...data}}:s);
      setSeries(ns);
      await saveSeries(ns);
    }catch(e){console.error(e);}
    setAiLoading(false);
  };

  const checkConsistency=async(serId)=>{
    const ser=series.find(s=>s.id===serId);
    if(!ser||ser.volumes.length<2)return;
    setConsistencyLoading(true);
    setConsistencyReport(null);

    const bibleText=Object.entries(ser.bible).filter(([,v])=>v).map(([k,v])=>`${k.toUpperCase()}:\n${v}`).join("\n\n");
    const volSummaries=ser.volumes.map((vid,i)=>{
      const p=projects.find(pr=>pr.id===vid);
      if(!p)return null;
      const text=(p.chapters||[]).map(c=>c.content?.slice(0,200)||"").join(" ").slice(0,500);
      return `VOLUME ${i+1} "${p.title}": ${text}`;
    }).filter(Boolean).join("\n\n");

    const prompt=`Sei un editor che controlla la coerenza di una serie letteraria.

BIBBIA DELLA SERIE:
${bibleText||"Non ancora definita"}

CONTENUTO DEI VOLUMI:
${volSummaries}

Analizza e rispondi SOLO con JSON:
{
  "score": 85,
  "problemi": [
    {"tipo":"Personaggio","titolo":"Nome del problema","dettaglio":"descrizione","volumi":"Vol.1 vs Vol.2","gravita":"alta/media/bassa"}
  ],
  "coerenze": ["punto di forza 1","punto di forza 2","punto di forza 3"],
  "consigli": ["consiglio pratico 1","consiglio pratico 2","consiglio pratico 3"]
}`;

    try{
      const r=await callClaude(prompt,"Editor esperto serie letterarie. Solo JSON.",1200);
      setConsistencyReport(JSON.parse(r.replace(/```json|```/g,"").trim()));
    }catch(e){setConsistencyReport({error:e.message});}
    setConsistencyLoading(false);
  };

  const cur=series.find(s=>s.id===activeSeries);
  const curVolumes=cur?cur.volumes.map(vid=>projects.find(p=>p.id===vid)).filter(Boolean):[];

  const scoreColor=(s)=>s>=80?"#4ade80":s>=60?"#f5c842":"#f87171";

  return(
    <div style={{display:"flex",flex:1,overflow:"hidden",background:"#0f0e17"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>

      {/* Sidebar serie */}
      <div style={{width:240,background:"#0c0b18",borderRight:"1px solid #1a1929",overflowY:"auto",padding:14,flexShrink:0}}>
        <div style={{fontSize:13,color:"#c084fc",marginBottom:12,fontFamily:"'Playfair Display',serif"}}>📚 SERIE</div>

        <button onClick={()=>setShowNewForm(v=>!v)} style={{...goldBtn,width:"100%",fontSize:12,padding:"9px 0",marginBottom:12}}>
          {showNewForm?"✕ Annulla":"+ Nuova serie"}
        </button>

        {showNewForm&&(
          <div style={{background:"#12111e",borderRadius:10,padding:12,marginBottom:12,border:"1px solid #c084fc33"}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nome della serie..." style={{...inp,marginBottom:8,fontSize:12}} />
            <textarea value={newDesc} onChange={e=>setNewDesc(e.target.value)} placeholder="Descrizione breve..." rows={2} style={{...inp,fontSize:11,resize:"none",marginBottom:8}} />
            <button onClick={createSeries} disabled={!newName.trim()} style={{...goldBtn,width:"100%",fontSize:12,padding:"7px 0",opacity:!newName.trim()?0.5:1}}>✅ Crea</button>
          </div>
        )}

        {!loaded&&<div style={{fontSize:12,color:"#3a3850",textAlign:"center",padding:20}}>⏳ Caricamento...</div>}

        {loaded&&series.length===0&&!showNewForm&&(
          <div style={{fontSize:12,color:"#3a3850",textAlign:"center",padding:"20px 10px",lineHeight:1.6}}>
            Crea una serie per collegare i tuoi libri e mantenere coerenza tra i volumi.
          </div>
        )}

        {series.map(s=>{
          const vCount=s.volumes.length;
          const isActive=s.id===activeSeries;
          return(
            <div key={s.id} onClick={()=>{setActiveSeries(s.id);setTab("overview");setConsistencyReport(null);}}
              style={{padding:"10px 12px",borderRadius:8,marginBottom:6,cursor:"pointer",
                background:isActive?"#1a1829":"#12111e",
                border:`1px solid ${isActive?"#c084fc":"#1e1d2e"}`,
                borderLeft:`3px solid ${isActive?"#c084fc":"transparent"}`}}>
              <div style={{fontSize:13,color:isActive?"#c084fc":"#c8c6d8",fontFamily:"'Playfair Display',serif",marginBottom:3}}>{s.name}</div>
              <div style={{fontSize:11,color:"#5a5870"}}>{vCount} {vCount===1?"volume":"volumi"} · {s.genre}</div>
              {s.description&&<div style={{fontSize:10,color:"#3a3850",marginTop:3,lineHeight:1.4,overflow:"hidden",maxHeight:28}}>{s.description}</div>}
            </div>
          );
        })}
      </div>

      {/* Contenuto principale */}
      <div style={{flex:1,overflowY:"auto",padding:"24px 32px"}}>

        {/* Stato vuoto */}
        {!cur&&(
          <div style={{textAlign:"center",padding:"80px 40px",color:"#3a3850"}}>
            <div style={{fontSize:60,marginBottom:16}}>📚</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#5a5870",marginBottom:8}}>Nessuna serie selezionata</div>
            <div style={{fontSize:13,lineHeight:1.7}}>
              Crea una serie per collegare più libri,<br/>
              mantenere la bibbia del mondo narrativo<br/>
              e controllare la coerenza tra i volumi.
            </div>
          </div>
        )}

        {cur&&(
          <>
            {/* Header serie */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#c084fc",marginBottom:4}}>{cur.name}</div>
                <div style={{fontSize:13,color:"#5a5870"}}>{cur.genre} · {curVolumes.length} {curVolumes.length===1?"volume":"volumi"}</div>
                {cur.description&&<div style={{fontSize:12,color:"#7a7890",marginTop:4,maxWidth:500}}>{cur.description}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                {cur.volumes.length>=1&&(
                  <button onClick={()=>generateBible(cur.id)} disabled={aiLoading} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #c084fc44",background:"#c084fc11",color:"#c084fc",cursor:"pointer",fontSize:12,fontFamily:"inherit",opacity:aiLoading?0.5:1}}>
                    {aiLoading?"⏳ Generando...":"🤖 Genera bibbia AI"}
                  </button>
                )}
                {cur.volumes.length>=2&&(
                  <button onClick={()=>{setTab("consistency");checkConsistency(cur.id);}} disabled={consistencyLoading} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #f5c84244",background:"#f5c84211",color:"#f5c842",cursor:"pointer",fontSize:12,fontFamily:"inherit",opacity:consistencyLoading?0.5:1}}>
                    {consistencyLoading?"⏳ Analisi...":"🔍 Controlla coerenza"}
                  </button>
                )}
                <button onClick={()=>deleteSeries(cur.id)} style={{padding:"8px 12px",borderRadius:8,border:"1px solid #ef444433",background:"transparent",color:"#f87171",cursor:"pointer",fontSize:12}}>🗑</button>
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:6,marginBottom:20}}>
              {[
                {id:"overview",l:"📖 Volumi"},
                {id:"bible",l:"📜 Bibbia della serie"},
                {id:"consistency",l:"🔍 Coerenza"},
              ].map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${tab===t.id?"#c084fc":"#2e2d3e"}`,background:tab===t.id?"#c084fc18":"transparent",color:tab===t.id?"#c084fc":"#7a7890",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{t.l}</button>
              ))}
            </div>

            {/* TAB: VOLUMI */}
            {tab==="overview"&&(
              <div>
                <div style={{fontSize:13,color:"#5a5870",marginBottom:16}}>
                  Aggiungi i tuoi progetti esistenti a questa serie. I volumi vengono ordinati per data di creazione.
                </div>

                {/* Volumi già nella serie */}
                {curVolumes.length>0&&(
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:12,color:"#c084fc",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>📚 Volumi della serie</div>
                    <div style={{display:"grid",gap:8}}>
                      {curVolumes.map((p,i)=>{
                        const wc=(p.chapters||[]).reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0);
                        const isCurrentBook=p.id===book?.id;  // usa book prop direttamente
                        return(
                          <div key={p.id} style={{...card,padding:"14px 18px",display:"flex",alignItems:"center",gap:14,borderColor:isCurrentBook?"#c084fc44":"#1e1d2e"}}>
                            <div style={{width:32,height:32,borderRadius:8,background:"#c084fc22",border:"1px solid #c084fc44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#c084fc",flexShrink:0}}>{i+1}</div>
                            <div style={{flex:1}}>
                              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#c8c6d8"}}>{p.title||"Senza titolo"}</div>
                              <div style={{fontSize:11,color:"#5a5870",marginTop:2}}>{wc.toLocaleString()} parole · {(p.chapters||[]).length} capitoli{isCurrentBook?" · ✏️ aperto ora":""}</div>
                            </div>
                            <button onClick={()=>toggleVolume(cur.id,p.id)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid #ef444433",background:"transparent",color:"#f87171",cursor:"pointer",fontSize:11}}>
                              − Rimuovi
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Progetti non ancora nella serie */}
                <div>
                  <div style={{fontSize:12,color:"#5a5870",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>➕ Aggiungi progetto alla serie</div>
                  {projects.filter(p=>!cur.volumes.includes(p.id)).length===0?(
                    <div style={{fontSize:12,color:"#3a3850",padding:"16px 0"}}>Tutti i progetti sono già in questa serie.</div>
                  ):(
                    <div style={{display:"grid",gap:8}}>
                      {projects.filter(p=>!cur.volumes.includes(p.id)).map(p=>{
                        const wc=(p.chapters||[]).reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0);
                        return(
                          <div key={p.id} style={{...card,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,opacity:0.7}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:14,color:"#c8c6d8"}}>{p.title||"Senza titolo"}</div>
                              <div style={{fontSize:11,color:"#5a5870"}}>{p.genre} · {wc.toLocaleString()} parole</div>
                            </div>
                            <button onClick={()=>toggleVolume(cur.id,p.id)} style={{...goldBtn,padding:"6px 14px",fontSize:12}}>
                              + Aggiungi
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TAB: BIBBIA */}
            {tab==="bible"&&(
              <div>
                <div style={{fontSize:13,color:"#5a5870",marginBottom:16,lineHeight:1.6}}>
                  La bibbia della serie è il documento di riferimento per mantenere coerenza tra i volumi — personaggi, luoghi, regole del mondo e stile narrativo. Puoi compilarla a mano o generarla con AI dai tuoi testi.
                </div>

                {/* Sub-tabs bibbia */}
                <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
                  {[
                    {id:"characters",l:"👥 Personaggi",c:"#38bdf8"},
                    {id:"places",l:"🗺 Luoghi",c:"#4ade80"},
                    {id:"timeline",l:"⏱ Timeline",c:"#f5c842"},
                    {id:"rules",l:"⚖️ Regole mondo",c:"#c084fc"},
                    {id:"style",l:"✍️ Stile",c:"#f472b6"},
                  ].map(({id,l,c})=>(
                    <button key={id} onClick={()=>setBibleTab(id)} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${bibleTab===id?c:"#2e2d3e"}`,background:bibleTab===id?c+"18":"transparent",color:bibleTab===id?c:"#7a7890",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{l}</button>
                  ))}
                </div>

                {/* Editor bibbia */}
                {[
                  {id:"characters",placeholder:"MARCO FERRARI — 35 anni, detective privato, cicatrice sul mento. Sarcastico ma leale. Protagonista dal Vol.1.\nSARA MANCINI — sorella minore di Marco, avvocatessa, compare dal Vol.2...",label:"👥 Personaggi"},
                  {id:"places",placeholder:"MILANO, Navigli — quartiere dove vive Marco. Atmosfera grigia e umida. Base operativa di tutta la serie.\nVILLA ROSSI — villa di campagna, scenario del crimine principale in Vol.1...",label:"🗺 Luoghi"},
                  {id:"timeline",placeholder:"[Prima di Vol.1] — Marco lascia la polizia dopo un caso irrisolto\n[Vol.1, cap.3] — primo incontro con Sara\n[Tra Vol.1 e Vol.2] — 6 mesi di pausa narrativa...",label:"⏱ Timeline"},
                  {id:"rules",placeholder:"Il realismo è fondamentale: niente fantascienza o magia\nLe indagini devono avere soluzione logica supportata da indizi nel testo\nOgni volume deve avere una storyline autonoma ma contribuire all\'arco principale...",label:"⚖️ Regole del mondo"},
                  {id:"style",placeholder:"Tono: noir urbano, cinismo di facciata con umanità sottostante\nPunto di vista: terza persona limitata (POV Marco)\nCapitoli brevi (1500-2500 parole), ritmo serrato\nElemento ricorrente: caffè al bar Brera all\'inizio di ogni indagine...",label:"✍️ Stile narrativo"},
                ].filter(({id})=>id===bibleTab).map(({id,placeholder,label})=>(
                  <div key={id}>
                    <div style={{fontSize:12,color:"#7a7890",marginBottom:8}}>{label}</div>
                    <textarea
                      value={cur.bible?.[id]||""}
                      onChange={e=>updateBible(cur.id,id,e.target.value)}
                      placeholder={placeholder}
                      rows={14}
                      style={{...inp,resize:"vertical",lineHeight:1.65,fontSize:13,width:"100%"}}
                    />
                    <div style={{fontSize:11,color:"#3a3850",marginTop:6}}>
                      {cur.bible?.[id]?.trim()?`${cur.bible[id].trim().split(/\s+/).length} parole`:"Vuoto — scrivi o genera con AI"}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* TAB: COERENZA */}
            {tab==="consistency"&&(
              <div>
                {cur.volumes.length<2&&(
                  <div style={{...card,textAlign:"center",padding:"40px",color:"#5a5870"}}>
                    <div style={{fontSize:32,marginBottom:10}}>📚</div>
                    Aggiungi almeno 2 volumi alla serie per controllare la coerenza.
                  </div>
                )}

                {consistencyLoading&&(
                  <div style={{...card,textAlign:"center",padding:"48px",borderColor:"#f5c84433"}}>
                    <div style={{fontSize:40,marginBottom:12}}>🔍</div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#f5c842",marginBottom:6}}>Analisi coerenza in corso...</div>
                    <div style={{fontSize:12,color:"#5a5870"}}>Claude sta confrontando i volumi con la bibbia della serie</div>
                  </div>
                )}

                {consistencyReport?.error&&(
                  <div style={{...card,borderColor:"#ef444433",padding:"20px",color:"#f87171"}}>⚠️ {consistencyReport.error}</div>
                )}

                {consistencyReport&&!consistencyReport.error&&!consistencyLoading&&(
                  <>
                    {/* Score */}
                    <div style={{...card,marginBottom:16,padding:"20px 24px",borderColor:scoreColor(consistencyReport.score)+"33",display:"flex",alignItems:"center",gap:20}}>
                      <div style={{textAlign:"center",flexShrink:0}}>
                        <div style={{fontSize:52,fontWeight:900,color:scoreColor(consistencyReport.score),fontFamily:"monospace",lineHeight:1}}>{consistencyReport.score}</div>
                        <div style={{fontSize:10,color:"#5a5870"}}>coerenza</div>
                      </div>
                      <div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#c8c6d8",marginBottom:8}}>Indice di coerenza narrativa</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {consistencyReport.coerenze?.map((c,i)=>(
                            <span key={i} style={{padding:"4px 12px",borderRadius:20,background:"#4ade8011",border:"1px solid #4ade8033",fontSize:11,color:"#4ade80"}}>✅ {c}</span>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Problemi */}
                    {consistencyReport.problemi?.length>0&&(
                      <div style={{marginBottom:16}}>
                        <div style={{fontSize:13,color:"#c8c6d8",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>⚠️ Incongruenze rilevate ({consistencyReport.problemi.length})</div>
                        <div style={{display:"grid",gap:8}}>
                          {consistencyReport.problemi.map((p,i)=>{
                            const gc=p.gravita==="alta"?"#f87171":p.gravita==="media"?"#f5c842":"#38bdf8";
                            return(
                              <div key={i} style={{...card,padding:"14px 18px",borderColor:gc+"33"}}>
                                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                                  <span style={{padding:"3px 10px",borderRadius:10,fontSize:10,background:gc+"11",border:`1px solid ${gc}33`,color:gc,flexShrink:0}}>{p.gravita}</span>
                                  <div>
                                    <div style={{fontSize:13,color:"#c8c6d8",fontWeight:600,marginBottom:4}}>{p.titolo}</div>
                                    <div style={{fontSize:12,color:"#7a7890",marginBottom:4}}>{p.dettaglio}</div>
                                    {p.volumi&&<div style={{fontSize:11,color:"#5a5870"}}>📚 {p.volumi}</div>}
                                  </div>
                                  <span style={{fontSize:11,color:"#5a5870",flexShrink:0,marginLeft:"auto"}}>{p.tipo}</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* Consigli */}
                    {consistencyReport.consigli?.length>0&&(
                      <div style={{...card,borderColor:"#38bdf822",padding:"16px 20px"}}>
                        <div style={{fontSize:12,color:"#38bdf8",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>💡 Consigli per la serie</div>
                        <div style={{display:"grid",gap:8}}>
                          {consistencyReport.consigli.map((c,i)=>(
                            <div key={i} style={{display:"flex",gap:10,fontSize:12,color:"#c8c6d8",alignItems:"flex-start"}}>
                              <span style={{color:"#38bdf8",flexShrink:0}}>{i+1}.</span>{c}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </>
                )}

                {cur.volumes.length>=2&&!consistencyLoading&&!consistencyReport&&(
                  <div style={{...card,textAlign:"center",padding:"48px",color:"#5a5870"}}>
                    <div style={{fontSize:40,marginBottom:12}}>🔍</div>
                    <div style={{fontSize:14,marginBottom:12}}>Clicca "Controlla coerenza" per analizzare i volumi.</div>
                    <button onClick={()=>checkConsistency(cur.id)} style={{...goldBtn,padding:"10px 28px"}}>🔍 Analizza ora</button>
                  </div>
                )}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function EmailPanel({book}){
  const [loading,setLoading]=useState(false);
  const [emails,setEmails]=useState(null);
  const [activeEmail,setActiveEmail]=useState(0);
  const [copied,setCopied]=useState(null);
  const [customInfo,setCustomInfo]=useState({
    listName:"",        // nome lista/community
    launchDate:"",      // data uscita
    price:"",           // prezzo libro
    bonus:"",           // bonus esclusivo per iscritti
    authorName:book.author||"",
    platform:"Mailchimp" // piattaforma email
  });
  const [showConfig,setShowConfig]=useState(true);

  const PLATFORMS=["Mailchimp","Brevo","ConvertKit","ActiveCampaign","MailerLite","GetResponse","Altro"];

  const EMAIL_TEMPLATES=[
    {id:"announce",   day:"giorno -14", icon:"🎉", label:"Annuncio libro",      color:"#38bdf8"},
    {id:"teaser",     day:"giorno -7",  icon:"🔍", label:"Teaser / anteprima", color:"#c084fc"},
    {id:"preorder",   day:"giorno -3",  icon:"⏰", label:"Pre-ordine aperto",   color:"#f5c842"},
    {id:"launch",     day:"LANCIO",     icon:"🚀", label:"Giorno di lancio",    color:"#4ade80"},
    {id:"followup",   day:"+3 giorni",  icon:"💬", label:"Follow-up / recensioni", color:"#f472b6"},
  ];

  const generateEmails=async()=>{
    setLoading(true);setEmails(null);
    const info=`
Titolo: "${book.title||"Senza titolo"}"
Autore: ${customInfo.authorName||book.author||"Autore"}
Genere: ${book.genre||"Saggio"}
Data uscita: ${customInfo.launchDate||"prossimamente"}
Prezzo: ${customInfo.price||"da definire"}
Lista/Community: ${customInfo.listName||"iscritti newsletter"}
Bonus esclusivo: ${customInfo.bonus||"nessuno"}
Descrizione libro: ${book.chapters[0]?.content?.slice(0,300)||"libro in fase di scrittura"}`;

    const prompt=`Sei un esperto di email marketing per autori self-publisher italiani. Crea una sequenza di 5 email per il lancio del libro con queste informazioni:
${info}

Rispondi SOLO con JSON valido:
{
  "announce": {
    "oggetto": "oggetto email accattivante",
    "preheader": "testo preheader (45 char max)",
    "corpo": "testo email completo HTML-free, con paragrafi separati da \\n\\n, usa [NOME] per personalizzazione, 150-200 parole, tono caldo e personale"
  },
  "teaser": {
    "oggetto": "oggetto con curiosità o domanda",
    "preheader": "testo preheader",
    "corpo": "testo email con anteprima contenuto, cita un concetto o capitolo del libro, 150-200 parole"
  },
  "preorder": {
    "oggetto": "oggetto con urgenza",
    "preheader": "testo preheader",
    "corpo": "testo email pre-ordine con call-to-action chiaro, scarcity o bonus, 150-200 parole"
  },
  "launch": {
    "oggetto": "oggetto festivo e diretto",
    "preheader": "testo preheader",
    "corpo": "testo email lancio con link Amazon, ringraziamento, invito a recensire, 180-220 parole"
  },
  "followup": {
    "oggetto": "oggetto soft, richiesta feedback",
    "preheader": "testo preheader",
    "corpo": "testo follow-up dopo 3 giorni, chiedi recensione Amazon, offri supporto, 120-150 parole"
  }
}`;

    try{
      const r=await callClaude(prompt,"Email marketing esperto italiano. SOLO JSON valido.",2000);
      const data=JSON.parse(r.replace(/```json|```/g,"").trim());
      setEmails(data);
      setActiveEmail(0);
      setShowConfig(false);
    }catch(e){
      setEmails({error:"Errore generazione: "+e.message});
    }
    setLoading(false);
  };

  const copyEmail=(id)=>{
    const e=emails[id];
    const text=`OGGETTO: ${e.oggetto}\n\n${e.corpo}`;
    navigator.clipboard?.writeText(text);
    setCopied(id);
    setTimeout(()=>setCopied(null),2000);
  };

  const copyAll=()=>{
    const text=EMAIL_TEMPLATES.map(t=>{
      const e=emails[t.id];
      return `═══ ${t.icon} ${t.label.toUpperCase()} (${t.day}) ═══\nOGGETTO: ${e.oggetto}\nPREHEADER: ${e.preheader}\n\n${e.corpo}\n\n`;
    }).join("\n");
    navigator.clipboard?.writeText(text);
    setCopied("all");
    setTimeout(()=>setCopied(null),2000);
  };

  return(
    <div style={{flex:1,overflowY:"auto",background:"#0f0e17",padding:"28px 36px"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>
      <div style={{maxWidth:900,margin:"0 auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#f472b6",marginBottom:4}}>📧 Email Marketing</div>
            <div style={{fontSize:13,color:"#5a5870"}}>Genera una sequenza di 5 email pronte per il lancio del tuo libro. Copia e incolla su {customInfo.platform}.</div>
          </div>
          {emails&&!emails.error&&(
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowConfig(v=>!v)} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${showConfig?"#f472b6":"#2e2d3e"}`,background:showConfig?"#f472b622":"transparent",color:showConfig?"#f472b6":"#5a5870",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                ⚙️ Configura
              </button>
              <button onClick={copyAll} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #f472b644",background:"#f472b611",color:"#f472b6",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                {copied==="all"?"✅ Copiate!":"📋 Copia tutte (5)"}
              </button>
              <button onClick={generateEmails} disabled={loading} style={{...goldBtn,padding:"8px 18px",fontSize:12,opacity:loading?0.5:1}}>
                🔄 Rigenera
              </button>
            </div>
          )}
        </div>

        {/* Config panel */}
        {showConfig&&(
          <div style={{...card,marginBottom:24,borderColor:"#f472b633",padding:"20px 24px"}}>
            <div style={{fontSize:13,color:"#f472b6",marginBottom:16,fontFamily:"'Playfair Display',serif"}}>⚙️ Personalizza la sequenza</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {[
                ["Nome autore",          "authorName",  "text",   "es: Marco Rossi"],
                ["Data di uscita",       "launchDate",  "date",   ""],
                ["Prezzo del libro",     "price",       "text",   "es: €7.99 eBook / €12.99 cartaceo"],
                ["Nome lista/community", "listName",    "text",   "es: Lettori di Marco, Community Fitness"],
              ].map(([label,key,type,ph])=>(
                <div key={key}>
                  <div style={{fontSize:11,color:"#5a5870",marginBottom:5,textTransform:"uppercase",letterSpacing:0.4}}>{label}</div>
                  <input type={type} value={customInfo[key]} onChange={e=>setCustomInfo(c=>({...c,[key]:e.target.value}))}
                    placeholder={ph} style={{...inp,width:"100%"}} />
                </div>
              ))}
              <div>
                <div style={{fontSize:11,color:"#5a5870",marginBottom:5,textTransform:"uppercase",letterSpacing:0.4}}>Bonus per iscritti</div>
                <input value={customInfo.bonus} onChange={e=>setCustomInfo(c=>({...c,bonus:e.target.value}))}
                  placeholder="es: PDF esclusivo, capitolo bonus, consulenza..." style={{...inp,width:"100%"}} />
              </div>
              <div>
                <div style={{fontSize:11,color:"#5a5870",marginBottom:5,textTransform:"uppercase",letterSpacing:0.4}}>Piattaforma email</div>
                <select value={customInfo.platform} onChange={e=>setCustomInfo(c=>({...c,platform:e.target.value}))} style={{...sel,width:"100%"}}>
                  {PLATFORMS.map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
            </div>
            <button onClick={generateEmails} disabled={loading} style={{...goldBtn,marginTop:18,padding:"11px 32px",fontSize:14,opacity:loading?0.5:1}}>
              {loading?"⏳ Generazione in corso...":"✉️ Genera sequenza email"}
            </button>
          </div>
        )}

        {/* Timeline visiva */}
        {!loading&&emails&&!emails.error&&(
          <div style={{...card,marginBottom:20,padding:"16px 20px",borderColor:"#f472b622"}}>
            <div style={{fontSize:11,color:"#5a5870",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5}}>📅 Sequenza di lancio</div>
            <div style={{display:"flex",alignItems:"center",gap:0,overflowX:"auto"}}>
              {EMAIL_TEMPLATES.map((t,i)=>(
                <React.Fragment key={t.id}>
                  <div onClick={()=>setActiveEmail(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",minWidth:100,padding:"8px 6px",borderRadius:10,background:activeEmail===i?t.color+"22":"transparent",border:`1px solid ${activeEmail===i?t.color+"66":"transparent"}`,transition:"all 0.15s"}}>
                    <div style={{fontSize:20,marginBottom:4}}>{t.icon}</div>
                    <div style={{fontSize:10,color:activeEmail===i?t.color:"#7a7890",fontWeight:activeEmail===i?700:400,textAlign:"center",lineHeight:1.3}}>{t.label}</div>
                    <div style={{fontSize:9,color:"#3a3850",marginTop:3}}>{t.day}</div>
                  </div>
                  {i<EMAIL_TEMPLATES.length-1&&(
                    <div style={{width:24,height:1,background:"#2e2d3e",flexShrink:0,margin:"0 2px"}} />
                  )}
                </React.Fragment>
              ))}
            </div>
          </div>
        )}

        {/* Loading */}
        {loading&&(
          <div style={{...card,textAlign:"center",padding:"60px 40px",borderColor:"#f472b633"}}>
            <div style={{fontSize:48,marginBottom:14}}>✉️</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#f472b6",marginBottom:8}}>Scrittura in corso...</div>
            <div style={{fontSize:13,color:"#5a5870"}}>Claude sta scrivendo 5 email personalizzate per "{book.title||"il tuo libro"}"</div>
          </div>
        )}

        {/* Errore */}
        {emails?.error&&(
          <div style={{...card,borderColor:"#ef444433",padding:"20px",color:"#f87171",marginBottom:16}}>⚠️ {emails.error}</div>
        )}

        {/* Email selezionata */}
        {emails&&!emails.error&&(()=>{
          const t=EMAIL_TEMPLATES[activeEmail];
          const e=emails[t.id];
          if(!e)return null;
          return(
            <div style={{...card,borderColor:t.color+"44",padding:"24px 28px"}}>
              {/* Header email */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:12,background:t.color+"22",border:`1px solid ${t.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{t.icon}</div>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:t.color,fontWeight:700}}>{t.label}</div>
                    <div style={{fontSize:11,color:"#5a5870",marginTop:2}}>Da inviare: {t.day} rispetto al lancio</div>
                  </div>
                </div>
                <button onClick={()=>copyEmail(t.id)} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${t.color}44`,background:t.color+"11",color:t.color,cursor:"pointer",fontSize:12,fontFamily:"inherit",flexShrink:0}}>
                  {copied===t.id?"✅ Copiata!":"📋 Copia email"}
                </button>
              </div>

              {/* Oggetto */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,color:"#5a5870",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>📌 Oggetto</div>
                <div style={{background:"#0c0b18",border:`1px solid ${t.color}33`,borderRadius:8,padding:"10px 14px",fontSize:14,color:"#e8e6f0",fontWeight:600,lineHeight:1.4}}>
                  {e.oggetto}
                </div>
              </div>

              {/* Preheader */}
              <div style={{marginBottom:18}}>
                <div style={{fontSize:10,color:"#5a5870",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>👁 Preheader (testo anteprima)</div>
                <div style={{background:"#0c0b18",border:"1px solid #1e2d3e",borderRadius:8,padding:"8px 14px",fontSize:12,color:"#7a7890",fontStyle:"italic"}}>
                  {e.preheader}
                </div>
              </div>

              {/* Corpo */}
              <div>
                <div style={{fontSize:10,color:"#5a5870",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>✉️ Corpo email</div>
                <div style={{background:"#ffffff",borderRadius:10,padding:"24px 28px",border:"1px solid #e0d8cc"}}>
                  {e.corpo.split("\n\n").map((para,i)=>(
                    <p key={i} style={{fontFamily:"Georgia,serif",fontSize:15,color:"#1a1a1a",lineHeight:1.75,margin:"0 0 16px 0"}}>
                      {para.split("[NOME]").map((part,j)=>(
                        <React.Fragment key={j}>
                          {part}
                          {j<para.split("[NOME]").length-1&&<span style={{background:"#f5c84244",borderRadius:3,padding:"0 3px",color:"#b8860b",fontStyle:"italic"}}>[NOME]</span>}
                        </React.Fragment>
                      ))}
                    </p>
                  ))}
                  <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #e0d8cc",fontSize:13,color:"#888",fontFamily:"Georgia,serif"}}>
                    — {customInfo.authorName||book.author||"L'autore"}
                  </div>
                </div>
              </div>

              {/* Navigazione email */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:18}}>
                <button onClick={()=>setActiveEmail(i=>Math.max(0,i-1))} disabled={activeEmail===0}
                  style={{padding:"8px 18px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:activeEmail===0?"#3a3850":"#c8c6d8",cursor:activeEmail===0?"default":"pointer",fontSize:13,fontFamily:"inherit"}}>
                  ← Email precedente
                </button>
                <span style={{fontSize:11,color:"#5a5870"}}>{activeEmail+1} / {EMAIL_TEMPLATES.length}</span>
                <button onClick={()=>setActiveEmail(i=>Math.min(EMAIL_TEMPLATES.length-1,i+1))} disabled={activeEmail===EMAIL_TEMPLATES.length-1}
                  style={{padding:"8px 18px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:activeEmail===EMAIL_TEMPLATES.length-1?"#3a3850":"#c8c6d8",cursor:activeEmail===EMAIL_TEMPLATES.length-1?"default":"pointer",fontSize:13,fontFamily:"inherit"}}>
                  Email successiva →
                </button>
              </div>
            </div>
          );
        })()}

        {/* Guida piattaforme */}
        {emails&&!emails.error&&(
          <div style={{...card,marginTop:16,borderColor:"#1e2d3e",padding:"16px 20px"}}>
            <div style={{fontSize:12,color:"#5a5870",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>💡 Come usare su {customInfo.platform}</div>
            <div style={{fontSize:12,color:"#5a5870",lineHeight:1.7}}>
              {customInfo.platform==="Mailchimp"&&"Vai su Campaigns → Create Campaign → Email. Incolla oggetto e corpo, imposta la data di invio per ogni email della sequenza. Usa Automation per invii automatici."}
              {customInfo.platform==="Brevo"&&"Vai su Campaigns → Create an email campaign. Per automazioni usa Automation → Create workflow con trigger 'Aggiungi a lista'."}
              {customInfo.platform==="ConvertKit"&&"Vai su Sequences → New Sequence. Aggiungi le 5 email con i giorni di ritardo corretti (-14, -7, -3, 0, +3)."}
              {customInfo.platform==="MailerLite"&&"Vai su Automations → Create automation. Imposta trigger e aggiungi ogni email con il delay corretto in giorni."}
              {(customInfo.platform==="ActiveCampaign"||customInfo.platform==="GetResponse"||customInfo.platform==="Altro")&&"Crea una sequenza/automation nella tua piattaforma. Aggiungi ogni email con il ritardo in giorni indicato nella timeline sopra."}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AnalyticsPanel({book}){

  const [aiLoading,setAiLoading]=useState(false);

  const [prices,setPrices]=useState({ebook:4.99,paperback:12.99,kuPerPage:0.0045});

  // Carica dati da storage
  useEffect(()=>{
    (async()=>{
      try{
        const r=await window.storage.get(STORE_KEY);
        if(r?.value){const d=JSON.parse(r.value);setEntries(d.entries||[]);if(d.prices)setPrices(d.prices);}
      }catch{}
      setStorageReady(true);
    })();
  },[]);

  // Salva dati
  const save=async(newEntries,newPrices)=>{
    try{await window.storage.set(STORE_KEY,JSON.stringify({entries:newEntries||entries,prices:newPrices||prices}));}catch{}
  };

  const addEntry=async()=>{
    if(!form.week)return;
    const entry={
      week:form.week,
      ebook:Number(form.ebook)||0,
      paperback:Number(form.paperback)||0,
      ku:Number(form.ku)||0,
      note:form.note,
      revenue:Math.round(((Number(form.ebook)||0)*prices.ebook*0.7+(Number(form.paperback)||0)*prices.paperback*0.6+(Number(form.ku)||0)*prices.kuPerPage)*100)/100
    };
    let newEntries;
    if(editIdx!==null){
      newEntries=[...entries];newEntries[editIdx]=entry;
      setEditIdx(null);
    } else {
      newEntries=[...entries,entry].sort((a,b)=>a.week.localeCompare(b.week));

function RevisionPanel({book,setBook,setActive}){
  const [chIdx,setChIdx]=useState(0);
  const [loading,setLoading]=useState(false);
  const [report,setReport]=useState(null);
  const [activeIssue,setActiveIssue]=useState(null);
  const [applying,setApplying]=useState(false);
  const [appliedFixes,setAppliedFixes]=useState(new Set());
  const [batchLoading,setBatchLoading]=useState(false);
  const [batchProgress,setBatchProgress]=useState([]);
  const [mode,setMode]=useState("single"); // single | batch

  const ch=book.chapters[chIdx];
  const totalWords=ch?.content?.trim()?ch.content.trim().split(/\s+/).length:0;

  const analyzeChapter=async(idx)=>{
    const chapter=book.chapters[idx];
    if(!chapter?.content?.trim()){return null;}
    const prompt=`Sei un editor letterario professionista italiano. Analizza questo testo e fornisci una revisione dettagliata.

TITOLO CAPITOLO: "${chapter.title}"
GENERE: ${book.genre||"saggistica"}

TESTO:
${chapter.content.slice(0,3000)}${chapter.content.length>3000?"...(testo troncato per analisi)":""}

Rispondi SOLO con JSON valido:
{
  "punteggio": 78,
  "sommario": "valutazione generale in 2-3 frasi",
  "puntiForza": ["punto1","punto2","punto3"],
  "problemi": [
    {
      "id": "p1",
      "tipo": "Ripetizione",
      "gravita": "media",
      "titolo": "Parola ripetuta più volte",
      "testo_originale": "frase/parola problematica dal testo (max 80 char)",
      "spiegazione": "perché è un problema",
      "suggerimento": "come migliorarlo",
      "testo_corretto": "versione migliorata (max 120 char)"
    }
  ],
  "statistiche": {
    "frasi_lunghe": 3,
    "parole_deboli": ["molto","cosa","fare","avere"],
    "ripetizioni": ["parola1","parola2"],
    "densita_testo": "Alta/Media/Bassa",
    "leggibilita": "Facile/Media/Difficile"
  },
  "consiglio_finale": "un consiglio pratico specifico per migliorare questo capitolo"
}

Tipi di problemi possibili: Ripetizione, Frase lunga, Parola debole, Ritmo lento, Aggettivo eccessivo, Passivo abusato, Incoerenza, Punteggiatura, Transizione mancante, Mostra non dire.
Gravità: alta/media/bassa. Trova 3-8 problemi concreti e specifici.`;

    const r=await callClaude(prompt,"Sei un editor professionista. Rispondi SOLO con JSON valido.",1400);
    return JSON.parse(r.replace(/```json|```/g,"").trim());
  };

  const runAnalysis=async()=>{
    if(!ch?.content?.trim()){return;}
    setLoading(true);setReport(null);setActiveIssue(null);setAppliedFixes(new Set());
    try{
      const data=await analyzeChapter(chIdx);
      setReport(data);
    }catch(e){setReport({error:"Errore analisi: "+e.message});}
    setLoading(false);
  };

  const runBatchAnalysis=async()=>{
    const chapters=book.chapters.filter(c=>c.content?.trim());
    if(!chapters.length)return;
    setBatchLoading(true);
    setBatchProgress(book.chapters.map(c=>({title:c.title,status:c.content?.trim()?"waiting":"empty",report:null})));
    const results=[];
    for(let i=0;i<book.chapters.length;i++){
      const c=book.chapters[i];
      if(!c.content?.trim()){results.push(null);continue;}
      setBatchProgress(prev=>prev.map((p,j)=>j===i?{...p,status:"analyzing"}:p));
      try{
        const r=await analyzeChapter(i);
        results.push(r);
        setBatchProgress(prev=>prev.map((p,j)=>j===i?{...p,status:"done",report:r,score:r.punteggio}:p));
      }catch{
        results.push(null);
        setBatchProgress(prev=>prev.map((p,j)=>j===i?{...p,status:"error"}:p));
      }
    }
    setBatchLoading(false);
  };

  const applyFix=async(issue)=>{
    if(!ch?.content||!issue.testo_corretto||!issue.testo_originale)return;
    setApplying(true);
    // Cerca il testo originale nel contenuto e sostituisce
    const orig=issue.testo_originale;
    const fixed=issue.testo_corretto;
    const newContent=ch.content.includes(orig)?ch.content.replace(orig,fixed):ch.content;
    setBook(b=>{const c=[...b.chapters];c[chIdx]={...c[chIdx],content:newContent};return{...b,chapters:c};});
    setAppliedFixes(prev=>new Set([...prev,issue.id]));
    setApplying(false);
  };

  const scoreColor=(s)=>s>=80?"#4ade80":s>=60?"#f5c842":"#f87171";
  const gravityColor=(g)=>g==="alta"?"#f87171":g==="media"?"#f5c842":"#38bdf8";
  const gravityBg=(g)=>g==="alta"?"#ef444411":g==="media"?"#f5c84211":"#38bdf811";
  const tipoIcon=(t)=>({"Ripetizione":"🔄","Frase lunga":"📏","Parola debole":"💤","Ritmo lento":"🐌","Aggettivo eccessivo":"🎨","Passivo abusato":"↩️","Incoerenza":"⚠️","Punteggiatura":"✏️","Transizione mancante":"🔗","Mostra non dire":"👁"}[t]||"📝");

  return(
    <div style={{display:"flex",flex:1,overflow:"hidden",background:"#0f0e17"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>

      {/* Pannello sinistro — lista capitoli */}
      <div style={{width:220,background:"#0c0b18",borderRight:"1px solid #1a1929",overflowY:"auto",padding:14,flexShrink:0}}>
        <div style={{fontSize:11,color:"#f5c842",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>✏️ REVISIONE AI</div>

        {/* Toggle modalità */}
        <div style={{display:"flex",gap:4,marginBottom:14}}>
          {[["single","Singolo"],["batch","Tutti"]].map(([m,l])=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"5px 0",borderRadius:6,border:`1px solid ${mode===m?"#f5c842":"#2e2d3e"}`,background:mode===m?"#f5c84222":"transparent",color:mode===m?"#f5c842":"#5a5870",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{l}</button>
          ))}
        </div>

        {mode==="single"&&(
          <>
            <div style={{fontSize:10,color:"#5a5870",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Seleziona capitolo</div>
            {book.chapters.map((c,i)=>{
              const hasContent=!!c.content?.trim();
              return(
                <div key={i} onClick={()=>{if(hasContent){setChIdx(i);setReport(null);setActiveIssue(null);setAppliedFixes(new Set());}}}
                  style={{padding:"8px 10px",borderRadius:7,marginBottom:3,cursor:hasContent?"pointer":"default",
                    background:i===chIdx?"#1a1829":"transparent",
                    borderLeft:`2px solid ${i===chIdx?"#f5c842":"transparent"}`,
                    opacity:hasContent?1:0.4}}>
                  <div style={{fontSize:12,color:i===chIdx?"#f5c842":"#6a6880",fontFamily:"'Playfair Display',serif",lineHeight:1.3}}>
                    {c.title||`Capitolo ${i+1}`}
                  </div>
                  <div style={{fontSize:10,color:"#3a3850",marginTop:2}}>
                    {hasContent?`${c.content.trim().split(/\s+/).length} parole`:"(vuoto)"}
                  </div>
                </div>
              );
            })}
            <button onClick={runAnalysis} disabled={loading||!ch?.content?.trim()}
              style={{...goldBtn,width:"100%",marginTop:12,fontSize:12,padding:"10px 0",opacity:loading||!ch?.content?.trim()?0.5:1}}>
              {loading?"⏳ Analisi...":"🔍 Analizza capitolo"}
            </button>
            <button onClick={()=>{setActive("write");}} style={{width:"100%",marginTop:6,padding:"8px 0",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#5a5870",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
              ✏️ Apri nell'editor
            </button>
          </>
        )}

        {mode==="batch"&&(
          <>
            <div style={{fontSize:11,color:"#5a5870",marginBottom:10,lineHeight:1.5}}>
              Analizza tutti i capitoli in sequenza e ottieni un report globale.
            </div>
            <button onClick={runBatchAnalysis} disabled={batchLoading}
              style={{...goldBtn,width:"100%",marginBottom:12,fontSize:12,padding:"10px 0",opacity:batchLoading?0.5:1}}>
              {batchLoading?"⏳ Analisi...":"🔍 Analizza tutto"}
            </button>
            <div style={{display:"grid",gap:4}}>
              {batchProgress.map((p,i)=>(
                <div key={i} style={{padding:"8px 10px",borderRadius:7,background:"#12111e",border:"1px solid #1e1d2e"}}>
                  <div style={{fontSize:11,color:"#c8c6d8",marginBottom:2,fontFamily:"'Playfair Display',serif"}}>{p.title||`Cap.${i+1}`}</div>
                  <div style={{fontSize:10,display:"flex",alignItems:"center",gap:6}}>
                    {p.status==="waiting"&&<span style={{color:"#3a3850"}}>○ In attesa</span>}
                    {p.status==="analyzing"&&<span style={{color:"#f5c842"}}>⏳ Analisi...</span>}
                    {p.status==="empty"&&<span style={{color:"#3a3850"}}>— Vuoto</span>}
                    {p.status==="error"&&<span style={{color:"#f87171"}}>❌ Errore</span>}
                    {p.status==="done"&&<>
                      <span style={{color:scoreColor(p.score),fontWeight:700}}>{p.score}/100</span>
                      <span style={{color:"#5a5870"}}>{p.report?.problemi?.length||0} problemi</span>
                    </>}
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {/* Pannello centrale — report */}
      <div style={{flex:1,overflowY:"auto",padding:"24px 32px"}}>

        {/* Stato vuoto */}
        {!loading&&!report&&mode==="single"&&(
          <div style={{textAlign:"center",padding:"80px 40px",color:"#3a3850"}}>
            <div style={{fontSize:60,marginBottom:16}}>✏️</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#5a5870",marginBottom:8}}>
              Seleziona un capitolo e clicca "Analizza"
            </div>
            <div style={{fontSize:13,color:"#3a3850",lineHeight:1.6}}>
              L'AI legge il tuo testo e trova:<br/>
              ripetizioni · frasi lunghe · parole deboli · ritmo lento<br/>
              passivo abusato · transizioni mancanti · e molto altro
            </div>
          </div>
        )}

        {!batchLoading&&batchProgress.length===0&&mode==="batch"&&(
          <div style={{textAlign:"center",padding:"80px 40px",color:"#3a3850"}}>
            <div style={{fontSize:60,marginBottom:16}}>📚</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#5a5870",marginBottom:8}}>Analisi globale del libro</div>
            <div style={{fontSize:13,color:"#3a3850"}}>Clicca "Analizza tutto" per ottenere un report su ogni capitolo.</div>
          </div>
        )}

        {/* Loading */}
        {loading&&(
          <div style={{textAlign:"center",padding:"80px 40px"}}>
            <div style={{fontSize:48,marginBottom:16}}>🔍</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#f5c842",marginBottom:8}}>Lettura in corso...</div>
            <div style={{fontSize:13,color:"#5a5870"}}>Claude sta analizzando "{ch?.title}"</div>
          </div>
        )}

        {/* Errore */}
        {report?.error&&(
          <div style={{...card,borderColor:"#ef444433",padding:"20px",color:"#f87171"}}>⚠️ {report.error}</div>
        )}

        {/* Batch summary */}
        {mode==="batch"&&batchProgress.some(p=>p.status==="done")&&!batchLoading&&(
          <div style={{marginBottom:20}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#f5c842",marginBottom:16}}>📊 Report Globale</div>
            {(()=>{
              const done=batchProgress.filter(p=>p.status==="done");
              const avgScore=done.length?Math.round(done.reduce((a,p)=>a+p.score,0)/done.length):0;
              const totalIssues=done.reduce((a,p)=>a+(p.report?.problemi?.length||0),0);
              return(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
                  {[
                    {l:"Score medio",v:`${avgScore}/100`,c:scoreColor(avgScore),icon:"⭐"},
                    {l:"Capitoli analizzati",v:`${done.length}/${book.chapters.length}`,c:"#38bdf8",icon:"📚"},
                    {l:"Problemi totali",v:totalIssues,c:"#f5c842",icon:"🔍"},
                  ].map(({l,v,c,icon})=>(
                    <div key={l} style={{...card,textAlign:"center",padding:"16px 12px",borderColor:c+"33"}}>
                      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
                      <div style={{fontSize:26,fontWeight:800,color:c,fontFamily:"monospace"}}>{v}</div>
                      <div style={{fontSize:11,color:"#5a5870",marginTop:4}}>{l}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
            {batchProgress.filter(p=>p.status==="done").map((p,i)=>(
              <div key={i} style={{...card,marginBottom:10,borderColor:scoreColor(p.score)+"33",padding:"16px 20px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:p.report?.sommario?8:0}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#c8c6d8"}}>{p.title}</div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:11,color:"#5a5870"}}>{p.report?.problemi?.length||0} problemi</span>
                    <span style={{fontSize:20,fontWeight:800,color:scoreColor(p.score),fontFamily:"monospace"}}>{p.score}</span>
                  </div>
                </div>
                {p.report?.sommario&&<div style={{fontSize:12,color:"#5a5870",lineHeight:1.5}}>{p.report.sommario}</div>}
              </div>
            ))}
          </div>
        )}

        {/* Report singolo capitolo */}
        {report&&!report.error&&mode==="single"&&(
          <>
            {/* Header score */}
            <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:24,padding:"20px 24px",background:"#12111e",borderRadius:14,border:`1px solid ${scoreColor(report.punteggio)}33`}}>
              <div style={{textAlign:"center",flexShrink:0}}>
                <div style={{fontSize:48,fontWeight:900,color:scoreColor(report.punteggio),fontFamily:"monospace",lineHeight:1}}>{report.punteggio}</div>
                <div style={{fontSize:10,color:"#5a5870",marginTop:2}}>/100</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#c8c6d8",marginBottom:6}}>{ch?.title}</div>
                <div style={{fontSize:13,color:"#7a7890",lineHeight:1.6}}>{report.sommario}</div>
              </div>
              <div style={{flexShrink:0,textAlign:"right"}}>
                <div style={{fontSize:11,color:"#5a5870",marginBottom:4}}>{totalWords} parole</div>
                <div style={{fontSize:11,color:"#5a5870"}}>{report.problemi?.length||0} problemi</div>
                <div style={{fontSize:11,color:"#5a5870"}}>{appliedFixes.size} corretti</div>
              </div>
            </div>

            {/* Punti di forza */}
            {report.puntiForza?.length>0&&(
              <div style={{...card,marginBottom:16,borderColor:"#4ade8022",padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#4ade80",marginBottom:10,fontFamily:"'Playfair Display',serif"}}>✅ Punti di forza</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {report.puntiForza.map((p,i)=>(
                    <div key={i} style={{padding:"5px 12px",borderRadius:20,background:"#4ade8011",border:"1px solid #4ade8033",fontSize:12,color:"#4ade80"}}>{p}</div>
                  ))}
                </div>
              </div>
            )}

            {/* Statistiche */}
            {report.statistiche&&(
              <div style={{...card,marginBottom:16,borderColor:"#38bdf822",padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#38bdf8",marginBottom:12,fontFamily:"'Playfair Display',serif"}}>📊 Statistiche testo</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
                  {[
                    ["Leggibilità",report.statistiche.leggibilita],
                    ["Densità",report.statistiche.densita_testo],
                    ["Frasi lunghe",report.statistiche.frasi_lunghe+" trovate"],
                  ].map(([k,v])=>(
                    <div key={k} style={{background:"#0c0b18",borderRadius:8,padding:"10px 12px",border:"1px solid #1e1d2e"}}>
                      <div style={{fontSize:10,color:"#5a5870",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{k}</div>
                      <div style={{fontSize:14,color:"#c8c6d8",fontWeight:600}}>{v}</div>
                    </div>
                  ))}
                </div>
                {report.statistiche.parole_deboli?.length>0&&(
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:11,color:"#5a5870",marginBottom:6}}>Parole da ridurre:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {report.statistiche.parole_deboli.map((p,i)=>(
                        <span key={i} style={{padding:"3px 10px",borderRadius:12,background:"#f87171",fontSize:11,color:"#fff",opacity:0.8}}>{p}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Lista problemi */}
            {report.problemi?.length>0&&(
              <div>
                <div style={{fontSize:13,color:"#c8c6d8",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontFamily:"'Playfair Display',serif"}}>🔍 Problemi rilevati ({report.problemi.length})</span>
                  {appliedFixes.size>0&&<span style={{fontSize:11,color:"#4ade80"}}>✅ {appliedFixes.size} già corretti</span>}
                </div>
                <div style={{display:"grid",gap:8}}>
                  {report.problemi.map((issue,i)=>{
                    const fixed=appliedFixes.has(issue.id);
                    const isActive=activeIssue===i;
                    return(
                      <div key={i} style={{borderRadius:12,border:`1px solid ${fixed?"#4ade8033":isActive?gravityColor(issue.gravita)+"66":gravityBg(issue.gravita)+"aa"}`,background:fixed?"#0c1a12":isActive?"#12111e":"#0c0b18",overflow:"hidden",opacity:fixed?0.6:1}}>
                        {/* Header problema */}
                        <div onClick={()=>setActiveIssue(isActive?null:i)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                          <span style={{fontSize:18,flexShrink:0}}>{tipoIcon(issue.tipo)}</span>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                              <span style={{fontSize:12,color:"#c8c6d8",fontWeight:600}}>{issue.titolo}</span>
                              <span style={{padding:"2px 8px",borderRadius:10,fontSize:10,background:gravityBg(issue.gravita),color:gravityColor(issue.gravita),border:`1px solid ${gravityColor(issue.gravita)}44`}}>{issue.gravita}</span>
                              <span style={{fontSize:10,color:"#5a5870"}}>{issue.tipo}</span>
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                            {fixed&&<span style={{fontSize:11,color:"#4ade80"}}>✅ Corretto</span>}
                            <span style={{color:"#5a5870",fontSize:12}}>{isActive?"▲":"▼"}</span>
                          </div>
                        </div>
                        {/* Dettaglio espanso */}
                        {isActive&&(
                          <div style={{padding:"0 16px 16px",borderTop:"1px solid #1e1d2e"}}>
                            {issue.testo_originale&&(
                              <div style={{margin:"12px 0 8px",padding:"8px 12px",background:"#ef444411",borderRadius:8,border:"1px solid #ef444433"}}>
                                <div style={{fontSize:10,color:"#f87171",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Testo problematico</div>
                                <div style={{fontSize:13,color:"#fca5a5",fontStyle:"italic",lineHeight:1.5}}>"{issue.testo_originale}"</div>
                              </div>
                            )}
                            <div style={{fontSize:13,color:"#7a7890",marginBottom:10,lineHeight:1.5}}>{issue.spiegazione}</div>
                            {issue.testo_corretto&&(
                              <div style={{padding:"8px 12px",background:"#4ade8011",borderRadius:8,border:"1px solid #4ade8033",marginBottom:10}}>
                                <div style={{fontSize:10,color:"#4ade80",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Versione migliorata</div>
                                <div style={{fontSize:13,color:"#86efac",lineHeight:1.5}}>"{issue.testo_corretto}"</div>
                              </div>
                            )}
                            <div style={{fontSize:12,color:"#38bdf8",marginBottom:12,lineHeight:1.5}}>
                              💡 {issue.suggerimento}
                            </div>
                            {issue.testo_corretto&&!fixed&&(
                              <button onClick={()=>applyFix(issue)} disabled={applying} style={{...goldBtn,padding:"8px 20px",fontSize:12,opacity:applying?0.5:1}}>
                                {applying?"Applicando...":"✅ Applica correzione"}
                              </button>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Consiglio finale */}
            {report.consiglio_finale&&(
              <div style={{...card,marginTop:16,borderColor:"#f5c84233",padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#f5c842",marginBottom:8,fontFamily:"'Playfair Display',serif"}}>💎 Consiglio dell'editor</div>
                <div style={{fontSize:13,color:"#c8c6d8",lineHeight:1.6}}>{report.consiglio_finale}</div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   AB TITLE PANEL — A/B Test titoli Amazon KDP
───────────────────────────────────────────── */
function ABTitlePanel({book,setBook}){
  const [titles,setTitles]=useState([book.title||"",...Array(4).fill("")]);
  const [genre,setGenre]=useState(book.genre||"");
  const [audience,setAudience]=useState("");
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState(null);
  const [winner,setWinner]=useState(null);
  const [genLoading,setGenLoading]=useState(false);
  const [showTips,setShowTips]=useState(false);

  const TITLE_TIPS=[
    {icon:"🔢",rule:"Usa i numeri",ex:"\"5 Mosse per Raddoppiare le Vendite\"",why:"I numeri aumentano il CTR del 36% — specificità = credibilità"},
    {icon:"❓",rule:"Crea curiosità con una domanda",ex:"\"Perché i Ricchi Non Vanno in Banca?\"",why:"Le domande attivano il loop aperto cognitivo — il cervello vuole la risposta"},
    {icon:"🎯",rule:"Includi la trasformazione",ex:"\"Da Zero a 10.000€/mese in 90 Giorni\"",why:"Il lettore vuole sapere dove arriverà, non da dove parte"},
    {icon:"⚡",rule:"Usa parole ad alto impatto",ex:"Segreto · Definitivo · Rivoluzionario · Provato · Sistema",why:"Queste parole aumentano la percezione di valore"},
    {icon:"👤",rule:"Nomina il tuo lettore",ex:"\"La Guida per il Manager Esausto\"",why:"Chi si sente chiamato per nome clicca il doppio"},
    {icon:"📅",rule:"Aggiungi un timeframe",ex:"\"In 30 Giorni\" · \"In 7 Passi\" · \"In un Weekend\"",why:"Promette risultato in tempo definito — riduce resistenza all'acquisto"},
    {icon:"🆚",rule:"Crea contrasto o paradosso",ex:"\"Lavora Meno, Guadagna di Più\"",why:"I paradossi fermano lo scroll — il cervello vuole risolvere l'incoerenza"},
  ];

  const updateTitle=(idx,val)=>{
    const t=[...titles];t[idx]=val;setTitles(t);
  };

  const generateVariants=async()=>{
    setGenLoading(true);
    const base=titles.filter(t=>t.trim())[0]||book.title||"il mio libro";
    const prompt=`Genera 4 varianti di titolo per un libro su: "${base}", genere: "${genre||book.genre||"saggio"}", target: "${audience||"lettori adulti"}".

Ogni variante deve usare una tecnica diversa: numeri, domanda, trasformazione, paradosso.
Rispondi SOLO con JSON: {"variants":["titolo1","titolo2","titolo3","titolo4"]}`;
    try{
      const r=await callClaude(prompt,"Esperto titoli Amazon KDP. Solo JSON.",400);
      const data=JSON.parse(r.replace(/```json|```/g,"").trim());
      if(data.variants){
        const t=[titles[0]||base,...data.variants.slice(0,4)];
        setTitles(t);
      }
    }catch(e){}
    setGenLoading(false);
  };

  const runTest=async()=>{
    const valid=titles.filter(t=>t.trim());
    if(valid.length<2)return;
    setLoading(true);setResults(null);setWinner(null);

    const listStr=valid.map((t,i)=>`${i+1}. "${t}"`).join("\n");
    const prompt=`Sei un esperto di psicologia del marketing e Amazon KDP. Analizza questi titoli di libri per il genere "${genre||book.genre||"saggio"}" con target "${audience||"lettori adulti"}":

${listStr}

Valuta ogni titolo su 6 dimensioni (0-100 ciascuna) e fornisci insight psicologici.
Rispondi SOLO con JSON valido:
{
  "results": [
    {
      "titolo": "titolo esatto",
      "rank": 1,
      "score_totale": 87,
      "dimensioni": {
        "ctr": 90,
        "chiarezza": 85,
        "curiosita": 88,
        "memorabilita": 82,
        "seo": 91,
        "emozione": 84
      },
      "punti_forza": ["punto1","punto2"],
      "punti_deboli": ["debolezza1"],
      "psicologia": "meccanismo psicologico che spiega perché funziona o no",
      "miglioria": "come renderlo ancora più efficace in max 15 parole"
    }
  ],
  "vincitore": "titolo vincente esatto",
  "spiegazione_vincitore": "perché questo titolo batte gli altri in 2-3 frasi",
  "insight_generale": "osservazione generale sui titoli testati e cosa manca"
}`;

    try{
      const r=await callClaude(prompt,"Esperto marketing libri Amazon. Solo JSON valido.",1600);
      const data=JSON.parse(r.replace(/```json|```/g,"").trim());
      // Ordina per rank
      data.results?.sort((a,b)=>a.rank-b.rank);
      setResults(data);
      setWinner(data.vincitore);
    }catch(e){setResults({error:"Errore analisi: "+e.message});}
    setLoading(false);
  };

  const applyTitle=(t)=>setBook(b=>({...b,title:t}));

  const DIM_LABELS={ctr:"CTR",chiarezza:"Chiarezza",curiosita:"Curiosità",memorabilita:"Memorabilità",seo:"SEO Amazon",emozione:"Emozione"};
  const DIM_COLORS={ctr:"#38bdf8",chiarezza:"#4ade80",curiosita:"#c084fc",memorabilita:"#f5c842",seo:"#f472b6",emozione:"#fb923c"};
  const scoreColor=(s)=>s>=80?"#4ade80":s>=60?"#f5c842":"#f87171";

  return(
    <div style={{flex:1,overflowY:"auto",background:"#0f0e17",padding:"28px 40px"}}>

function ChatPanel({book}){
  const [messages,setMessages]=useState([{role:"assistant",text:"Ciao! Sono il tuo assistente letterario. Conosco tutto del tuo libro — chiedimi qualsiasi cosa: personaggi, trama, coerenza, stile, idee per i prossimi capitoli."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const bookContext=()=>{
    const chapters=book.chapters.map((c,i)=>`CAPITOLO ${i+1} "${c.title}":
${c.content?.slice(0,400)||"(vuoto)"}`).join('\n\n');
    const totalWords=book.chapters.reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0);
    return `Sei l'assistente letterario del libro "${book.title||"Senza titolo"}" di ${book.author||"Autore sconosciuto"}.
Genere: ${book.genre||"Non specificato"} | Parole totali: ${totalWords.toLocaleString()} | Capitoli: ${book.chapters.length}
${book.brief?.premise?`Premessa: ${book.brief.premise}`:""}
${book.brief?.protagonist?`Protagonista: ${book.brief.protagonist}`:""}
${book.brief?.setting?`Ambientazione: ${book.brief.setting}`:""}

CONTENUTO DEI CAPITOLI (estratti):
${chapters}

Rispondi in italiano. Sii specifico, creativo e utile. Fai riferimento al contenuto reale del libro quando possibile.`;
  };

  const send=async()=>{
    const txt=input.trim();
    if(!txt||loading)return;
    setInput("");
    const userMsg={role:"user",text:txt};
    setMessages(m=>[...m,userMsg]);
    setLoading(true);
    try{
      const history=messages.slice(-8).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:800,
          system:bookContext(),
          messages:[...history,{role:"user",content:txt}]
        })
      });
      const data=await response.json();
      const reply=data.content?.[0]?.text||"Errore nella risposta.";
      setMessages(m=>[...m,{role:"assistant",text:reply}]);
    }catch(e){
      setMessages(m=>[...m,{role:"assistant",text:"⚠️ Errore: "+e.message}]);
    }
    setLoading(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  const SUGGESTIONS=[
    "Analizza la coerenza narrativa del libro",
    "Suggerisci idee per il prossimo capitolo",
    "Come posso migliorare il protagonista?",
    "Quali sono i punti deboli della trama?",
    "Scrivi una sinossi del libro",
    "Suggerisci un titolo alternativo",
  ];

  return(
    <div style={{display:"flex",flex:1,overflow:"hidden",background:"#0f0e17",flexDirection:"column"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>

      {/* Header */}
      <div style={{padding:"16px 24px",borderBottom:"1px solid #1a1929",background:"#0c0b18",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:36,height:36,borderRadius:10,background:"#38bdf822",border:"1px solid #38bdf844",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>💬</div>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#38bdf8"}}>Chat con il libro</div>
          <div style={{fontSize:11,color:"#5a5870"}}>"{book.title||"Senza titolo"}" · {book.chapters.length} capitoli · {book.chapters.reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0).toLocaleString()} parole</div>
        </div>
        {messages.length>1&&(
          <button onClick={()=>setMessages([messages[0]])} style={{marginLeft:"auto",padding:"5px 12px",borderRadius:6,border:"1px solid #2e2d3e",background:"transparent",color:"#5a5870",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
            🗑 Cancella chat
          </button>
        )}
      </div>

      {/* Messaggi */}
      <div style={{flex:1,overflowY:"auto",padding:"20px 24px",display:"flex",flexDirection:"column",gap:12}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:10,alignItems:"flex-start"}}>
            {m.role==="assistant"&&(
              <div style={{width:28,height:28,borderRadius:8,background:"#38bdf822",border:"1px solid #38bdf844",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,marginTop:2}}>📖</div>
            )}
            <div style={{
              maxWidth:"75%",padding:"10px 14px",borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",
              background:m.role==="user"?"#f5c84222":"#12111e",
              border:`1px solid ${m.role==="user"?"#f5c84244":"#1e1d2e"}`,
              fontSize:13,color:"#c8c6d8",lineHeight:1.65,whiteSpace:"pre-wrap"
            }}>{m.text}</div>
            {m.role==="user"&&(
              <div style={{width:28,height:28,borderRadius:8,background:"#f5c84222",border:"1px solid #f5c84444",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,marginTop:2}}>✍️</div>
            )}
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#38bdf822",border:"1px solid #38bdf844",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>📖</div>
            <div style={{padding:"10px 14px",borderRadius:"12px 12px 12px 4px",background:"#12111e",border:"1px solid #1e1d2e"}}>
              <div style={{display:"flex",gap:4,alignItems:"center",height:18}}>
                {[0,1,2].map(i=>(<div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#38bdf8",animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`,opacity:0.6}} />))}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Suggerimenti rapidi */}
      {messages.length<=1&&(
        <div style={{padding:"0 24px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
          {SUGGESTIONS.map((s,i)=>(
            <button key={i} onClick={()=>{setInput(s);inputRef.current?.focus();}}
              style={{padding:"6px 12px",borderRadius:20,border:"1px solid #2e2d3e",background:"#12111e",color:"#7a7890",cursor:"pointer",fontSize:11,fontFamily:"inherit",transition:"all 0.15s"}}
              onMouseEnter={e=>e.target.style.borderColor="#38bdf8"}
              onMouseLeave={e=>e.target.style.borderColor="#2e2d3e"}>
              {s}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{padding:"12px 24px 16px",borderTop:"1px solid #1a1929",background:"#0c0b18",display:"flex",gap:10}}>
        <textarea
          ref={inputRef}
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Chiedi qualcosa sul tuo libro... (Invio per inviare, Shift+Invio per andare a capo)"
          rows={2}
          style={{...inp,flex:1,resize:"none",lineHeight:1.5,fontSize:13,padding:"10px 14px"}}
        />
        <button onClick={send} disabled={loading||!input.trim()}
          style={{...goldBtn,padding:"10px 20px",fontSize:16,alignSelf:"flex-end",opacity:loading||!input.trim()?0.4:1,flexShrink:0}}>
          ↑
        </button>
      </div>
      <style>{`@keyframes pulse{0%,100%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.3);opacity:1;}}`}</style>
    </div>
  );
}

/* ─────────────────────────────────────────────
