function GlossarioPanel({book,setBook}){
  const STORE_KEY="glossario_"+book.title;
  const [terms,setTerms]=useState([]);
  const [loading,setLoading]=useState(false);
  const [search,setSearch]=useState("");
  const [editTerm,setEditTerm]=useState(null); // {name,definition,category,idx}
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({name:"",definition:"",category:"Personaggio"});
  const [loaded,setLoaded]=useState(false);

  const CATEGORIES=["Personaggio","Luogo","Oggetto","Concetto","Evento","Altro"];
  const CAT_COLORS={"Personaggio":"#c084fc","Luogo":"#4ade80","Oggetto":"#f5c842","Concetto":"#38bdf8","Evento":"#fb923c","Altro":"#7a7890"};

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get(STORE_KEY);if(r?.value)setTerms(JSON.parse(r.value));}catch{}
      setLoaded(true);
    })();
  },[]);

  const save=async(newTerms)=>{
    setTerms(newTerms);
    try{await window.storage.set(STORE_KEY,JSON.stringify(newTerms));}catch{}
  };

  const addTerm=async()=>{
    if(!form.name.trim())return;
    const t={...form,name:form.name.trim(),definition:form.definition.trim(),createdAt:Date.now()};
    const newTerms=editTerm!==null
      ?terms.map((x,i)=>i===editTerm?t:x)
      :[...terms,t].sort((a,b)=>a.name.localeCompare(b.name));
    await save(newTerms);
    setForm({name:"",definition:"",category:"Personaggio"});
    setShowForm(false);setEditTerm(null);
  };

  const deleteTerm=async(idx)=>{await save(terms.filter((_,i)=>i!==idx));};

  const generateGlossary=async()=>{
    setLoading(true);
    const text=book.chapters.map(c=>c.content||"").join('\n').slice(0,4000);
    const prompt=`Analizza questo testo e crea un glossario dei termini principali.
Identifica: personaggi (nome, ruolo), luoghi (nome, descrizione), oggetti importanti, concetti chiave.
Rispondi SOLO con JSON:
{"terms":[{"name":"Nome","definition":"Definizione breve (max 30 parole)","category":"Personaggio|Luogo|Oggetto|Concetto|Evento|Altro"}]}

TESTO:
${text}`;
    try{
      const r=await callClaude(prompt,"Sei un editor letterario. Solo JSON.",1200);
      const data=JSON.parse(r.replace(/```json|```/g,"").trim());
      const existing=terms.map(t=>t.name.toLowerCase());
      const newOnes=(data.terms||[]).filter(t=>!existing.includes(t.name.toLowerCase()));
      const merged=[...terms,...newOnes].sort((a,b)=>a.name.localeCompare(b.name));
      await save(merged);
    }catch(e){console.error(e);}
    setLoading(false);

    t.definition?.toLowerCase().includes(search.toLowerCase())
  );

        <button onClick={generateGlossary} disabled={loading||!book.chapters.some(c=>c.content?.trim())}

          {loading?"⏳ Generando...":"🤖 Genera da testo AI"}
        </button>

        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cerca..." style={{...inp,fontSize:12,marginBottom:12}} />

        {/* Stats */}
        <div style={{background:"#12111e",borderRadius:8,padding:"10px 12px",border:"1px solid #1e1d2e"}}>
          <div style={{fontSize:10,color:"#5a5870",marginBottom:6,textTransform:"uppercase"}}>Riepilogo</div>
          {CATEGORIES.map(cat=>{
            const n=terms.filter(t=>t.category===cat).length;
            if(!n)return null;
            return(<div key={cat} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
              <span style={{color:CAT_COLORS[cat]}}>{cat}</span>

          })}
          <div style={{borderTop:"1px solid #1e1d2e",marginTop:6,paddingTop:6,display:"flex",justifyContent:"space-between",fontSize:11}}>
            <span style={{color:"#c8c6d8",fontWeight:600}}>Totale</span>
            <span style={{color:"#f5c842",fontFamily:"monospace",fontWeight:700}}>{terms.length}</span>
          </div>
        </div>
      </div>

      {/* Contenuto principale */}
      <div style={{flex:1,overflowY:"auto",padding:"20px 28px"}}>

        {/* Form aggiungi/modifica */}
        {showForm&&(
          <div style={{...card,marginBottom:20,borderColor:"#4ade8033",padding:"20px 24px"}}>
            <div style={{fontSize:13,color:"#4ade80",marginBottom:14,fontFamily:"'Playfair Display',serif"}}>
              {editTerm!==null?"✏️ Modifica termine":"➕ Nuovo termine"}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

                <Lbl>Categoria</Lbl>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{...inp,cursor:"pointer"}}>
                  {CATEGORIES.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <Lbl>Definizione</Lbl>
            <textarea value={form.definition} onChange={e=>setForm(f=>({...f,definition:e.target.value}))} placeholder="Descrizione breve del termine..." rows={3} style={{...inp,resize:"vertical",marginBottom:12}} />
            <div style={{display:"flex",gap:8}}>
              <button onClick={addTerm} disabled={!form.name.trim()} style={{...goldBtn,padding:"9px 20px",fontSize:12,opacity:!form.name.trim()?0.5:1}}>✅ Salva</button>

function WordGoalPanel({book}){
  const STORE_KEY="wordgoal_"+book.title;
  const [goal,setGoal]=useState(500);
  const [sessions,setSessions]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [editGoal,setEditGoal]=useState(false);
  const [tempGoal,setTempGoal]=useState(500);

  useEffect(()=>{
    (async()=>{
      try{
        const r=await window.storage.get(STORE_KEY);
        if(r?.value){const d=JSON.parse(r.value);setGoal(d.goal||500);setSessions(d.sessions||[]);}
      }catch{}
      setLoaded(true);
    })();
  },[]);

  const persist=async(newGoal,newSessions)=>{
    try{await window.storage.set(STORE_KEY,JSON.stringify({goal:newGoal,sessions:newSessions}));}catch{}
  };

  // Calcola parole scritte oggi
  const today=new Date().toISOString().slice(0,10);
  const todayWords=book.chapters.reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0);
  const todaySession=sessions.find(s=>s.date===today);
  const startWords=todaySession?.startWords??todayWords;
  const wordsToday=Math.max(0,todayWords-startWords);
  const progress=Math.min(100,Math.round((wordsToday/goal)*100));
  const remaining=Math.max(0,goal-wordsToday);

  const startSession=async()=>{
    if(todaySession)return;
    const s={date:today,startWords:todayWords,goal};
    const ns=[...sessions.filter(x=>x.date!==today),s];
    setSessions(ns);
    await persist(goal,ns);
  };

  const saveGoal=async()=>{
    setGoal(tempGoal);setEditGoal(false);
    await persist(tempGoal,sessions);
  };

  // Streak
  const streak=()=>{
    let count=0;
    const d=new Date();
    while(true){
      const dateStr=d.toISOString().slice(0,10);
      const s=sessions.find(x=>x.date===dateStr);
      if(!s)break;
      const achieved=dateStr===today?wordsToday>=goal:true;
      if(!achieved)break;
      count++;
      d.setDate(d.getDate()-1);
    }
    return count;
  };

  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    const dateStr=d.toISOString().slice(0,10);
    const s=sessions.find(x=>x.date===dateStr);
    const isToday=dateStr===today;
    const words=isToday?wordsToday:(s?Math.max(0,s.endWords||0):0);
    return{date:dateStr,day:d.toLocaleDateString("it-IT",{weekday:"short"}),words,goal:s?.goal||goal,achieved:words>=(s?.goal||goal)};
  });

  const barColor=progress>=100?"#4ade80":progress>=60?"#f5c842":"#38bdf8";

  return(
    <div style={{flex:1,overflowY:"auto",background:"#0f0e17",padding:"28px 40px"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>
      <div style={{maxWidth:700,margin:"0 auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#38bdf8",marginBottom:4}}>🎯 Obiettivo Parole</div>
            <div style={{fontSize:13,color:"#5a5870"}}>Traccia il tuo progresso di scrittura quotidiano</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {streak()>0&&(
              <div style={{background:"#fb923c11",border:"1px solid #fb923c33",borderRadius:10,padding:"6px 14px",textAlign:"center"}}>
                <div style={{fontSize:20}}>🔥</div>
                <div style={{fontSize:11,color:"#fb923c",fontFamily:"monospace",fontWeight:700}}>{streak()} giorni</div>
              </div>
            )}
          </div>
        </div>

        {/* Obiettivo giornaliero */}
        <div style={{...card,marginBottom:20,borderColor:"#38bdf833",padding:"24px 28px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <div style={{fontSize:11,color:"#5a5870",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Obiettivo oggi</div>
              {editGoal?(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input type="number" min={100} max={10000} step={100} value={tempGoal} onChange={e=>setTempGoal(+e.target.value)} style={{...inp,width:100,fontSize:20,fontWeight:700,fontFamily:"monospace",padding:"4px 10px"}} />
                  <span style={{fontSize:16,color:"#5a5870"}}>parole</span>
                  <button onClick={saveGoal} style={{...goldBtn,padding:"6px 14px",fontSize:12}}>✅</button>
                  <button onClick={()=>setEditGoal(false)} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              ):(
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:32,fontWeight:900,color:"#38bdf8",fontFamily:"monospace"}}>{goal.toLocaleString()}</span>
                  <span style={{fontSize:16,color:"#5a5870"}}>parole</span>
                  <button onClick={()=>{setTempGoal(goal);setEditGoal(true);}} style={{background:"none",border:"1px solid #2e2d3e",borderRadius:6,color:"#5a5870",cursor:"pointer",padding:"4px 8px",fontSize:11}}>✏️</button>
                </div>
              )}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#5a5870",marginBottom:4}}>Scritte oggi</div>
              <div style={{fontSize:32,fontWeight:900,color:barColor,fontFamily:"monospace"}}>{wordsToday.toLocaleString()}</div>
            </div>
          </div>

          {/* Barra progresso */}
          <div style={{height:20,background:"#1a1829",borderRadius:10,overflow:"hidden",marginBottom:12}}>
            <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${barColor},${barColor}88)`,borderRadius:10,transition:"width 0.5s ease",position:"relative"}}>
              {progress>10&&<div style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#0f0e17",fontWeight:700,fontFamily:"monospace"}}>{progress}%</div>}
            </div>
          </div>

          <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
            <span style={{color:progress>=100?"#4ade80":"#5a5870"}}>
              {progress>=100?"🎉 Obiettivo raggiunto!":`Ancora ${remaining.toLocaleString()} parole`}
            </span>
            <span style={{color:"#5a5870",fontFamily:"monospace"}}>
              {wordsToday}/{goal} parole
            </span>
          </div>

          {/* Bottone avvia sessione */}
          {!todaySession&&(
            <button onClick={startSession} style={{...goldBtn,marginTop:16,padding:"10px 24px",fontSize:13}}>
              ▶ Avvia sessione di oggi
            </button>
          )}
          {todaySession&&progress<100&&(
            <div style={{marginTop:12,fontSize:12,color:"#38bdf8"}}>✅ Sessione avviata — scrivi nell'editor e il contatore si aggiorna automaticamente</div>
          )}
        </div>

        {/* KPI veloci */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
          {[
            {l:"Parole totali libro",v:todayWords.toLocaleString(),c:"#f5c842",i:"📚"},
            {l:"Capitoli scritti",v:book.chapters.filter(c=>c.content?.trim()).length+"/"+book.chapters.length,c:"#c084fc",i:"📑"},
            {l:"Media/sessione",v:sessions.length?Math.round(sessions.reduce((a,s)=>a+(s.endWords||0)-(s.startWords||0),0)/sessions.length).toLocaleString()+"p":"—",c:"#38bdf8",i:"📊"},
          ].map(({l,v,c,i})=>(
            <div key={l} style={{...card,textAlign:"center",padding:"16px"}}>
              <div style={{fontSize:24,marginBottom:6}}>{i}</div>
              <div style={{fontSize:22,fontWeight:900,color:c,fontFamily:"monospace",marginBottom:4}}>{v}</div>
              <div style={{fontSize:10,color:"#5a5870",textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
            </div>
          ))}
        </div>

        {/* Ultimi 7 giorni */}
        <div style={{...card,marginBottom:20}}>
          <div style={{fontSize:13,color:"#c8c6d8",marginBottom:16,fontFamily:"'Playfair Display',serif"}}>📅 Ultimi 7 giorni</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
            {last7.map((d,i)=>{
              const h=d.words>0?Math.max(8,Math.min(80,Math.round((d.words/goal)*80))):4;
              const isToday=d.date===today;
              return(
                <div key={i} style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:isToday?"#38bdf8":"#5a5870",marginBottom:6,fontWeight:isToday?700:400}}>{d.day}</div>
                  <div style={{height:80,display:"flex",alignItems:"flex-end",justifyContent:"center",marginBottom:4}}>
                    <div style={{width:"70%",height:h,background:d.achieved?"#4ade80":isToday?"#38bdf8":"#1e1d2e",borderRadius:"3px 3px 0 0",transition:"height 0.3s ease"}} />
                  </div>
                  <div style={{fontSize:9,color:d.words>0?"#7a7890":"#3a3850",fontFamily:"monospace"}}>{d.words>0?d.words+"p":"—"}</div>
                  {d.achieved&&<div style={{fontSize:10}}>⭐</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Preset obiettivi */}
        <div style={{...card}}>
          <div style={{fontSize:13,color:"#c8c6d8",marginBottom:12,fontFamily:"'Playfair Display',serif"}}>⚡ Preset rapidi</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[
              {l:"Micro",v:200,d:"10 min/giorno"},
              {l:"Base",v:500,d:"25 min/giorno"},
              {l:"Serio",v:1000,d:"1 ora/giorno"},
              {l:"NaNoWriMo",v:1667,d:"50k in 30 giorni"},
              {l:"Pro",v:3000,d:"3+ ore/giorno"},
            ].map(({l,v,d})=>(
              <button key={l} onClick={async()=>{setGoal(v);await persist(v,sessions);}}
                style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${goal===v?"#38bdf8":"#2e2d3e"}`,background:goal===v?"#38bdf811":"#12111e",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                <div style={{fontSize:12,color:goal===v?"#38bdf8":"#c8c6d8",fontWeight:600}}>{l} — {v.toLocaleString()}p</div>
                <div style={{fontSize:10,color:"#5a5870",marginTop:2}}>{d}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function KDPAnalyzerPanel({book}){
  const wordCount=book.chapters.reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0);
  const pageCount=Math.ceil(wordCount/250);
  const genre=book.genre||"Romanzo";
  const kdp=GENRE_TO_KDP[genre]||GENRE_TO_KDP["Romanzo"];

  const [format,setFormat]=useState("ebook");
  const [markets,setMarkets]=useState(["us","uk","de","it"]);
  const [customPrice,setCustomPrice]=useState(null); // null = usa default
  const [showCustom,setShowCustom]=useState(false);

  const basePrice=customPrice!==null?customPrice:(format==="ebook"?kdp.priceEbook:format==="paperback"?kdp.pricePaper:kdp.pricePaper+4);
  const pages=Math.max(pageCount,50);

  const toggleMarket=id=>setMarkets(prev=>prev.includes(id)?prev.length>1?prev.filter(x=>x!==id):prev:[...prev,id]);

  const results=markets.map(mid=>{
    const m=KDP_MARKETS.find(x=>x.id===mid);
    const {royalty,adjPrice}=calcRoyaltyA(basePrice,pages,format,mid);
    const bsr=kdp.bsrBase;
    const sales=bsrToSalesA(bsr);
    const monthly=Math.round(royalty*sales*100)/100;
    const score=Math.min(100,Math.round((monthly/5)*0.9));
    return {m,royalty,adjPrice,bsr,sales,monthly,score};
  });

  const totalMonthly=results.reduce((s,r)=>s+r.monthly,0);
  const best=results.reduce((a,b)=>b.monthly>a.monthly?b:a,results[0]);
  const annualEst=totalMonthly*12;

  // Completezza libro
  const hasTitle=!!(book.title?.trim());
  const hasAuthor=!!(book.author?.trim());
  const hasBrief=!!(book.brief?.premise?.trim());
  const chWithContent=book.chapters.filter(c=>c.content?.trim().length>200).length;
  const completeness=Math.round(
    (hasTitle?15:0)+(hasAuthor?10:0)+(hasBrief?10:0)+
    Math.min(40,chWithContent/Math.max(book.chapters.length,1)*40)+
    Math.min(25,Math.min(wordCount/200,1)*25)
  );
  const readyToPublish=completeness>=80;

  return(
    <div style={{flex:1,overflowY:"auto",background:"#0f0e17",padding:"28px 32px"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>
      <div style={{maxWidth:1100,margin:"0 auto"}}>

        {/* Header */}
        <div style={{marginBottom:24}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#f5c842",marginBottom:4}}>📊 KDP Profit Analyzer</div>
          <div style={{fontSize:12,color:"#5a5870"}}>Analisi profittabilità di <strong style={{color:"#c084fc"}}>"{book.title||"Senza titolo"}"</strong> su Amazon KDP · Solo autori indipendenti · Formule royalties ufficiali</div>
        </div>

        {/* Stato libro */}
        <div style={{...card,marginBottom:20,borderColor:readyToPublish?"#4ade8033":"#f5c84233"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{fontSize:13,color:"#c8c6d8",fontFamily:"'Playfair Display',serif"}}>📋 Stato del Libro</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:22,fontWeight:800,color:scoreCol(completeness)}}>{completeness}%</div>
              <div style={{fontSize:11,color:"#5a5870"}}>completezza</div>
            </div>
          </div>
          <div style={{height:6,background:"#1a1829",borderRadius:3,marginBottom:14,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${completeness}%`,background:`linear-gradient(90deg,#f5c842,${scoreCol(completeness)})`,borderRadius:3,transition:"width 0.5s"}} />
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
            {[
              {l:"Parole",v:wordCount.toLocaleString(),c:"#f5c842",ok:wordCount>=10000},
              {l:"Pagine stimate",v:pages,c:"#c084fc",ok:pages>=40},
              {l:"Capitoli scritti",v:`${chWithContent}/${book.chapters.length}`,c:"#38bdf8",ok:chWithContent===book.chapters.length},
              {l:"Genere",v:genre,c:"#4ade80",ok:true},
            ].map(({l,v,c,ok})=>(
              <div key={l} style={{background:"#0c0b18",borderRadius:10,padding:"10px 12px",border:`1px solid ${ok?"#1e2e1e":"#2e2d3e"}`}}>
                <div style={{fontSize:10,color:"#5a5870",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
                <div style={{fontSize:16,fontWeight:700,color:c}}>{v}</div>
                <div style={{fontSize:9,color:ok?"#4ade80":"#f59e0b",marginTop:3}}>{ok?"✓ ok":"⚠ migliora"}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[
              {l:"Titolo",ok:hasTitle},{l:"Autore",ok:hasAuthor},{l:"Briefing AI",ok:hasBrief},
              {l:`Contenuto sufficiente (>${wordCount>=20000?"✓":wordCount.toLocaleString()} parole)`,ok:wordCount>=20000},
            ].map(({l,ok})=>(
              <span key={l} style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:ok?"#14291422":"#2e1a0a22",color:ok?"#4ade80":"#f59e0b",border:`1px solid ${ok?"#4ade8033":"#f59e0b33"}`}}>
                {ok?"✓":"○"} {l}
              </span>
            ))}
          </div>
          {readyToPublish&&<div style={{marginTop:12,padding:"10px 14px",background:"#14291a",borderRadius:8,fontSize:12,color:"#4ade80"}}>🚀 Il tuo libro è pronto per la pubblicazione su Amazon KDP!</div>}
        </div>

        {/* Configurazione */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          {/* Formato */}
          <div style={{...card}}>
            <div style={{fontSize:11,color:"#5a5870",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Formato di Pubblicazione</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {KDP_FORMATS_A.map(f=>(
                <button key={f.id} onClick={()=>{setFormat(f.id);setCustomPrice(null);}} style={{flex:1,padding:"10px 8px",borderRadius:10,border:`1px solid ${format===f.id?"#f5c842":"#2e2d3e"}`,background:format===f.id?"#f5c84218":"#0c0b18",color:format===f.id?"#f5c842":"#5a5870",cursor:"pointer",fontSize:11,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontSize:18}}>{f.icon}</span><span>{f.label}</span>
                </button>
              ))}
            </div>
            <div style={{fontSize:11,color:"#5a5870",marginBottom:8}}>Prezzo base suggerito per genere:</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22,fontWeight:800,color:"#f5c842",fontFamily:"monospace"}}>${basePrice.toFixed(2)}</div>
              <button onClick={()=>setShowCustom(s=>!s)} style={{fontSize:11,color:"#c084fc",background:"transparent",border:"1px solid #c084fc44",borderRadius:8,padding:"4px 10px",cursor:"pointer"}}>✏️ personalizza</button>
            </div>
            {showCustom&&(
              <input type="number" min={0.99} max={200} step={0.01} value={customPrice??basePrice}
                onChange={e=>setCustomPrice(Number(e.target.value))}
                style={{...inp,marginTop:8,fontSize:14}}
                placeholder="Inserisci prezzo personalizzato..."
              />
            )}
            <div style={{marginTop:10,fontSize:11,color:"#5a5870"}}>
              {format==="ebook"
                ? basePrice>=2.99&&basePrice<=9.99
                  ? "✅ Range 70% royalty ($2.99–$9.99)"
                  : "⚠️ Fuori range 70% — royalty al 35%"
                : `📄 ${pages} pagine → costo stampa incluso nel calcolo`
              }
            </div>
          </div>

          {/* Mercati */}
          <div style={{...card}}>
            <div style={{fontSize:11,color:"#5a5870",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Mercati Amazon</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {KDP_MARKETS.map(m=>(
                <button key={m.id} onClick={()=>toggleMarket(m.id)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${markets.includes(m.id)?"#4ade80":"#2e2d3e"}`,background:markets.includes(m.id)?"#4ade8018":"transparent",color:markets.includes(m.id)?"#4ade80":"#5a5870",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                  {m.flag} {m.label}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[
                {l:"Roy/mese totale",v:`~$${totalMonthly.toFixed(0)}`,c:"#f5c842"},
                {l:"Stima annua",v:`~$${annualEst.toFixed(0)}`,c:"#c084fc"},
                {l:"Mercato migliore",v:`${best?.m.flag} ${best?.m.label}`,c:"#4ade80"},
              ].map(({l,v,c})=>(
                <div key={l} style={{background:"#0c0b18",borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontSize:9,color:"#5a5870",marginBottom:4,textTransform:"uppercase",letterSpacing:0.4}}>{l}</div>
                  <div style={{fontSize:14,fontWeight:700,color:c}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Tabella risultati per mercato */}
        <div style={{...card,marginBottom:20,padding:0,overflow:"hidden"}}>
          <div style={{padding:"14px 20px",borderBottom:"1px solid #1e1d2e",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:13,color:"#e8e6f0",fontFamily:"'Playfair Display',serif"}}>Analisi per Mercato — {KDP_FORMATS_A.find(f=>f.id===format)?.icon} {KDP_FORMATS_A.find(f=>f.id===format)?.label}</div>
            <span style={{fontSize:11,color:"#5a5870"}}>{kdp.label}</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#0c0b18"}}>
                  {["Mercato","Prezzo","Royalty/copia","Vendite/mese stimate","Royalty/mese","Profittabilità"].map(h=>(
                    <th key={h} style={{padding:"10px 16px",textAlign:"left",color:"#3a3850",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.5,borderBottom:"1px solid #1e1d2e"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {results.map(({m,royalty,adjPrice,sales,monthly,score})=>{
                  const profitLabel=monthly>300?"🔥 Alta":monthly>80?"✅ Buona":monthly>20?"⚠️ Bassa":"❌ Scarsa";
                  const profitColor=monthly>300?"#4ade80":monthly>80?"#f5c842":monthly>20?"#fb923c":"#f87171";
                  return(
                    <tr key={m.id} style={{borderBottom:"1px solid #0f0e17",transition:"background 0.1s"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#12111e"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{padding:"12px 16px",fontWeight:600}}>{m.flag} {m.label}</td>
                      <td style={{padding:"12px 16px",color:"#c084fc"}}>{m.symbol}{adjPrice.toFixed(2)}</td>
                      <td style={{padding:"12px 16px",color:"#4ade80",fontWeight:700}}>{m.symbol}{royalty.toFixed(2)}</td>
                      <td style={{padding:"12px 16px",color:"#c8c6d8"}}>{sales} copie</td>
                      <td style={{padding:"12px 16px",fontWeight:700,color:profitColor}}>{m.symbol}{monthly.toFixed(0)}</td>
                      <td style={{padding:"12px 16px",color:profitColor,fontWeight:600}}>{profitLabel}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Insight categoria */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          <div style={{...card,borderColor:"#f5c84233"}}>
            <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:12}}>💡 Insight per "{genre}"</div>
            <div style={{fontSize:12,color:"#c8c6d8",lineHeight:1.7}}>
              {genre==="Romance"&&"Categoria #1 KDP indie. Pubblica serie da 3+ libri per massimizzare i guadagni. Prezzo eBook ottimale: $3.99–$4.99."}
              {genre==="Romanzo"&&"Nicchie specifiche (fantasy italiano, distopico, saga familiare) performano meglio dei romanzi generici."}
              {genre==="Thriller"&&"Ambientazioni italiane specifiche (Sicilia, Venezia) differenziano dall'offerta anglofona. Serie con detective ricorrente = lettori fedeli."}
              {genre==="Giallo"&&"Il giallo italiano ha un pubblico dedicato. Personaggio investigatore ricorrente aumenta le vendite di tutta la serie."}
              {genre==="Fantasy"&&"Worldbuilding dettagliato e mappe aumentano le recensioni. Trilogia è il formato ideale per fantasy KDP indie."}
              {genre==="Self-Help"&&"Titoli ultra-specifici con promise concreta vincono. Libri brevi (150-220 pag) con piano step-by-step performano meglio."}
              {genre==="Business"&&"Argomenti evergreen (freelance, e-commerce, investing) garantiscono vendite costanti. Prezzi $6-$9 accettati."}
              {genre==="Storico"&&"Angolazioni originali su eventi noti differenziano. Biografie di figure minori trovano nicchie non competitive."}
              {genre==="Saggio"&&"Saggistica di nicchia (locale, settoriale) batte la saggistica generalista. Autorevolezza percepita è fondamentale."}
              {genre==="Horror"&&"Cover professionale obbligatoria. Sottocategorie specifiche (psychological horror, folk horror) meno competitive."}
              {genre==="Autobiografia"&&"Richiede piattaforma social preesistente per la prima spinta. Storie di trasformazione personale performano meglio."}
              {genre==="Poesia"&&"Mercato indie piccolo ma molto fedele. eBook a $0.99-$2.99 con paperback $9.99 è la combo più comune."}
              {(genre==="Cucina"||genre==="Ricettario"||genre==="Pasticceria")&&"Categoria top KDP indie: ricettari fotografici battono tutti. Niccchie specifiche (vegano, senza glutine, cucina regionale) hanno bassa competizione. Prezzo paperback $12-$16 accettato."}
              {genre==="Giardinaggio"&&"Nicchia in forte crescita, bassa competizione indie. Guide pratiche per clima specifico (es. orto mediterraneo) dominano le ricerche."}
              {genre==="Fai da Te & Bricolage"&&"Pubblico fedele e alta propensione all'acquisto. Guide step-by-step con illustrazioni performano molto meglio del testo puro."}
              {genre==="Fitness & Allenamento"&&"Programmi strutturati (12 settimane, 30 giorni) battono i manuali generici. Abbinare eBook + paperback massimizza le royalties."}
              {(genre==="Nutrizione & Dieta")&&"Categoria in forte crescita. Titoli con promessa specifica (es. digiuno 16:8, low carb) convertono molto meglio dei generici."}
              {(genre==="Animali & Cura")&&"Nicchia molto fedele: i proprietari di animali comprano più libri sul loro pet. Guide razza-specifiche hanno pochissima competizione."}
              {(genre==="Genitorialità")&&"Genitori acquistano molti libri. Guide per fascia d'età specifica (0-3 anni, adolescenti) performano meglio delle guide generali."}
              {!["Romanzo","Romance","Fantasy","Thriller","Giallo","Horror","Storico","Saggio","Autobiografia","Self-Help","Business","Poesia","Cucina","Ricettario","Pasticceria","Giardinaggio","Fai da Te & Bricolage","Fitness & Allenamento","Nutrizione & Dieta","Animali & Cura","Genitorialità"].includes(genre)&&"Nicchia specifica con buona opportunità. Un titolo ultra-focalizzato su un sotto-argomento batte sempre i manuali generali in questa categoria."}
            </div>
          </div>
          <div style={{...card,borderColor:"#c084fc33"}}>
            <div style={{fontSize:12,color:"#c084fc",fontFamily:"'Playfair Display',serif",marginBottom:12}}>📈 Opportunità di mercato</div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <div style={{fontSize:36,fontWeight:800,color:scoreCol(kdp.opp)}}>{kdp.opp}</div>
              <div>
                <div style={{fontSize:12,color:"#c8c6d8"}}>Opportunity Score su 100</div>
                <div style={{fontSize:11,color:"#5a5870"}}>per autori indie in questa categoria</div>
              </div>
            </div>
            <div style={{height:8,background:"#1a1829",borderRadius:4,marginBottom:12,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${kdp.opp}%`,background:`linear-gradient(90deg,#c084fc,${scoreCol(kdp.opp)})`,borderRadius:4}} />
            </div>
            <div style={{fontSize:11,color:"#5a5870",lineHeight:1.6}}>
              BSR medio categoria: <strong style={{color:"#c8c6d8"}}>{kdp.bsrBase.toLocaleString()}</strong><br/>
              Prezzo eBook tipico indie: <strong style={{color:"#c8c6d8"}}>${kdp.priceEbook}</strong><br/>
              Prezzo Paperback tipico: <strong style={{color:"#c8c6d8"}}>${kdp.pricePaper}</strong><br/>
              Competizione indie: <strong style={{color:compCol(kdp.opp>=75?"bassa":kdp.opp>=55?"media":"alta")}}>{kdp.opp>=75?"Bassa":kdp.opp>=55?"Media":"Alta"}</strong>
            </div>
          </div>
        </div>

        {/* Footer note */}
        <div style={{fontSize:11,color:"#3a3850",textAlign:"center",lineHeight:1.6}}>
          📦 Analisi basata su formule royalties KDP ufficiali e benchmark indie · Vendite stimate da BSR medio categoria · I valori reali dipendono da copertina, descrizione, marketing e recensioni
        </div>

      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   ROOT
───────────────────────────────────────────── */
function BookForge(){
  const [appStatus,setAppStatus]=useState("loading");
  const [projects,setProjects]=useState([]);
  const [currentId,setCurrentId]=useState(null);
  const [book,setBook]=useState(null);
  const [active,setActive]=useState("write");
  const [savedAt,setSavedAt]=useState(null);
  const saveTimer=useRef(null);

  useEffect(()=>{
    const _t=setTimeout(()=>setAppStatus("projects"),2500);
    (async()=>{try{const list=await loadProjectsList();setProjects(list);}catch{}clearTimeout(_t);setAppStatus("projects");})();
    return()=>clearTimeout(_t);
  },[]);

  useEffect(()=>{
    if(!book||!currentId)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const updated=await saveProject(currentId,book);
      setProjects(prev=>prev.map(p=>p.id===currentId?{...p,title:book.title,author:book.author,genre:book.genre,chapters:book.chapters,brief:book.brief,chapterBriefs:book.chapterBriefs,updatedAt:updated.updatedAt}:p));
      const n=new Date();setSavedAt(`${n.getHours().toString().padStart(2,"0")}:${n.getMinutes().toString().padStart(2,"0")}`);
    },800);
    return()=>clearTimeout(saveTimer.current);
  },[book,currentId]);

  const handleOpenProject=async(id)=>{const proj=await loadProject(id);if(!proj)return;// Assicura che ogni capitolo abbia images:[]
    const chapters=(proj.chapters||[]).map(ch=>({...ch,images:ch.images||[]}));setBook({...proj,chapters});setCurrentId(id);setActive("write");setAppStatus("editor");};
  const handleCreateProject=async()=>{const id=`proj_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;const newBook=DEFAULT_BOOK();await saveProject(id,newBook);const meta={id,title:"",author:"",genre:"Romanzo",chapters:newBook.chapters,brief:DEFAULT_BRIEF,chapterBriefs:[],createdAt:newBook.createdAt,updatedAt:newBook.updatedAt};const newList=[...projects,meta];setProjects(newList);await saveProjectsList(newList);setBook(newBook);setCurrentId(id);setActive("write");setAppStatus("editor");};
  const handleDeleteProject=async(id)=>{await deleteProject(id);const newList=projects.filter(p=>p.id!==id);setProjects(newList);await saveProjectsList(newList);if(currentId===id){setBook(null);setCurrentId(null);setAppStatus("projects");}};
  const handleSetActive=(panel)=>{if(panel==="projects")setAppStatus("projects");else{setActive(panel);setAppStatus("editor");}};
  useEffect(()=>{if(appStatus==="loading")return;saveProjectsList(projects);},[projects]);

  if(appStatus==="loading")return(<div style={{display:"flex",height:"100vh",background:"#0f0e17",color:"#f5c842",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontSize:20,flexDirection:"column",gap:16}}><div style={{fontSize:48}}>📖</div><div>Caricamento BookForge...</div></div>);

  return(
    <div style={{display:"flex",height:"100vh",background:"#0f0e17",color:"#e8e6f0",fontFamily:"Georgia,serif",overflow:"hidden"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        textarea,input,select{font-family:inherit;color:inherit;}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:#0f0e17;}
        ::-webkit-scrollbar-thumb{background:#2e2d3e;border-radius:3px;}
        input::placeholder,textarea::placeholder{color:#3a3850;}
        button:hover{opacity:0.85;}
        h2,h3{margin:0;}
      `}</style>
      <Sidebar book={book||DEFAULT_BOOK()} setBook={setBook} active={appStatus==="projects"?"projects":active} setActive={handleSetActive} savedAt={savedAt} />
      <main style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {appStatus==="projects"&&<ProjectsPanel projects={projects} currentId={currentId} onOpen={handleOpenProject} onCreate={handleCreateProject} onDelete={handleDeleteProject} />}
        {appStatus==="editor"&&book&&(
          <>
            {active==="write"     &&<WritePanel     book={book} setBook={setBook} />}
            {active==="aiwriter"  &&<AIWriterPanel  book={book} setBook={setBook} setActive={setActive} />}
            {active==="chapters"  &&<ChaptersPanel  book={book} setBook={setBook} />}
            {active==="cover"     &&<CoverPanel     book={book} />}
            {active==="format"    &&<FormatPanel    book={book} />}
            {active==="translate" &&<TranslatePanel book={book} setBook={setBook} />}
            {active==="publish"   &&<PublishPanel   book={book} setBook={setBook} />}
            {active==="preview"     &&<PreviewPanel      book={book} setActive={setActive} />}
            {active==="importstruct"&&<ImportStructPanel book={book} setBook={setBook} setActive={setActive} />}
            {active==="series"      &&<SeriesPanel       book={book} setBook={setBook} projects={projects} />}
            {active==="email"       &&<EmailPanel        book={book} />}
            {active==="analytics"   &&<AnalyticsPanel    book={book} />}
            {active==="revision"    &&<RevisionPanel     book={book} setBook={setBook} setActive={setActive} />}
            {active==="chat"        &&<ChatPanel        book={book} />}
            {active==="glossario"    &&<GlossarioPanel   book={book} setBook={setBook} />}
            {active==="wordgoal"     &&<WordGoalPanel    book={book} />}
            {active==="abtitle"     &&<ABTitlePanel      book={book} setBook={setBook} />}
            {active==="seo"         &&<SEOResearchPanel  book={book} setBook={setBook} />}
            {active==="kdpanalyzer"&&<KDPAnalyzerPanel book={book} />}
          </>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(BookForge));
  </script>
</body>
</html>
