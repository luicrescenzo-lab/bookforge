  const [sizeIdx,setSizeIdx]=useState(1);
  const [margins,setMargins]=useState({top:1,bottom:1,inner:1.25,outer:0.75});
  const [fontName,setFontName]=useState("Georgia");
  const [fontSize,setFontSize]=useState(11);
  const [lineSpacing,setLineSpacing]=useState(1.5);
  const [desc,setDesc]=useState("");
  const [kw,setKw]=useState("");
  const [aiMetaLoading,setAiMetaLoading]=useState(false);

  /* ── STEP 3: Export ── */
  const [exporting,setExporting]=useState({});
  const [exported,setExported]=useState({});

  const totalW=book.chapters.reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0);
  const totalPages=Math.ceil(totalW/250);
  const totalImgs=book.chapters.reduce((a,c)=>a+(c.images?.length||0),0);
  const allLangs=[{code:"orig",label:book.title||"Originale",flag:"📖"},...LANGUAGES.filter(l=>transLangs.includes(l.code))];

  /* Traduzione di una singola lingua */
  const translateLang=async(langCode)=>{
    const langLabel=LANGUAGES.find(l=>l.code===langCode)?.label||langCode;
    setTransStatus(s=>({...s,[langCode]:"loading"}));
    setTransError("");
    try{
      const chapters=[];
      for(let i=0;i<book.chapters.length;i++){
        const ch=book.chapters[i];
        const r=await callClaude(
          `Traduci fedelmente in ${langLabel} questo testo letterario. Mantieni stile e tono. Solo il testo tradotto:\n\nTITOLO: ${ch.title}\n\n${ch.content||"(vuoto)"}`,
          `Sei un traduttore letterario professionista specializzato in ${langLabel}.`
        );
        chapters.push({...ch,title:ch.title,content:r.trim()});
      }
      const translated={...book,title:book.title,author:book.author,chapters,_lang:langCode,_langLabel:langLabel};
      setTranslatedBooks(prev=>({...prev,[langCode]:translated}));
      setTransStatus(s=>({...s,[langCode]:"done"}));
    }catch(e){
      setTransStatus(s=>({...s,[langCode]:"error"}));
      setTransError(`Errore ${langLabel}: ${e.message}`);
    }
  };

  const translateAll=async()=>{
    for(const lc of transLangs){
      if(transStatus[lc]==="done")continue;
      await translateLang(lc);
    }
  };

  /* Genera metadati KDP con AI */
  const genMeta=async()=>{
    setAiMetaLoading(true);
    const syn=book.chapters.slice(0,2).map(c=>c.content.slice(0,300)).join(" ");
    const [d,k]=await Promise.all([
      callClaude(`Scrivi descrizione marketing 150-200 parole per Amazon KDP:\nTitolo: "${book.title}"\nAutore: "${book.author}"\nGenere: "${book.genre}"\nTesto: "${syn}"\nUsa HTML base (b,em). Hook iniziale, call-to-action finale.`,"Copywriter KDP esperto. Solo la descrizione."),
      callClaude(`7 keywords SEO Amazon KDP per: "${book.title}" - ${book.genre}. Solo 7 parole chiave separate da virgola, max 50 chars ciascuna.`)
    ]);
    setDesc(d.trim()); setKw(k.trim());
    setAiMetaLoading(false);
  };

  /* Esporta PDF/EPUB per una versione */
  const doExport=async(langCode,format)=>{
    const key=`${langCode}_${format}`;
    setExporting(e=>({...e,[key]:true}));
    try{
      const targetBook=langCode==="orig"?book:translatedBooks[langCode];
      if(!targetBook)throw new Error("Libro non disponibile");
      if(format==="pdf"){
        await exportPDF(targetBook,sizeIdx,margins,fontName,fontSize,lineSpacing);
      }else{
        exportEPUB(targetBook);
      }
      setExported(e=>({...e,[key]:true}));
    }catch(err){alert("Errore esportazione: "+err.message);}
    setExporting(e=>({...e,[key]:false}));
  };

  /* Esporta tutto in un colpo solo */
  const exportAll=async()=>{
    for(const lang of allLangs){
      for(const fmt of["pdf","epub"]){
        if(lang.code!=="orig"&&!translatedBooks[lang.code])continue;
        await doExport(lang.code,fmt);
      }
    }
  };

  const STEPS=["📊 Revisione","🌍 Traduzione","📐 Impaginazione","📦 Esporta","🚀 Amazon"];

  return(
    <div style={{flex:1,overflowY:"auto",background:"#0f0e17"}}>
      {/* Header fisso */}
      <div style={{padding:"28px 40px 0",background:"#0f0e17",position:"sticky",top:0,zIndex:10,borderBottom:"1px solid #1a1929"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#f5c842",marginBottom:4}}>🚀 Pubblica su Amazon KDP</div>
            <div style={{fontSize:13,color:"#5a5870"}}>Wizard automatica — dalla scrittura alla pubblicazione</div>
          </div>
        </div>
        {/* Step bar */}
        <div style={{display:"flex",gap:0,marginBottom:0}}>
          {STEPS.map((s,i)=>(
            <div key={i} onClick={()=>setWStep(i)} style={{flex:1,padding:"10px 8px",textAlign:"center",cursor:"pointer",borderBottom:`3px solid ${wStep===i?"#f5c842":"transparent"}`,background:wStep===i?"#1a1829":"transparent",transition:"all 0.2s"}}>
              <div style={{fontSize:12,color:wStep===i?"#f5c842":i<wStep?"#4ade80":"#5a5870",fontFamily:wStep===i?"'Playfair Display',serif":"inherit",fontWeight:wStep===i?700:400}}>{s}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"32px 40px",maxWidth:900,margin:"0 auto"}}>

        {/* ══════ STEP 0: REVISIONE ══════ */}
        {wStep===0&&(
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#f5c842",marginBottom:20}}>Riepilogo del libro</div>
            {/* Stats cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14,marginBottom:28}}>
              {[
                {icon:"📝",label:"Parole",val:totalW.toLocaleString(),color:"#f5c842"},
                {icon:"📄",label:"Pagine stimate",val:totalPages,color:"#c084fc"},
                {icon:"📑",label:"Capitoli",val:book.chapters.length,color:"#38bdf8"},
                {icon:"🖼",label:"Immagini",val:totalImgs,color:"#f472b6"},
                {icon:"⏱",label:"Lettura min",val:`~${Math.round(totalW/200)} min`,color:"#4ade80"},
                {icon:"📚",label:"Genere",val:book.genre,color:"#fbbf24"},
              ].map(({icon,label,val,color})=>(
                <div key={label} style={{...card,textAlign:"center",padding:"16px 12px"}}>
                  <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
                  <div style={{fontSize:20,fontWeight:700,color,fontFamily:"monospace"}}>{val}</div>
                  <div style={{fontSize:11,color:"#5a5870",marginTop:3}}>{label}</div>
                </div>
              ))}
            </div>

            {/* Capitoli */}
            <div style={{...card,marginBottom:24}}>
              <div style={{fontSize:13,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:14}}>📋 Struttura capitoli</div>
              {book.chapters.map((ch,i)=>{
                const wc=ch.content?.trim()?ch.content.trim().split(/\s+/).length:0;
                const pct=Math.min(100,(wc/2000)*100);
                return(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:"#f5c84222",border:"1px solid #f5c842",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#f5c842",fontWeight:700,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:"#c8c6d8",fontFamily:"'Playfair Display',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ch.title||`Capitolo ${i+1}`}</div>
                      <div style={{background:"#1a1829",borderRadius:4,height:4,marginTop:4}}><div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#f5c842,#c084fc)",borderRadius:4}} /></div>
                    </div>
                    <div style={{fontSize:11,color:"#5a5870",fontFamily:"monospace",flexShrink:0}}>{wc.toLocaleString()}w</div>
                    {(ch.images||[]).length>0&&<span style={{fontSize:10,color:"#f472b6"}}>🖼{ch.images.length}</span>}
                    <span style={{fontSize:10,color:wc>0?"#4ade80":"#ef4444"}}>{wc>0?"✓":"vuoto"}</span>
                  </div>
                );
              })}
            </div>

            {totalW<3000&&(
              <div style={{background:"#1c1200",border:"1px solid #f59e0b44",borderRadius:10,padding:14,marginBottom:20,fontSize:13,color:"#f59e0b"}}>
                ⚠️ Il libro ha solo {totalW.toLocaleString()} parole. Amazon KDP raccomanda almeno 10.000 parole per un ebook e 24.000 per un cartaceo.
              </div>
            )}
            <button onClick={()=>setWStep(1)} style={goldBtn}>Avanti: Traduzione →</button>
          </div>
        )}

        {/* ══════ STEP 1: TRADUZIONE ══════ */}
        {wStep===1&&(
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#f5c842",marginBottom:8}}>Traduzione automatica</div>
            <div style={{color:"#7a7890",fontSize:13,marginBottom:24}}>Seleziona le lingue in cui vuoi pubblicare il libro. L'AI tradurrà ogni capitolo mantenendo stile e tono. Puoi saltare questo step se vuoi pubblicare solo nella lingua originale.</div>

            {/* Griglia lingue */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:24}}>
              {LANGUAGES.filter(l=>l.code!=="it").map(l=>{
                const sel=transLangs.includes(l.code);
                const st=transStatus[l.code]||"idle";
                const isDone=st==="done";
                const isLoading=st==="loading";
                return(
                  <div key={l.code} onClick={()=>{if(isDone||isLoading)return;setTransLangs(prev=>sel?prev.filter(c=>c!==l.code):[...prev,l.code]);}} style={{borderRadius:10,border:`2px solid ${isDone?"#4ade80":isLoading?"#f5c842":sel?"#38bdf8":"#2e2d3e"}`,background:isDone?"#4ade8011":isLoading?"#f5c84211":sel?"#38bdf811":"#12111e",padding:"12px 10px",cursor:isDone||isLoading?"default":"pointer",textAlign:"center",transition:"all 0.2s"}}>
                    <div style={{fontSize:22}}>{l.flag}</div>
                    <div style={{fontSize:12,color:"#e8e6f0",marginTop:4,fontWeight:sel?700:400}}>{l.label}</div>
                    <div style={{fontSize:10,marginTop:3,color:isDone?"#4ade80":isLoading?"#f5c842":sel?"#38bdf8":"#5a5870"}}>
                      {isDone?"✓ tradotto":isLoading?"⏳ in corso...":sel?"selezionato":"clicca per selezionare"}
                    </div>
                  </div>
                );
              })}
            </div>

            {transError&&<div style={{background:"#2e1a1a",border:"1px solid #5e2a2a",borderRadius:8,padding:14,color:"#ff6b6b",fontSize:13,marginBottom:16}}>{transError}</div>}

            {transLangs.length>0&&(
              <div style={{...card,marginBottom:20}}>
                <div style={{fontSize:13,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:10}}>Lingue selezionate: {transLangs.map(c=>LANGUAGES.find(l=>l.code===c)?.flag).join(" ")}</div>
                <div style={{fontSize:12,color:"#7a7890",marginBottom:14}}>La traduzione di {book.chapters.length} capitoli richiederà circa {transLangs.length*book.chapters.length*5} secondi. Puoi tradurre una lingua alla volta o tutte insieme.</div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <button onClick={translateAll} disabled={Object.values(transStatus).some(s=>s==="loading")} style={{...goldBtn,fontSize:13,padding:"10px 22px",opacity:Object.values(transStatus).some(s=>s==="loading")?0.6:1}}>
                    {Object.values(transStatus).some(s=>s==="loading")?"⏳ Traduzione in corso...":"🌍 Traduci tutte le lingue"}
                  </button>
                  {transLangs.map(lc=>{
                    const l=LANGUAGES.find(x=>x.code===lc);
                    const st=transStatus[lc]||"idle";
                    return(
                      <button key={lc} onClick={()=>translateLang(lc)} disabled={st==="loading"||st==="done"} style={{padding:"10px 18px",borderRadius:8,border:`1px solid ${st==="done"?"#4ade80":st==="loading"?"#f5c842":"#2e2d3e"}`,background:"transparent",color:st==="done"?"#4ade80":st==="loading"?"#f5c842":"#7a7890",cursor:st==="loading"||st==="done"?"default":"pointer",fontSize:12}}>
                        {l?.flag} {st==="done"?"✓":st==="loading"?"⏳":""} {l?.label}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setWStep(0)} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>← Indietro</button>
              <button onClick={()=>setWStep(2)} style={goldBtn}>
                {transLangs.length===0?"Salta traduzione →":"Avanti: Impaginazione →"}
              </button>
            </div>
          </div>
        )}

        {/* ══════ STEP 2: IMPAGINAZIONE ══════ */}
        {wStep===2&&(
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#f5c842",marginBottom:8}}>Impaginazione automatica KDP</div>
            <div style={{color:"#7a7890",fontSize:13,marginBottom:24}}>Imposta il formato una volta sola — verrà applicato a tutte le versioni linguistiche al momento dell'esportazione.</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
              {/* Colonna sinistra: impostazioni */}
              <div>
                <div style={{...card,marginBottom:14}}>
                  <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:12}}>📐 FORMATO PAGINA</div>
                  {KDP_SIZES.map((s,i)=>(
                    <div key={i} onClick={()=>setSizeIdx(i)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,border:`1px solid ${sizeIdx===i?"#f5c842":"#2e2d3e"}`,background:sizeIdx===i?"#f5c84211":"transparent",cursor:"pointer",marginBottom:6}}>
                      <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${sizeIdx===i?"#f5c842":"#2e2d3e"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sizeIdx===i&&<div style={{width:8,height:8,borderRadius:"50%",background:"#f5c842"}} />}</div>
                      <div>
                        <div style={{fontSize:13,color:"#e8e6f0"}}>{s.label}</div>
                        <div style={{fontSize:10,color:"#5a5870"}}>{sizeIdx===0?"Economico · Ideale per fiction":sizeIdx===1?"Il più comune su KDP":"Saggistica · Libri illustrati"}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{...card,marginBottom:14}}>
                  <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:12}}>✍️ TIPOGRAFIA</div>
                  <Lbl>Font</Lbl>
                  <select value={fontName} onChange={e=>setFontName(e.target.value)} style={{...sel,width:"100%"}}>{FONTS.map(f=><option key={f}>{f}</option>)}</select>
                  <Lbl>Dimensione: {fontSize}pt</Lbl>
                  <input type="range" min={9} max={14} step={0.5} value={fontSize} onChange={e=>setFontSize(+e.target.value)} style={{width:"100%"}} />
                  <Lbl>Interlinea: {lineSpacing}x</Lbl>
                  <input type="range" min={1} max={2.5} step={0.1} value={lineSpacing} onChange={e=>setLineSpacing(+e.target.value)} style={{width:"100%"}} />
                </div>
                <div style={{...card}}>
                  <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:12}}>📏 MARGINI (pollici)</div>
                  {[["top","Alto"],["bottom","Basso"],["inner","Interno (rilegatura)"],["outer","Esterno"]].map(([k,label])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{color:"#7a7890",fontSize:12}}>{label}</span>
                      <input type="number" min={0.5} max={2} step={0.05} value={margins[k]} onChange={e=>setMargins(m=>({...m,[k]:+e.target.value}))} style={{width:70,...inp,padding:"5px 8px",fontSize:12}} />
                    </div>
                  ))}
                </div>
              </div>

              {/* Colonna destra: metadati KDP */}
              <div>
                <div style={{...card,marginBottom:14}}>
                  <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:8}}>✨ METADATI AMAZON KDP</div>
                  <div style={{fontSize:11,color:"#5a5870",marginBottom:12}}>Ottimizzati con AI per massimizzare la visibilità su Amazon.</div>
                  <button onClick={genMeta} disabled={aiMetaLoading} style={{...goldBtn,width:"100%",fontSize:13,marginBottom:12,opacity:aiMetaLoading?0.6:1}}>
                    {aiMetaLoading?"⏳ Generando con AI...":"🤖 Genera descrizione + keywords"}
                  </button>
                  {desc&&(
                    <>
                      <Lbl>Descrizione</Lbl>
                      <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={6} style={{...inp,fontSize:12,lineHeight:1.6,resize:"vertical",marginBottom:6}} />
                      <button onClick={()=>navigator.clipboard.writeText(desc)} style={{width:"100%",padding:"7px",borderRadius:7,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:11,marginBottom:10}}>📋 Copia descrizione</button>
                    </>
                  )}
                  {kw&&(
                    <>
                      <Lbl>Keywords SEO</Lbl>
                      <div style={{background:"#0f0e17",borderRadius:8,padding:10,fontSize:12,color:"#c084fc",lineHeight:1.8,marginBottom:6}}>{kw}</div>
                      <button onClick={()=>navigator.clipboard.writeText(kw)} style={{width:"100%",padding:"7px",borderRadius:7,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:11}}>📋 Copia keywords</button>
                    </>
                  )}
                </div>

                {/* Anteprima pagina */}
                <div style={{...card}}>
                  <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:10}}>👁 ANTEPRIMA PAGINA</div>
                  <div style={{background:"#fff",borderRadius:4,padding:`${margins.top*22}px ${margins.outer*26}px ${margins.bottom*22}px ${margins.inner*26}px`,boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
                    {book.chapters[0]?.title&&<div style={{fontFamily:fontName,fontSize:`${fontSize*0.6}pt`,fontWeight:"bold",textAlign:"center",marginBottom:"0.8em",color:"#111"}}>{book.chapters[0].title}</div>}
                    <div style={{fontFamily:fontName,fontSize:`${fontSize*0.55}pt`,lineHeight:lineSpacing,color:"#111",textAlign:"justify"}}>{(book.chapters[0]?.content||"Il tuo testo apparirà qui con l'impaginazione impostata.").slice(0,280)}</div>
                    <div style={{textAlign:"center",fontSize:"7pt",color:"#999",fontFamily:fontName,marginTop:10}}>— 1 —</div>
                  </div>
                </div>
              </div>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setWStep(1)} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>← Indietro</button>
              <button onClick={()=>setWStep(3)} style={goldBtn}>Avanti: Esporta →</button>
            </div>
          </div>
        )}

        {/* ══════ STEP 3: ESPORTAZIONE ══════ */}
        {wStep===3&&(
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#f5c842",marginBottom:8}}>Esportazione file</div>
            <div style={{color:"#7a7890",fontSize:13,marginBottom:24}}>Esporta PDF (per cartaceo KDP) ed EPUB (per Kindle) in tutte le lingue disponibili. I file verranno scaricati direttamente.</div>

            {/* Esporta tutto */}
            <div style={{...card,marginBottom:20,textAlign:"center",padding:28,background:"#0c0b18",border:"1px solid #f5c84233"}}>
              <div style={{fontSize:36,marginBottom:10}}>📦</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#f5c842",marginBottom:6}}>Esporta tutto in un click</div>
              <div style={{color:"#7a7890",fontSize:12,marginBottom:16}}>{allLangs.length} versione{allLangs.length>1?"i":""} × 2 formati = {allLangs.length*2} file</div>
              <button onClick={exportAll} style={{...goldBtn,fontSize:15,padding:"14px 36px"}}>📦 Scarica tutto ({allLangs.length*2} file)</button>
            </div>

            {/* Tabella per lingua */}
            <div style={{...card}}>
              <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:14}}>ESPORTA PER LINGUA</div>
              {allLangs.map(lang=>{
                const isOrig=lang.code==="orig";
                const availBook=isOrig?book:translatedBooks[lang.code];
                const notAvail=!isOrig&&!availBook;
                return(
                  <div key={lang.code} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 0",borderBottom:"1px solid #1e1d2e"}}>
                    <div style={{fontSize:20,flexShrink:0}}>{lang.flag}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#e8e6f0",fontFamily:"'Playfair Display',serif"}}>{isOrig?(book.title||"Originale"):lang.label}</div>
                      <div style={{fontSize:11,color:"#5a5870"}}>{isOrig?"Lingua originale":notAvail?"Non ancora tradotto — torna allo step Traduzione":"Traduzione disponibile"}</div>
                    </div>
                    {notAvail?(
                      <div style={{fontSize:11,color:"#5a5870",fontStyle:"italic"}}>—</div>
                    ):(
                      <div style={{display:"flex",gap:8}}>
                        {[["pdf","📄 PDF","cartaceo KDP"],["epub","📱 EPUB","Kindle"]].map(([fmt,label,hint])=>{
                          const key=`${lang.code}_${fmt}`;
                          const isDone=exported[key];
                          const isExp=exporting[key];
                          return(
                            <button key={fmt} onClick={()=>doExport(lang.code,fmt)} disabled={isExp} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${isDone?"#4ade80":"#2e2d3e"}`,background:isDone?"#4ade8011":"transparent",color:isDone?"#4ade80":isExp?"#f5c842":"#c8c6d8",cursor:isExp?"not-allowed":"pointer",fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                              <span>{isExp?"⏳":isDone?"✓":label}</span>
                              <span style={{fontSize:9,color:"#5a5870"}}>{hint}</span>
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={()=>setWStep(2)} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>← Indietro</button>
              <button onClick={()=>setWStep(4)} style={goldBtn}>Avanti: Carica su Amazon →</button>
            </div>
          </div>
        )}

        {/* ══════ STEP 4: AMAZON ══════ */}
        {wStep===4&&(
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#f5c842",marginBottom:8}}>Pubblica su Amazon KDP</div>
            <div style={{color:"#7a7890",fontSize:13,marginBottom:28}}>Hai i file pronti. Ora caricali su Amazon Kindle Direct Publishing seguendo questi passi.</div>

            {[
              {step:1,icon:"🔐",title:"Accedi a KDP",body:"Vai su kdp.amazon.com con il tuo account Amazon. Se è la prima volta, completa il profilo autore con nome, bio e informazioni fiscali (necessarie per ricevere le royalty)."},
              {step:2,icon:"➕",title:"Crea un nuovo titolo",body:"Clicca '+ Crea' nel pannello KDP. Scegli Ebook Kindle per la versione digitale (Kindle) o Libro cartaceo per la versione stampata (print-on-demand). Puoi pubblicare entrambe le versioni dello stesso libro."},
              {step:3,icon:"📝",title:"Inserisci i metadati",body:"Copia titolo, autore, descrizione e keywords che hai generato nel passaggio precedente. Seleziona 2 categorie Amazon appropriate per il tuo genere."},
              {step:4,icon:"⬆️",title:"Carica i file",body:"Per Kindle: carica il file EPUB. Per cartaceo: carica il file PDF. Carica anche la copertina (vai su 'Copertina AI' in BookForge per crearla, poi ridimensionala a 2560×1600px con Canva o simili)."},
              {step:5,icon:"👁",title:"Anteprima e verifica",body:"Usa lo strumento anteprima di KDP per controllare ogni pagina: margini, font, impaginazione delle immagini. Se hai pubblicato in più lingue, verifica ogni versione separatamente."},
              {step:6,icon:"💰",title:"Imposta il prezzo",body:"Ebook: royalty 70% se il prezzo è tra €2,99 e €9,99 — fuori da questa fascia è 35%. Cartaceo: KDP calcola il costo di stampa e tu imposti il prezzo finale di vendita."},
              {step:7,icon:"🚀",title:"Pubblica!",body:"Clicca 'Pubblica' per ogni versione linguistica che hai caricato. Il libro sarà disponibile su Amazon globale entro 24-72 ore dalla revisione."},
            ].map(({step,icon,title,body})=>(
              <div key={step} style={{display:"flex",gap:16,marginBottom:16}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:"#f5c84222",border:"2px solid #f5c842",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,color:"#f5c842",fontWeight:700}}>{step}</div>
                <div style={{...card,flex:1,padding:"14px 18px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:18}}>{icon}</span>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#f5c842"}}>{title}</span>
                  </div>
                  <div style={{fontSize:13,color:"#c8c6d8",lineHeight:1.65}}>{body}</div>
                </div>
              </div>
            ))}

            <div style={{...card,marginTop:8,background:"#0c1a0c",border:"1px solid #4ade8033",textAlign:"center",padding:28}}>
              <div style={{fontSize:40,marginBottom:10}}>🎉</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#4ade80",marginBottom:8}}>Sei pronto a pubblicare!</div>
              <div style={{color:"#7a7890",fontSize:13,marginBottom:20}}>Hai completato tutti i passaggi di BookForge. In bocca al lupo con la pubblicazione!</div>
              <a href="https://kdp.amazon.com" target="_blank" rel="noopener noreferrer" style={{...goldBtn,textDecoration:"none",display:"inline-block"}}>🚀 Vai su Amazon KDP</a>
            </div>

            <div style={{marginTop:20}}>
              <button onClick={()=>setWStep(3)} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>← Torna all'esportazione</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   AI WRITER PANEL — modalità INTERO / CAPITOLO x CAPITOLO
───────────────────────────────────────────── */
function AIWriterPanel({book,setBook,setActive}){
  const [step,setStep]=useState(()=>(book.chapterBriefs||[]).length>0?1:0);
  const [brief,setBrief]=useState(book.brief||DEFAULT_BRIEF);
  const [chapterBriefs,setChapterBriefs]=useState(book.chapterBriefs||[]);
  const [mode,setMode]=useState("intero"); // "intero" | "singolo"
  const [generating,setGenerating]=useState(false);
  const [currentGen,setCurrentGen]=useState({chapter:0,status:""});
  const [generatedChapters,setGeneratedChapters]=useState([]);
  const [genError,setGenError]=useState("");
  const [previewIdx,setPreviewIdx]=useState(0);
  // Modalità singolo capitolo
  const [singleIdx,setSingleIdx]=useState(0);
  const [singleDraft,setSingleDraft]=useState(""); // testo generato da revisionare
  const [singleGenerating,setSingleGenerating]=useState(false);

  useEffect(()=>{setBook(b=>({...b,brief}));},[brief]);
  useEffect(()=>{setBook(b=>({...b,chapterBriefs}));},[chapterBriefs]);

  /* Genera scaletta */
  const generateOutlines=async()=>{
    setGenerating(true);setGenError("");
    try{
      const outlines=[];
      for(let i=0;i<brief.numChapters;i++){
        setGenError(`Generando scaletta capitolo ${i+1} di ${brief.numChapters}...`);
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:"Rispondi SOLO con un oggetto JSON su una riga. Niente altro.",messages:[{role:"user",content:`Crea la scheda del CAPITOLO ${i+1} di ${brief.numChapters}:\nTITOLO: "${book.title||"Senza titolo"}" | GENERE: ${book.genre} | TRAMA: ${brief.premise} | PROTAGONISTA: ${brief.protagonist||"n/d"} | ANTAGONISTA: ${brief.antagonist||"n/d"} | AMBIENTAZIONE: ${brief.setting||"n/d"} | TONO: ${brief.tone}\n${outlines.length>0?`PRECEDENTI: ${outlines.map((o,j)=>`Cap.${j+1}: ${o.title}`).join(", ")}`:""}
Rispondi con SOLO questo JSON:\n{"title":"titolo","summary":"cosa succede 80 chars","keyScene":"scena principale 60 chars","emotionalArc":"arco emotivo 50 chars"}`}]})});
        const data=await res.json();
        const r=data.content?.map(b=>b.text||"").join("").trim()||"";
        const start=r.indexOf("{"),end=r.lastIndexOf("}");
        if(start===-1||end===-1)outlines.push({title:`Capitolo ${i+1}`,summary:"Da definire",keyScene:"Da definire",emotionalArc:"Da definire"});
        else{try{outlines.push(JSON.parse(r.slice(start,end+1)));}catch{outlines.push({title:`Capitolo ${i+1}`,summary:"Da definire",keyScene:"Da definire",emotionalArc:"Da definire"});}}
      }
      setGenError("");
      setChapterBriefs(outlines.map((o,i)=>({...o,customInstructions:"",index:i})));
      setStep(1);
    }catch(e){setGenError("Errore: "+e.message);}
    setGenerating(false);
  };

  /* Helper: genera testo di un singolo capitolo */
  const buildChapterPrompt=(i,cb,prevChapters)=>{
    const prevC=prevChapters.length>0?`\n\nCAPITOLI PRECEDENTI:\n${prevChapters.map((p,idx)=>`Cap.${idx+1}: ${p.slice(0,200)}...`).join("\n")}`:""
    const lengthGuide=brief.chapterLength.includes("300")?"300-500":brief.chapterLength.includes("500")?"500-1000":brief.chapterLength.includes("1000")?"1000-2000":"2000+";
    return `Scrivi il capitolo ${i+1} di un libro:\n\nTITOLO LIBRO: "${book.title||"Senza titolo"}"\nGENERE: ${book.genre} | TONO: ${brief.tone} | POV: ${brief.pov} | LUNGHEZZA: ${lengthGuide} parole\n\nTITOLO: ${cb.title}\nCOSA SUCCEDE: ${cb.summary}\nSCENA CHIAVE: ${cb.keyScene}\nARCO EMOTIVO: ${cb.emotionalArc}\n${cb.customInstructions?`EXTRA: ${cb.customInstructions}`:""}${prevC}\n\nScrivi SOLO il testo del capitolo, in italiano, senza titolo iniziale, senza commenti. Paragrafi separati da riga vuota.`;
  };

  /* Genera TUTTO il libro */
  const generateAllChapters=async()=>{
    setStep(2);setGenerating(true);setGenError("");setGeneratedChapters([]);
    const results=[];const prevChapters=[];
    for(let i=0;i<chapterBriefs.length;i++){
      const cb=chapterBriefs[i];
      setCurrentGen({chapter:i+1,status:`Scrittura "${cb.title}"...`});
      try{
        const r=await callClaude(buildChapterPrompt(i,cb,prevChapters),`Sei uno scrittore professionista italiano di ${book.genre||"narrativa"}.`);
        results.push({title:cb.title,content:r.trim(),images:[]});
        prevChapters.push(r.trim());
        setGeneratedChapters([...results]);
      }catch(e){setGenError(`Errore al capitolo ${i+1}: `+e.message);break;}
    }
    setGenerating(false);
    if(results.length===chapterBriefs.length)setStep(3);
  };

  /* Genera UN singolo capitolo (modalità capitolo-per-capitolo) */
  const generateSingleChapter=async()=>{
    if(singleIdx>=chapterBriefs.length)return;
    setSingleGenerating(true);setSingleDraft("");
    const cb=chapterBriefs[singleIdx];
    // Usa i capitoli già scritti nel libro come contesto
    const prevChapters=book.chapters.slice(0,singleIdx).map(c=>c.content).filter(Boolean);
    try{
      const r=await callClaude(buildChapterPrompt(singleIdx,cb,prevChapters),`Sei uno scrittore professionista italiano di ${book.genre||"narrativa"}.`);
      setSingleDraft(r.trim());
    }catch(e){setSingleDraft("Errore: "+e.message);}
    setSingleGenerating(false);
  };

  /* Accetta la bozza del capitolo singolo e la inserisce nel libro */
  const acceptSingleChapter=()=>{
    const cb=chapterBriefs[singleIdx];
    setBook(b=>{
      const chapters=[...b.chapters];
      // Sostituisce o aggiunge il capitolo all'indice corretto
      while(chapters.length<=singleIdx)chapters.push({title:`Capitolo ${chapters.length+1}`,content:"",images:[]});
      chapters[singleIdx]={...chapters[singleIdx],title:cb.title,content:singleDraft};
      return{...b,chapters};
    });
    setSingleDraft("");
    // Avanza automaticamente al prossimo capitolo se esiste
    if(singleIdx<chapterBriefs.length-1)setSingleIdx(i=>i+1);
    else setActive("write");
  };

  const applyToBook=()=>{setBook(b=>({...b,chapters:generatedChapters}));setActive("write");};
  const wordCount=generatedChapters.reduce((a,c)=>a+(c.content.trim()?c.content.trim().split(/\s+/).length:0),0);

  return(
    <div style={{flex:1,overflowY:"auto",padding:36}}>
      <h2 style={{fontFamily:"'Playfair Display',serif",color:"#f5c842",fontSize:26,marginBottom:4}}>🤖 Scrivi con AI</h2>
      <p style={{color:"#7a7890",fontSize:14,marginBottom:28}}>Dai le indicazioni, l'AI scrive il tuo libro.</p>

      {/* Progress steps */}
      <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:32,maxWidth:600}}>
        {["Briefing","Scaletta","Modalità & Generazione","Risultato"].map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",flex:i<3?1:"auto"}}>
            <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:step>i?"#f5c842":step===i?"#1a1829":"#12111e",border:step>=i?"2px solid #f5c842":"2px solid #2e2d3e",color:step>i?"#0f0e17":step===i?"#f5c842":"#5a5870",fontSize:13,fontWeight:700,flexShrink:0}}>{step>i?"✓":i+1}</div>
            <div style={{fontSize:11,color:step>=i?"#f5c842":"#5a5870",marginLeft:6,flexShrink:0,marginRight:8}}>{s}</div>
            {i<3&&<div style={{flex:1,height:2,background:step>i?"#f5c842":"#2e2d3e",marginRight:8}} />}
          </div>
        ))}
      </div>

      {/* STEP 0: Brief */}
      {step===0&&(
        <div style={{maxWidth:700}}>
          <div style={{...card,marginBottom:16}}>
            <div style={{fontSize:13,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:16}}>📖 DI COSA PARLA IL LIBRO?</div>
            <Lbl>Trama / Premessa principale *</Lbl>
            <textarea value={brief.premise} onChange={e=>setBrief(b=>({...b,premise:e.target.value}))} rows={3} placeholder="es. Un detective in pensione scopre che la sua città nasconde un'organizzazione criminale..." style={{...inp,lineHeight:1.6,resize:"vertical"}} />\n            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:4}}>\n              <div><Lbl>Protagonista</Lbl><input value={brief.protagonist} onChange={e=>setBrief(b=>({...b,protagonist:e.target.value}))} placeholder="Nome, età, carattere..." style={inp} /></div>\n              <div><Lbl>Antagonista / Conflitto</Lbl><input value={brief.antagonist} onChange={e=>setBrief(b=>({...b,antagonist:e.target.value}))} placeholder="Chi o cosa si oppone..." style={inp} /></div>\n              <div><Lbl>Ambientazione</Lbl><input value={brief.setting} onChange={e=>setBrief(b=>({...b,setting:e.target.value}))} placeholder="Dove e quando..." style={inp} /></div>\n              <div><Lbl>Tema centrale</Lbl><input value={brief.theme} onChange={e=>setBrief(b=>({...b,theme:e.target.value}))} placeholder="es. Redenzione, amore, tradimento..." style={inp} /></div>\n            </div>\n          </div>\n          <div style={{...card,marginBottom:16}}>\n            <div style={{fontSize:13,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:16}}>⚙️ STILE E STRUTTURA</div>\n            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>\n              <div><Lbl>Tono narrativo</Lbl><select value={brief.tone} onChange={e=>setBrief(b=>({...b,tone:e.target.value}))} style={{...sel,width:"100%"}}>{TONES.map(t=><option key={t}>{t}</option>)}</select></div>\n              <div><Lbl>Punto di vista</Lbl><select value={brief.pov} onChange={e=>setBrief(b=>({...b,pov:e.target.value}))} style={{...sel,width:"100%"}}>{POV.map(p=><option key={p}>{p}</option>)}</select></div>\n              <div><Lbl>Lunghezza capitoli</Lbl><select value={brief.chapterLength} onChange={e=>setBrief(b=>({...b,chapterLength:e.target.value}))} style={{...sel,width:"100%"}}>{CHAPTER_LENGTHS.map(l=><option key={l}>{l}</option>)}</select></div>\n              <div><Lbl>Numero di capitoli: {brief.numChapters}</Lbl><input type="range" min={3} max={20} value={brief.numChapters} onChange={e=>setBrief(b=>({...b,numChapters:+e.target.value}))} style={{width:"100%",marginTop:8}} /><div style={{fontSize:11,color:"#5a5870",marginTop:4}}>3 → 20 capitoli</div></div>\n            </div>\n            <Lbl>Note aggiuntive</Lbl>\n            <textarea value={brief.extraNotes} onChange={e=>setBrief(b=>({...b,extraNotes:e.target.value}))} rows={2} placeholder="es. Includi un colpo di scena al capitolo 5..." style={{...inp,lineHeight:1.6,resize:"vertical"}} />\n          </div>\n          {genError&&<div style={{background:"#2e1a1a",border:"1px solid #5e2a2a",borderRadius:8,padding:14,color:"#ff6b6b",fontSize:13,marginBottom:16}}>{genError}</div>}\n          <button onClick={generateOutlines} disabled={generating||!brief.premise} style={{...goldBtn,opacity:(generating||!brief.premise)?0.5:1,cursor:(generating||!brief.premise)?"not-allowed":"pointer"}}>{generating?"⏳ Generando scaletta...":"📋 Genera scaletta con AI →"}</button>\n          {!brief.premise&&<div style={{fontSize:12,color:"#5a5870",marginTop:8}}>* Inserisci almeno la trama per continuare</div>}\n        </div>\n      )}\n\n      {/* STEP 1: Scaletta + SCELTA MODALITÀ */}\n      {step===1&&(\n        <div style={{maxWidth:700}}>\n          {/* ── SCELTA MODALITÀ ── */}\n          <div style={{...card,marginBottom:20,border:"1px solid #f5c84244"}}>\n            <div style={{fontSize:13,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:16}}>⚡ COME VUOI GENERARE IL LIBRO?</div>\n            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>\n              {/* Modalità INTERO */}\n              <div onClick={()=>setMode("intero")} style={{borderRadius:12,border:`2px solid ${mode==="intero"?"#f5c842":"#2e2d3e"}`,background:mode==="intero"?"#f5c84211":"#0f0e17",padding:18,cursor:"pointer",transition:"all 0.2s"}}>\n                <div style={{fontSize:28,marginBottom:8}}>📚</div>\n                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:mode==="intero"?"#f5c842":"#c8c6d8",marginBottom:6}}>Scrivi tutto il libro</div>\n                <div style={{fontSize:12,color:"#7a7890",lineHeight:1.5}}>L'AI genera tutti i capitoli in sequenza automaticamente. Ideale se vuoi avere subito una prima bozza completa.</div>\n                {mode==="intero"&&<div style={{marginTop:10,fontSize:11,color:"#f5c842"}}>✓ Selezionato</div>}\n              </div>\n              {/* Modalità SINGOLO */}\n              <div onClick={()=>setMode("singolo")} style={{borderRadius:12,border:`2px solid ${mode==="singolo"?"#c084fc":"#2e2d3e"}`,background:mode==="singolo"?"#c084fc11":"#0f0e17",padding:18,cursor:"pointer",transition:"all 0.2s"}}>\n                <div style={{fontSize:28,marginBottom:8}}>✏️</div>\n                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:mode==="singolo"?"#c084fc":"#c8c6d8",marginBottom:6}}>Capitolo per capitolo</div>\n                <div style={{fontSize:12,color:"#7a7890",lineHeight:1.5}}>L'AI genera un capitolo alla volta. Tu lo leggi, lo modifichi, poi decidi di accettarlo prima di passare al successivo.</div>\n                {mode==="singolo"&&<div style={{marginTop:10,fontSize:11,color:"#c084fc"}}>✓ Selezionato</div>}\n              </div>\n            </div>\n          </div>\n\n          {/* Scaletta */}\n          <div style={{...card,marginBottom:20}}>\n            <div style={{fontSize:13,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:4}}>📋 SCALETTA — Rivedila e personalizza</div>\n            <div style={{fontSize:12,color:"#7a7890",marginBottom:16}}>Modifica titoli, riassunti e aggiungi istruzioni per ogni capitolo.</div>\n            {chapterBriefs.map((cb,i)=>(\n              <div key={i} style={{background:"#0f0e17",borderRadius:10,padding:16,marginBottom:10,border:`1px solid ${mode==="singolo"&&i===singleIdx?"#c084fc":"#2e2d3e"}`,position:"relative"}}>\n                {mode==="singolo"&&(\n                  <div style={{position:"absolute",top:10,right:10,fontSize:10,color:i===singleIdx?"#c084fc":"#5a5870",background:i===singleIdx?"#c084fc22":"transparent",padding:"2px 8px",borderRadius:10,cursor:"pointer"}} onClick={()=>setSingleIdx(i)}>\n                    {i<singleIdx?"✓ fatto":i===singleIdx?"▶ in corso":"in attesa"}\n                  </div>\n                )}\n                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>\n                  <div style={{width:28,height:28,borderRadius:"50%",background:"#f5c84222",border:"1px solid #f5c842",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#f5c842",fontWeight:700,flexShrink:0}}>{i+1}</div>\n                  <input value={cb.title} onChange={e=>setChapterBriefs(arr=>{const n=[...arr];n[i]={...n[i],title:e.target.value};return n;})} style={{...inp,fontFamily:"'Playfair Display',serif",fontSize:14}} />\n                </div>\n                <textarea value={cb.summary} onChange={e=>setChapterBriefs(arr=>{const n=[...arr];n[i]={...n[i],summary:e.target.value};return n;})} rows={2} style={{...inp,fontSize:12,lineHeight:1.6,resize:"vertical",marginBottom:8}} />\n                <input value={cb.customInstructions} onChange={e=>setChapterBriefs(arr=>{const n=[...arr];n[i]={...n[i],customInstructions:e.target.value};return n;})} placeholder="Istruzioni extra per questo capitolo (opzionale)..." style={{...inp,fontSize:12}} />\n              </div>\n            ))}\n          </div>\n\n          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>\n            <button onClick={()=>setStep(0)} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>← Modifica brief</button>\n            {mode==="intero"?(\n              <button onClick={generateAllChapters} style={goldBtn}>📚 Scrivi tutto il libro →</button>\n            ):(\n              <button onClick={()=>setStep(2)} style={{...goldBtn,background:"linear-gradient(135deg,#c084fc,#8b5cf6)"}}>✏️ Inizia capitolo per capitolo →</button>\n            )}\n          </div>\n        </div>\n      )}\n\n      {/* STEP 2: Generazione - INTERO */}\n      {step===2&&mode==="intero"&&(\n        <div style={{maxWidth:600}}>\n          <div style={{...card,marginBottom:20,textAlign:"center",padding:40}}>\n            <div style={{fontSize:48,marginBottom:16}}>✍️</div>\n            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#f5c842",marginBottom:8}}>L'AI sta scrivendo il tuo libro...</div>\n            <div style={{color:"#7a7890",fontSize:14,marginBottom:24}}>Capitolo {currentGen.chapter} di {chapterBriefs.length}: <span style={{color:"#e8e6f0"}}>{currentGen.status}</span></div>\n            <div style={{background:"#0f0e17",borderRadius:8,height:12,overflow:"hidden",marginBottom:12}}><div style={{width:`${(currentGen.chapter/chapterBriefs.length)*100}%`,height:"100%",background:"linear-gradient(90deg,#f5c842,#c084fc)",borderRadius:8,transition:"width 0.8s"}} /></div>\n            <div style={{fontSize:13,color:"#5a5870"}}>{Math.round((currentGen.chapter/chapterBriefs.length)*100)}% completato</div>\n          </div>\n          {generatedChapters.length>0&&(<div style={{...card}}><div style={{fontSize:12,color:"#4ade80",marginBottom:8}}>✅ Completati: {generatedChapters.length}/{chapterBriefs.length}</div>{generatedChapters.map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{color:"#4ade80",fontSize:14}}>✓</span><span style={{color:"#c8c6d8",fontSize:13,fontFamily:"'Playfair Display',serif"}}>{c.title}</span><span style={{color:"#5a5870",fontSize:11,marginLeft:"auto"}}>{c.content.trim().split(/\s+/).length}w</span></div>))}</div>)}\n          {genError&&<div style={{background:"#2e1a1a",border:"1px solid #5e2a2a",borderRadius:8,padding:14,color:"#ff6b6b",fontSize:13,marginTop:16}}>{genError}</div>}\n        </div>\n      )}\n\n      {/* STEP 2: Modalità CAPITOLO PER CAPITOLO */}\n      {step===2&&mode==="singolo"&&(\n        <div style={{maxWidth:760}}>\n          <div style={{...card,marginBottom:16,background:"#0c0b1e",border:"1px solid #c084fc44"}}>\n            {/* Header del capitolo corrente */}\n            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>\n              <div>\n                <div style={{fontSize:11,color:"#c084fc",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Capitolo {singleIdx+1} di {chapterBriefs.length}</div>\n                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#e8e6f0"}}>{chapterBriefs[singleIdx]?.title}</div>\n              </div>\n              <div style={{display:"flex",gap:8}}>\n                <button onClick={()=>singleIdx>0&&setSingleIdx(i=>i-1)} disabled={singleIdx===0} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13,opacity:singleIdx===0?0.4:1}}>← Prec.</button>\n                <button onClick={()=>singleIdx<chapterBriefs.length-1&&setSingleIdx(i=>i+1)} disabled={singleIdx===chapterBriefs.length-1} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13,opacity:singleIdx===chapterBriefs.length-1?0.4:1}}>Succ. →</button>\n              </div>\n            </div>\n\n            {/* Progressione capitoli */}\n            <div style={{display:"flex",gap:4,marginBottom:20,flexWrap:"wrap"}}>\n              {chapterBriefs.map((_,i)=>{\n                const isWritten=book.chapters[i]?.content?.trim();\n                return(\n                  <div key={i} onClick={()=>setSingleIdx(i)} style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,cursor:"pointer",fontWeight:700,border:`2px solid ${i===singleIdx?"#c084fc":isWritten?"#4ade80":"#2e2d3e"}`,background:i===singleIdx?"#c084fc22":isWritten?"#4ade8022":"transparent",color:i===singleIdx?"#c084fc":isWritten?"#4ade80":"#5a5870"}}>{isWritten?"✓":i+1}</div>\n                );\n              })}\n            </div>\n\n            {/* Genera bozza */}\n            {!singleDraft&&!singleGenerating&&(\n              <div style={{textAlign:"center",padding:"20px 0"}}>\n                <div style={{fontSize:14,color:"#7a7890",marginBottom:16}}>\n                  {book.chapters[singleIdx]?.content?.trim()?"Questo capitolo è già stato scritto. Puoi rigenerare una nuova bozza o modificarlo direttamente nell'editor.":"Premi il pulsante per generare la bozza di questo capitolo."}
                </div>
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  <button onClick={generateSingleChapter} style={{...goldBtn,background:"linear-gradient(135deg,#c084fc,#8b5cf6)"}}>✍️ Genera bozza capitolo {singleIdx+1}</button>
                  {book.chapters[singleIdx]?.content?.trim()&&(
                    <button onClick={()=>setActive("write")} style={{...goldBtn}}>✏️ Vai all'editor</button>
                  )}
                </div>
              </div>
            )}

            {/* Loading */}
            {singleGenerating&&(
              <div style={{textAlign:"center",padding:"30px 0"}}>
                <div style={{fontSize:36,marginBottom:12}}>✍️</div>
                <div style={{color:"#c084fc",fontFamily:"'Playfair Display',serif",fontSize:16}}>Scrittura del capitolo in corso...</div>
              </div>
            )}

            {/* Bozza generata — revisione */}
            {singleDraft&&!singleGenerating&&(
              <div>
                <div style={{fontSize:12,color:"#c084fc",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>✨ BOZZA GENERATA — Leggila e modificala prima di accettare</span>
                  <span style={{color:"#5a5870"}}>{singleDraft.trim().split(/\s+/).length} parole</span>
                </div>
                <textarea value={singleDraft} onChange={e=>setSingleDraft(e.target.value)} rows={14}
                  style={{...inp,lineHeight:1.85,resize:"vertical",fontFamily:"Georgia,serif",fontSize:14,color:"#c8c6d8",marginBottom:14}} />
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <button onClick={acceptSingleChapter} style={goldBtn}>
                    ✅ Accetta e {singleIdx<chapterBriefs.length-1?"passa al capitolo "+(singleIdx+2):"completa il libro"}
                  </button>
                  <button onClick={generateSingleChapter} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #c084fc44",background:"transparent",color:"#c084fc",cursor:"pointer",fontSize:13}}>
                    🔄 Rigenera bozza
                  </button>
                  <button onClick={()=>setSingleDraft("")} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>
                    ✕ Scarta
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* STEP 3: Done — solo per modalità intero */}
      {step===3&&(
        <div style={{maxWidth:700}}>
          <div style={{...card,marginBottom:20,textAlign:"center",padding:40}}>
            <div style={{fontSize:56,marginBottom:12}}>🎉</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#f5c842",marginBottom:8}}>Il tuo libro è pronto!</div>
            <div style={{display:"flex",justifyContent:"center",gap:20,marginBottom:24}}>
              <div><div style={{fontSize:24,fontWeight:700,color:"#f5c842",fontFamily:"monospace"}}>{generatedChapters.length}</div><div style={{fontSize:11,color:"#5a5870"}}>capitoli</div></div>
              <div><div style={{fontSize:24,fontWeight:700,color:"#c084fc",fontFamily:"monospace"}}>{wordCount.toLocaleString()}</div><div style={{fontSize:11,color:"#5a5870"}}>parole</div></div>
              <div><div style={{fontSize:24,fontWeight:700,color:"#38bdf8",fontFamily:"monospace"}}>{Math.ceil(wordCount/250)}</div><div style={{fontSize:11,color:"#5a5870"}}>pagine stimate</div></div>
            </div>
            <button onClick={applyToBook} style={{...goldBtn,fontSize:16,padding:"14px 36px"}}>✅ Carica nel progetto e vai all'editor</button>
          </div>
          <div style={{...card}}>
            <div style={{fontSize:12,color:"#f5c842",fontFamily:"'Playfair Display',serif",marginBottom:12}}>ANTEPRIMA CAPITOLI</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>{generatedChapters.map((c,i)=>(<button key={i} onClick={()=>setPreviewIdx(i)} style={{padding:"6px 12px",borderRadius:20,border:previewIdx===i?"1px solid #f5c842":"1px solid #2e2d3e",background:previewIdx===i?"#f5c84222":"transparent",color:previewIdx===i?"#f5c842":"#7a7890",cursor:"pointer",fontSize:12}}>Cap. {i+1}</button>))}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#f5c842",marginBottom:8}}>{generatedChapters[previewIdx]?.title}</div>
            <div style={{color:"#c8c6d8",fontSize:14,lineHeight:1.8,maxHeight:200,overflow:"auto",fontFamily:"Georgia,serif"}}>{generatedChapters[previewIdx]?.content?.slice(0,600)}...</div>
            <div style={{fontSize:11,color:"#5a5870",marginTop:8}}>{generatedChapters[previewIdx]?.content.trim().split(/\s+/).length} parole</div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>{setStep(0);setGeneratedChapters([]);}} style={{padding:"10px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>🔄 Ricomincia</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────
   PREVIEW PANEL — Anteprima libro completa pagina per pagina
───────────────────────────────────────────── */
function PreviewPanel({book,setActive}){
  const [chIdx,setChIdx]=useState(0);
  const [font,setFont]=useState("Georgia");
  const [fontSize,setFontSize]=useState(16);
  const [lineH,setLineH]=useState(1.8);
  const [width,setWidth]=useState(680);
  const [fullscreen,setFullscreen]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const scrollRef=useRef(null);

  const totalWords=book.chapters.reduce((a,c)=>a+(c.content?.trim()?c.content.trim().split(/\s+/).length:0),0);
  const totalPages=Math.ceil(totalWords/250);
  const ch=book.chapters[chIdx];
  const chWords=ch?.content?.trim()?ch.content.trim().split(/\s+/).length:0;

  // Paragrafi del capitolo corrente — gestisce sottotitoli ## e separatori ---
  function renderContent(content){
    if(!content?.trim()) return(
      <div style={{color:"#aaa",fontStyle:"italic",textAlign:"center",padding:"60px 0",fontSize:14}}>
        Capitolo vuoto — torna all'editor per aggiungere contenuto.
      </div>
    );
    const blocks=content.split(/\n/).reduce((acc,line)=>{
      const last=acc[acc.length-1];
      if(line.startsWith("## ")||line.startsWith("### ")||line==="---"||line===""){
        acc.push({type:line==="---"?"hr":line===""?"blank":line.startsWith("### ")?"h3":"h2",text:line.replace(/^#{2,3}\s*/,"")});
      } else {
        if(last&&last.type==="p") last.text+="\n"+line;
        else acc.push({type:"p",text:line});
      }
      return acc;
    },[]);

    return blocks.map((b,i)=>{
      if(b.type==="hr") return <hr key={i} style={{border:"none",borderTop:"1px solid #ccc",margin:"32px 0"}} />;
      if(b.type==="blank") return null;
      if(b.type==="h2") return(
        <h2 key={i} style={{fontFamily:font,fontSize:fontSize*1.25,color:"#111",marginTop:40,marginBottom:16,fontWeight:700,borderBottom:"2px solid #e8e0d0",paddingBottom:8}}>
          {b.text}
        </h2>
      );
      if(b.type==="h3") return(
        <h3 key={i} style={{fontFamily:font,fontSize:fontSize*1.1,color:"#333",marginTop:28,marginBottom:10,fontWeight:600}}>
          {b.text}
        </h3>
      );
      // Controllo foto inline nel paragrafo
      const checkInlineImg=(text,chapterImages)=>{
        const imgMatch=text.match(/^\[\[img:([^\]]+)\]\]$/);
        if(imgMatch){
          const imgId=imgMatch[1];
          const imgObj=(chapterImages||[]).find(im=>im.id===imgId);
          if(imgObj) return imgObj;
        }
        return null;
      };
      // Paragrafo normale o foto inline
      const paras=b.text.split(/\n+/).filter(p=>p.trim());
      return paras.map((p,j)=>{
        const inlineImg=checkInlineImg(p.trim(),ch?.images);
        if(inlineImg) return(
          <div key={`${i}-${j}`} style={{margin:"20px 0",textAlign:inlineImg.align==="sinistra"?"left":inlineImg.align==="destra"?"right":"center"}}>
            <img src={inlineImg.data} alt={inlineImg.caption||""} style={{maxWidth:"100%",maxHeight:400,borderRadius:4,boxShadow:"0 2px 12px rgba(0,0,0,0.15)",objectFit:"contain"}} />
            {inlineImg.caption&&<div style={{fontSize:12,color:"#888",fontStyle:"italic",marginTop:6,textAlign:"center"}}>{inlineImg.caption}</div>}
          </div>
        );
        return(
          <p key={`${i}-${j}`} style={{fontFamily:font,fontSize,lineHeight:lineH,color:"#1a1a1a",textAlign:"justify",textIndent:"1.8em",margin:"0 0 0.4em 0"}}>
            {p.trim()}
          </p>
        );
      });
    });
  }

  const pageStyle={
    background:"#fff",
    width:fullscreen?"100%":`${width}px`,
    maxWidth:"100%",
    minHeight:fullscreen?"100vh":860,
    margin:"0 auto",
    padding:fullscreen?"80px 120px":"48px 72px",
    boxSizing:"border-box",
    boxShadow:fullscreen?"none":"0 8px 60px rgba(0,0,0,0.25)",
    borderRadius:fullscreen?0:4,
    position:"relative",
  };

  return(
    <div style={{display:"flex",flex:1,overflow:"hidden",background:"#1a1826",flexDirection:"column"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>

      {/* Toolbar */}
      <div style={{background:"#0c0b18",borderBottom:"1px solid #1a1929",padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0,flexWrap:"wrap"}}>
        {/* Navigazione capitoli */}
        <button onClick={()=>{setChIdx(i=>Math.max(0,i-1));scrollRef.current?.scrollTo(0,0);}} disabled={chIdx===0}
          style={{padding:"6px 12px",borderRadius:6,border:"1px solid #2e2d3e",background:"transparent",color:chIdx===0?"#3a3850":"#c8c6d8",cursor:chIdx===0?"default":"pointer",fontSize:13}}>
          ← Prec
        </button>
        <select value={chIdx} onChange={e=>{setChIdx(+e.target.value);scrollRef.current?.scrollTo(0,0);}}
          style={{...sel,fontSize:12,flex:1,maxWidth:320,padding:"6px 10px"}}>
          {book.chapters.map((c,i)=>(
            <option key={i} value={i}>{i+1}. {c.title||`Capitolo ${i+1}`} {c.content?.trim()?"":"(vuoto)"}</option>
          ))}
        </select>
        <button onClick={()=>{setChIdx(i=>Math.min(book.chapters.length-1,i+1));scrollRef.current?.scrollTo(0,0);}} disabled={chIdx===book.chapters.length-1}
          style={{padding:"6px 12px",borderRadius:6,border:"1px solid #2e2d3e",background:"transparent",color:chIdx===book.chapters.length-1?"#3a3850":"#c8c6d8",cursor:chIdx===book.chapters.length-1?"default":"pointer",fontSize:13}}>
          Succ →
        </button>

        <div style={{width:1,height:20,background:"#2e2d3e",flexShrink:0}} />

        {/* Contatori */}
        <span style={{fontSize:11,color:"#5a5870",whiteSpace:"nowrap"}}>
          Cap {chIdx+1}/{book.chapters.length} · {chWords.toLocaleString()} parole
        </span>
        <span style={{fontSize:11,color:"#3a3850"}}>|</span>
        <span style={{fontSize:11,color:"#5a5870",whiteSpace:"nowrap"}}>
          Totale: {totalWords.toLocaleString()} parole · ~{totalPages} pag
        </span>

        <div style={{flex:1}} />

        {/* Impostazioni lettura */}
        <button onClick={()=>setShowSettings(s=>!s)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${showSettings?"#f5c842":"#2e2d3e"}`,background:showSettings?"#f5c84218":"transparent",color:showSettings?"#f5c842":"#7a7890",cursor:"pointer",fontSize:12}}>
          ⚙️ Visualizzazione
        </button>
        <button onClick={()=>setFullscreen(f=>!f)} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #2e2d3e",background:"transparent",color:"#c8c6d8",cursor:"pointer",fontSize:12}}>
          {fullscreen?"⊡ Normale":"⊞ Full"}
        </button>
        <button onClick={()=>setActive("write")} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #f5c84244",background:"#f5c84211",color:"#f5c842",cursor:"pointer",fontSize:12}}>
          ✏️ Torna all'editor
        </button>
      </div>

      {/* Settings drawer */}
      {showSettings&&(
        <div style={{background:"#0f0e1b",borderBottom:"1px solid #1a1929",padding:"12px 24px",display:"flex",gap:32,flexWrap:"wrap",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#5a5870",whiteSpace:"nowrap"}}>Font:</span>
            <select value={font} onChange={e=>setFont(e.target.value)} style={{...sel,fontSize:11,padding:"4px 8px"}}>
              {["Georgia","Palatino Linotype","Times New Roman","Garamond","Arial","Helvetica"].map(f=><option key={f}>{f}</option>)}
            </select>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#5a5870",whiteSpace:"nowrap"}}>Testo: {fontSize}px</span>
            <input type="range" min={13} max={24} value={fontSize} onChange={e=>setFontSize(+e.target.value)} style={{width:100}} />
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#5a5870",whiteSpace:"nowrap"}}>Interlinea: {lineH}x</span>
            <input type="range" min={1.4} max={2.4} step={0.1} value={lineH} onChange={e=>setLineH(+e.target.value)} style={{width:100}} />
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,color:"#5a5870",whiteSpace:"nowrap"}}>Larghezza: {width}px</span>
            <input type="range" min={400} max={900} step={20} value={width} onChange={e=>setWidth(+e.target.value)} style={{width:120}} />
          </div>
        </div>
      )}

      {/* Pagina libro */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:fullscreen?0:"32px 40px",background:fullscreen?"#fff":"#2a2838"}}>
        <div style={pageStyle}>
          {/* Header capitolo */}
          <div style={{marginBottom:48,paddingBottom:24,borderBottom:"3px double #c8b89a"}}>
            <div style={{fontSize:11,color:"#888",letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontFamily:"Georgia"}}>
              {chIdx===0?"Introduzione":`Capitolo ${chIdx+1}`}
            </div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:fontSize*1.8,color:"#111",margin:0,lineHeight:1.2,fontWeight:700}}>
              {ch?.title||`Capitolo ${chIdx+1}`}
            </h1>
            {chWords>0&&(
              <div style={{marginTop:12,fontSize:12,color:"#aaa"}}>
                {chWords.toLocaleString()} parole · ~{Math.ceil(chWords/250)} pagine
              </div>
            )}
          </div>

          {/* Contenuto */}
          <div>{renderContent(ch?.content)}</div>

          {/* Immagini del capitolo */}
          {ch?.images?.length>0&&(
            <div style={{marginTop:40}}>
              <div style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:1,marginBottom:20,borderTop:"1px solid #e0d8cc",paddingTop:20}}>
                Immagini
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:16}}>
                {ch.images.map((img,i)=>(
                  <div key={i} style={{borderRadius:4,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}}>
                    <img src={img.data} alt={img.caption||""} style={{width:"100%",display:"block",objectFit:"cover"}} />
                    {img.caption&&<div style={{padding:"6px 10px",fontSize:11,color:"#666",background:"#f9f7f3",fontStyle:"italic"}}>{img.caption}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Footer pagina */}
          <div style={{marginTop:60,paddingTop:16,borderTop:"1px solid #e0d8cc",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10,color:"#bbb",fontFamily:"Georgia",fontStyle:"italic"}}>{book.title}</span>
            <span style={{fontSize:10,color:"#bbb",fontFamily:"Georgia"}}>— {chIdx+1} —</span>

          <div style={{display:"flex",justifyContent:"center",gap:12,padding:"24px 0 40px"}}>

              style={{padding:"10px 24px",borderRadius:8,border:"1px solid #3a3850",background:"transparent",color:chIdx===book.chapters.length-1?"#3a3850":"#c8c6d8",cursor:chIdx===book.chapters.length-1?"default":"pointer",fontSize:13}}>

  );
}

/* ─────────────────────────────────────────────
   IMPORT STRUCT PANEL
───────────────────────────────────────────── */
function parseStructure(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const chapters=[];
  let currentCh=null;
  const chRe=/^(?:capitolo\s+)?(\d+)[\s.\-–:]+(.+)/i;
  const subRe=/^(\d+)\.(\d+)(?:\.\d+)*[\s.\-–:]+(.+)/i;
  for(const line of lines){
    const subM=line.match(subRe);
    if(subM){
      if(currentCh) currentCh.subchapters.push({num:subM[1]+"."+subM[2],title:subM[3].trim(),note:""});
      continue;
    }
    const chM=line.match(chRe);
    if(chM&&!line.match(subRe)){
      currentCh={num:chM[1],title:chM[2].trim(),subchapters:[],note:""};
      chapters.push(currentCh);
      continue;
    }
    if(currentCh){
      const lastSub=currentCh.subchapters[currentCh.subchapters.length-1];
      if(lastSub) lastSub.note+=(lastSub.note?" ":"")+line;
      else currentCh.note+=(currentCh.note?" ":"")+line;
    }
  }
  return chapters;
}

function buildChaptersFromParsed(parsed){
  return parsed.map(ch=>{
    const subText=ch.subchapters.length
      ?ch.subchapters.map(s=>`### ${s.num} – ${s.title}${s.note?"\n"+s.note:""}`).join("\n\n")
      :"";
    const aiNote=[ch.note||"",subText].filter(Boolean).join("\n\n");
    return {title:`Cap. ${ch.num} – ${ch.title}`,content:"",images:[],aiNote,subchapters:ch.subchapters};
  });
}

function ImportStructPanel({book,setBook,setActive}){
  const [raw,setRaw]=useState("");
  const [parsed,setParsed]=useState(null);
  const [mode,setMode]=useState("paste"); // paste | preview | generating | done
  const [overwrite,setOverwrite]=useState(true);
  const [wordsPerChapter,setWordsPerChapter]=useState(700);
  const [wordsPerSub,setWordsPerSub]=useState(500);
  const [aiExpanding,setAiExpanding]=useState(false);
  const [aiExpandProg,setAiExpandProg]=useState({cur:0,tot:0});

  // generazione libro
  const [genProgress,setGenProgress]=useState([]);   // array di {num,title,status,words}
  const [genCurrent,setGenCurrent]=useState("");      // capitolo in corso
  const [genDone,setGenDone]=useState(false);
  const [genError,setGenError]=useState("");
  const [canStop,setCanStop]=useState(false);
  const stopRef=React.useRef(false);

  const handleParse=()=>{
    if(!raw.trim())return;
    const result=parseStructure(raw);
    setParsed(result);
    setMode("preview");
  };

  // Arricchisci note con AI (opzionale, prima della generazione)
  const handleAIExpand=async()=>{
    if(!parsed)return;
    setAiExpanding(true);
    const tots=parsed.reduce((s,c)=>s+Math.max(1,c.subchapters.length),0);
    setAiExpandProg({cur:0,tot:tots});
    let cur=0;
    const enriched=JSON.parse(JSON.stringify(parsed));
    for(const ch of enriched){
      if(ch.subchapters.length===0){
        const r=await callClaude(
          `Sei un editor. Per il capitolo "${ch.title}" del libro "${book.title||"questo argomento"}" (${book.genre}), scrivi 2-3 righe di note: cosa trattare, tono, esempi.`,
          "Solo le note, italiano, max 3 frasi."
        );
        ch.note=r.trim(); cur++; setAiExpandProg({cur,tot:tots});
      }
      for(const sub of ch.subchapters){
        const r=await callClaude(
          `Sei un editor. Per la sezione "${sub.num} – ${sub.title}" nel capitolo "${ch.title}" del libro "${book.title||"questo argomento"}" (${book.genre}), scrivi 2-3 righe di note: cosa trattare, dati/esempi, tono.`,
          "Solo le note, italiano, max 3 frasi."
        );
        sub.note=r.trim(); cur++; setAiExpandProg({cur,tot:tots});
      }
    }
    setParsed(enriched);
    setAiExpanding(false);
  };

  // ── GENERA IL LIBRO COMPLETO ──────────────────────────────────────────────
  const handleGenerateBook=async()=>{
    if(!parsed)return;
    stopRef.current=false;
    setCanStop(true);
    setGenError("");
    setGenDone(false);

    // Crea capitoli vuoti e inizializza progress
    const emptyChapters=buildChaptersFromParsed(parsed);
    setBook(b=>({...b,chapters:overwrite?emptyChapters:[...b.chapters,...emptyChapters]}));
    setGenProgress(parsed.map(ch=>({num:ch.num,title:ch.title,status:"waiting",words:0})));
    setMode("generating");

    const titleBook=book.title||"Questo libro";
    const genreBook=book.genre||"Saggio";
    const allChapterTitles=parsed.map((c,i)=>`Cap.${c.num}: ${c.title}`).join(" | ");

    // Offset: se non sovrascriviamo, i nuovi capitoli partono dopo quelli esistenti
    const offset=overwrite?0:book.chapters.length;

    for(let ci=0;ci<parsed.length;ci++){
      if(stopRef.current) break;
      const ch=parsed[ci];

      setGenProgress(prev=>prev.map((p,i)=>i===ci?{...p,status:"writing"}:p));
      setGenCurrent(`Cap. ${ch.num} – ${ch.title}`);

      try{
        let chapterContent="";

        if(ch.subchapters.length===0){
          // Nessun sottocapitolo: genera capitolo completo
          const note=ch.note?`\n\nNote editoriali: ${ch.note}`:"";
          const prompt=`Stai scrivendo il libro "${titleBook}" (${genreBook}).
Struttura completa: ${allChapterTitles}

Scrivi il CAPITOLO ${ch.num}: "${ch.title}"${note}

Istruzioni:
- Tono professionale e coinvolgente, adatto al genere ${genreBook}
- Lunghezza: ${wordsPerChapter} parole circa
- Struttura con sottoparagrafi interni se necessario
- Linguaggio chiaro, esempi pratici dove rilevante
- Inizia direttamente con il contenuto (NON ripetere il titolo del capitolo)`;

          const r=await callClaude(prompt,`Sei un autore professionista che scrive libri di ${genreBook} in italiano. Scrivi solo il contenuto richiesto, senza meta-commenti.`,Math.min(4000,Math.ceil(wordsPerChapter*1.7)));
          chapterContent=r.trim();

        } else {
          // Genera ogni sottocapitolo separatamente e assembla
          const subParts=[];
          for(let si=0;si<ch.subchapters.length;si++){
            if(stopRef.current) break;
            const sub=ch.subchapters[si];
            const note=sub.note?`\n\nNote: ${sub.note}`:"";

            setGenCurrent(`${sub.num} – ${sub.title}`);

            const prompt=`Stai scrivendo il libro "${titleBook}" (${genreBook}).
Capitolo corrente: Cap.${ch.num} "${ch.title}"${chNote}
Struttura libro: ${allChapterTitles}

Scrivi la sezione ${sub.num}: "${sub.title}"${note}

Istruzioni:
- Tono professionale, adatto a ${genreBook}
- Lunghezza: ${wordsPerSub} parole circa
- Contenuto denso, pratico, con esempi reali dove possibile
- NON ripetere il numero di sezione o il titolo all'inizio
- Concludi la sezione in modo naturale`;

            const r=await callClaude(prompt,`Sei un autore professionista che scrive libri di ${genreBook} in italiano. Scrivi solo il contenuto richiesto.`,Math.min(4000,Math.ceil(wordsPerSub*1.7)));
            subParts.push(`## ${sub.num} – ${sub.title}\n\n${r.trim()}`);
          }
          chapterContent=subParts.join("\n\n---\n\n");

        const words=chapterContent.trim().split(/\s+/).length;

        // Aggiorna il libro in tempo reale
        setBook(b=>{
          const chapters=[...b.chapters];
          const idx=offset+ci;
          if(chapters[idx]) chapters[idx]={...chapters[idx],content:chapterContent};
          return {...b,chapters};
        });

        setGenProgress(prev=>prev.map((p,i)=>i===ci?{...p,status:"error",errMsg:e.message}:p));

        await new Promise(r=>setTimeout(r,2000));
        setGenError("");
        // continua con il prossimo capitolo invece di bloccarsi

    }

    setCanStop(false);
    setGenDone(true);
    setGenCurrent("");

  const totalSubs=parsed?parsed.reduce((s,c)=>s+c.subchapters.length,0):0;
  const doneCount=genProgress.filter(p=>p.status==="done").length;

        <textarea value={raw} onChange={e=>setRaw(e.target.value)}

        />

  // ─── STEP: ANTEPRIMA ─────────────────────────────────────────────────────
  if(mode==="preview") return(

  // ─── STEP: GENERAZIONE IN CORSO ──────────────────────────────────────────
  if(mode==="generating") return(
    <div style={{flex:1,overflowY:"auto",background:"#0f0e17",padding:"32px 40px"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');`}</style>
      <div style={{maxWidth:800,margin:"0 auto"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:48,marginBottom:12}}>{genDone?"🎉":"⏳"}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#f5c842",marginBottom:6}}>
            {genDone?"Libro generato!":"Scrittura in corso..."}
          </div>
          {!genDone&&genCurrent&&(
            <div style={{fontSize:13,color:"#c084fc"}}>✍️ Sto scrivendo: <strong>{genCurrent}</strong></div>
          )}
        </div>

        {/* Barra progresso globale */}
        <div style={{...card,marginBottom:24,padding:"20px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:13,color:"#c8c6d8"}}>Progresso complessivo</div>
            <div style={{fontSize:14,fontWeight:700,color:"#f5c842",fontFamily:"monospace"}}>{pct}%</div>
          </div>
          <div style={{height:10,background:"#1a1829",borderRadius:5,overflow:"hidden",marginBottom:14}}>
            <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#f5c842,#c084fc)",borderRadius:5,transition:"width 0.4s ease"}} />
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,textAlign:"center"}}>
            <div>
              <div style={{fontSize:20,fontWeight:700,color:"#f5c842",fontFamily:"monospace"}}>{doneCount}/{genProgress.length}</div>
              <div style={{fontSize:11,color:"#5a5870"}}>capitoli scritti</div>
            </div>
            <div>
              <div style={{fontSize:20,fontWeight:700,color:"#4ade80",fontFamily:"monospace"}}>{totalWords.toLocaleString()}</div>
              <div style={{fontSize:11,color:"#5a5870"}}>parole generate</div>
            </div>
            <div>
              <div style={{fontSize:20,fontWeight:700,color:"#38bdf8",fontFamily:"monospace"}}>{Math.ceil(totalWords/250)}</div>
              <div style={{fontSize:11,color:"#5a5870"}}>pagine stimate</div>
            </div>
          </div>
        </div>

        {/* Lista capitoli con stato */}
        <div style={{marginBottom:20}}>
          {genProgress.map((p,i)=>{
            const statusIcon={waiting:"○",writing:"✍️",done:"✅",error:"❌"}[p.status]||"○";
            const statusColor={waiting:"#3a3850",writing:"#f5c842",done:"#4ade80",error:"#f87171"}[p.status]||"#3a3850";
            const isWriting=p.status==="writing";
            return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderRadius:10,marginBottom:5,background:isWriting?"#1a1829":"transparent",border:`1px solid ${isWriting?"#f5c84244":"#1a1929"}`,transition:"all 0.3s"}}>
                <span style={{fontSize:isWriting?18:14,transition:"font-size 0.2s"}}>{statusIcon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:isWriting?"#f5c842":p.status==="done"?"#c8c6d8":"#5a5870",fontFamily:isWriting?"'Playfair Display',serif":"inherit",fontWeight:isWriting?700:400}}>
                    Cap. {p.num} – {p.title}
                  </div>
                  {isWriting&&genCurrent&&genCurrent!==`Cap. ${p.num} – ${p.title}`&&(
                    <div style={{fontSize:11,color:"#c084fc",marginTop:2}}>✍️ {genCurrent}</div>
                  )}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  {p.status==="done"&&<span style={{fontSize:11,color:"#4ade80",fontFamily:"monospace"}}>{p.words.toLocaleString()} parole</span>}
                  {p.status==="writing"&&<span style={{fontSize:11,color:"#f5c842",animation:"pulse 1s infinite"}}>in scrittura...</span>}
                  {p.status==="waiting"&&<span style={{fontSize:10,color:"#3a3850"}}>in attesa</span>}
                  {p.status==="error"&&<span style={{fontSize:11,color:"#f87171"}}>errore</span>}
                </div>
              </div>
            );
          })}
        </div>

        {genError&&(
          <div style={{background:"#2e1a1a",border:"1px solid #5e2a2a",borderRadius:10,padding:14,color:"#ff6b6b",fontSize:13,marginBottom:16}}>
            ⚠️ {genError}
          </div>
        )}

        {/* Bottoni azione */}
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          {!genDone&&canStop&&(
            <button onClick={()=>{stopRef.current=true;}} style={{padding:"10px 20px",borderRadius:8,border:"1px solid #ef4444",background:"transparent",color:"#ef4444",cursor:"pointer",fontSize:13}}>
              ⏹ Interrompi generazione
            </button>
          )}
          {genDone&&(
            <>
              <button onClick={()=>setActive("write")} style={{...goldBtn,fontSize:15}}>✍️ Vai all'editor</button>
              <button onClick={()=>{setMode("paste");setParsed(null);setRaw("");setGenProgress([]);setGenDone(false);}} style={{padding:"12px 20px",borderRadius:8,border:"1px solid #2e2d3e",background:"transparent",color:"#7a7890",cursor:"pointer",fontSize:13}}>
                + Nuova struttura
              </button>
            </>
          )}
        </div>

      </div>
    </div>
  );

  return null;
}
